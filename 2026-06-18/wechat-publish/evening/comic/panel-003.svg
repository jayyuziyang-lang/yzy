  <text x="384" y="338" font-size="10" fill="#475569" text-anchor="middle">日韩：半导体出口超级周期 + 弱势货币利好出口企业 = 独立于Fed紧缩</text>
  <text x="384" y="355" font-size="10" fill="#475569" text-anchor="middle">港股：FOMC鹰派 → 美元走强 → 资金流出 → 金融/地产等高杠杆板块承压</text>
  <text x="384" y="372" font-size="10" fill="#475569" text-anchor="middle">A股：内部分化 — 科技板块跟日韩（产业周期），金融板块跟港股（利率敏感）</text>
