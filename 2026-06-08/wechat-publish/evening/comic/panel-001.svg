<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title -->
  <rect x="0" y="0" width="300" height="30" fill="#D4A017"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">📉 三重冲击：A股失守4000，油价暴涨4%</text>

  <!-- Left: A股 -->
  <text x="12" y="52" font-size="9" font-weight="700" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">A股全线溃退</text>

  <rect x="12" y="60" width="130" height="52" rx="4" fill="#FFF5F5" stroke="#DC2626" stroke-width="1"/>
  <text x="16" y="76" font-size="12" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">沪指 3,959</text>
  <text x="16" y="94" font-size="9" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">科创50 -4.3% | 4600股跌</text>
  <text x="16" y="108" font-size="9" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">成交2.82万亿（缩量2773亿）</text>

  <!-- Right: 中东 -->
  <text x="158" y="52" font-size="9" font-weight="700" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">中东局势升级</text>

  <rect x="158" y="60" width="130" height="52" rx="4" fill="#FFF5F5" stroke="#DC2626" stroke-width="1"/>
  <text x="162" y="76" font-size="11" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">伊朗导弹袭以色列</text>
  <text x="162" y="94" font-size="9" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">以方反击石化设施</text>
  <text x="162" y="108" font-size="9" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">霍尔木兹海峡再关闭风险</text>

  <!-- Divider -->
  <line x1="0" y1="122" x2="300" y2="122" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Bottom: Commodities -->
  <text x="12" y="142" font-size="9" font-weight="700" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">商品两极分化</text>

  <!-- 油涨 -->
  <rect x="12" y="150" width="135" height="18" rx="4" fill="#FEF2F2"/>
  <text x="16" y="163" font-size="8" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">🛢 布伦特 $96.96</text>
  <text x="120" y="163" font-size="8" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">+4%</text>

  <!-- 金跌 -->
  <rect x="153" y="150" width="135" height="18" rx="4" fill="#F0FDF4"/>
  <text x="157" y="163" font-size="8" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">🥇 黄金 $4,323</text>
  <text x="252" y="163" font-size="8" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">-0.5%</text>

  <!-- Bottom insight -->
  <rect x="10" y="182" width="280" height="30" rx="6" fill="#F8FAFC" stroke="#D4A017" stroke-width="1"/>
  <text x="20" y="197" font-size="8" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 银行 +0.42% | 工程机械 +1.04% | 油气 +0.94%</text>
  <text x="20" y="208" font-size="8" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">资金正在从成长切换到价值——位置比故事重要</text>
</svg>
