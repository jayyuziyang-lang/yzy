<svg xmlns="http://www.w3.org/2000/svg" viewBox="300 220" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <radialGradient id="hubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
  </defs>
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Central hub -->
  <circle cx="150" cy="110" r="16" fill="url(#hubGrad)"/>
  <text x="150" y="114" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">5.28</text>

  <!-- Radial lines to each node -->
  <line x1="150" y1="110" x2="70" y2="40" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="150" y1="110" x2="240" y2="40" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="150" y1="110" x2="260" y2="130" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="150" y1="110" x2="70" y2="185" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="150" y1="110" x2="240" y2="185" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="150" y1="110" x2="40" y2="110" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Node 1: A股反弹 (Top Left) -->
  <rect x="30" y="18" width="75" height="38" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="67" y="35" text-anchor="middle" font-size="8" font-weight="700" fill="#DC2626">A股探底回升</text>
  <text x="67" y="48" text-anchor="middle" font-size="6" fill="#9A3412">创业板+1.96%</text>

  <!-- Node 2: Snowflake (Top Right) -->
  <rect x="200" y="18" width="75" height="38" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="237" y="35" text-anchor="middle" font-size="8" font-weight="700" fill="#16A34A">Snowflake</text>
  <text x="237" y="48" text-anchor="middle" font-size="6" fill="#166534">盘后+37%</text>

  <!-- Node 3: PCE数据 (Right) -->
  <rect x="218" y="108" width="75" height="38" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="255" y="125" text-anchor="middle" font-size="8" font-weight="700" fill="#1A56DB">PCE数据</text>
  <text x="255" y="138" text-anchor="middle" font-size="6" fill="#1E40AF">核心3.2%持平</text>

  <!-- Node 4: 韩国暴跌 (Bottom Left) -->
  <rect x="30" y="165" width="75" height="38" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="67" y="182" text-anchor="middle" font-size="8" font-weight="700" fill="#D97706">韩股暴跌</text>
  <text x="67" y="195" text-anchor="middle" font-size="6" fill="#9A3412">盘中-4.5%</text>

  <!-- Node 5: 算力硬件 (Bottom Right) -->
  <rect x="195" y="165" width="80" height="38" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="235" y="182" text-anchor="middle" font-size="8" font-weight="700" fill="#7C3AED">算力硬件</text>
  <text x="235" y="195" text-anchor="middle" font-size="6" fill="#6D28D9">华虹新高</text>

  <!-- Node 6: 美伊博弈 (Left) -->
  <rect x="5" y="95" width="70" height="38" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="40" y="112" text-anchor="middle" font-size="8" font-weight="700" fill="#D4A017">美伊博弈</text>
  <text x="40" y="125" text-anchor="middle" font-size="6" fill="#92400E">油价承压</text>

  <!-- Title -->
  <text x="150" y="208" text-anchor="middle" font-size="7" fill="#94A3B8">扬说财经 · 晚间速览</text>
</svg>