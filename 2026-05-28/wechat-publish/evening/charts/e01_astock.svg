<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="bRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="bGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="bPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="bGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="520" height="340" fill="url(#bg)" rx="8"/>
  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">A股主要指数 · 探底回升</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月28日 · 两市成交2.97万亿元</text>
  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- 沪指 +0.12% -->
  <text x="85" y="100" text-anchor="middle" font-size="11" fill="#64748B">上证指数</text>
  <rect x="55" y="108" width="60" height="75" rx="4" fill="url(#bRed)" opacity="0.85"/>
  <text x="85" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">+0.12%</text>
  <text x="85" y="210" text-anchor="middle" font-size="11" fill="#475569">4098.64</text>

  <!-- 深成指 +0.80% -->
  <text x="195" y="100" text-anchor="middle" font-size="11" fill="#64748B">深证成指</text>
  <rect x="165" y="98" width="60" height="85" rx="4" fill="url(#bRed)" opacity="0.85"/>
  <text x="195" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">+0.80%</text>
  <text x="195" y="210" text-anchor="middle" font-size="11" fill="#475569">15695</text>

  <!-- 创业板 +1.96% -->
  <text x="305" y="100" text-anchor="middle" font-size="11" fill="#64748B">创业板指</text>
  <rect x="275" y="82" width="60" height="101" rx="4" fill="url(#bPurple)" opacity="0.85"/>
  <text x="305" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED">+1.96%</text>
  <text x="305" y="210" text-anchor="middle" font-size="11" fill="#475569">4054.21</text>

  <!-- 北证50 +2.55% -->
  <text x="415" y="100" text-anchor="middle" font-size="11" fill="#64748B">北证50</text>
  <rect x="385" y="72" width="60" height="111" rx="4" fill="url(#bGold)" opacity="0.9"/>
  <text x="415" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#D4A017">+2.55%</text>
  <text x="415" y="210" text-anchor="middle" font-size="11" fill="#475569">1258.14</text>

  <line x1="40" y1="228" x2="480" y2="228" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="248" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">超3000只个股上涨 · 涨停126只 · 跌停12只</text>
  <text x="260" y="268" text-anchor="middle" font-size="11" fill="#475569">成交缩量至2.97万亿（较昨日-2700亿），但赚钱效应改善</text>
  <text x="260" y="286" text-anchor="middle" font-size="11" fill="#475569">领涨：算力硬件/PCB/CPO/培育钻石/半导体 | 领跌：白酒/创新药/大金融</text>
  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：证券时报 · 新浪财经 · 东方财富</text>
</svg>