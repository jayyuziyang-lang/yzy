<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="360" height="200" fill="#F0F2F5" rx="8"/>
  <rect x="10" y="10" width="340" height="180" rx="6" fill="#fff"/>
  <text x="16" y="34" font-size="14" font-weight="700" fill="#1E293B">算力硬件全线爆发</text>
  <text x="16" y="50" font-size="9" fill="#64748B">半导体强势拉升 · 华虹公司创历史新高</text>
  <line x1="16" y1="56" x2="344" y2="56" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- 4 cards -->
  <rect x="16" y="64" width="75" height="60" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="53" y="84" text-anchor="middle" font-size="9" fill="#6D28D9">华虹公司</text>
  <text x="53" y="108" text-anchor="middle" font-size="18" font-weight="700" fill="#7C3AED">+15%</text>
  <text x="53" y="120" text-anchor="middle" font-size="8" fill="#6D28D9">历史新高</text>
  <rect x="99" y="64" width="75" height="60" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="136" y="84" text-anchor="middle" font-size="9" fill="#1E40AF">中芯国际</text>
  <text x="136" y="108" text-anchor="middle" font-size="18" font-weight="700" fill="#1A56DB">+6%</text>
  <text x="136" y="120" text-anchor="middle" font-size="8" fill="#1E40AF">成交居前</text>
  <rect x="182" y="64" width="75" height="60" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="219" y="84" text-anchor="middle" font-size="9" fill="#991B1B">铜冠铜箔</text>
  <text x="219" y="108" text-anchor="middle" font-size="18" font-weight="700" fill="#DC2626">+20%</text>
  <text x="219" y="120" text-anchor="middle" font-size="8" fill="#991B1B">PET铜箔</text>
  <rect x="265" y="64" width="75" height="60" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="302" y="84" text-anchor="middle" font-size="9" fill="#166534">惠丰钻石</text>
  <text x="302" y="108" text-anchor="middle" font-size="18" font-weight="700" fill="#16A34A">+30%</text>
  <text x="302" y="120" text-anchor="middle" font-size="8" fill="#166534">培育钻石</text>
  <line x1="16" y1="134" x2="344" y2="134" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="16" y="150" font-size="10" fill="#475569">PCB/CPO全线走强 · 液冷服务器/超级电容多股涨停</text>
  <text x="16" y="166" font-size="10" fill="#475569">但大消费调整：白酒/创新药/商贸零售领跌</text>
  <text x="344" y="196" text-anchor="end" font-size="8" fill="#CBD5E1">来源：新浪财经·第一财经·证券时报</text>
</svg>