<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="bPurple2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="bBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="bRed2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>
  <rect width="520" height="340" fill="url(#bg)" rx="8"/>
  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">算力硬件全线爆发 · 半导体强势拉升</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月28日 · 华虹公司创历史新高</text>
  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- 华虹 +15% -->
  <text x="85" y="100" text-anchor="middle" font-size="11" fill="#64748B">华虹公司</text>
  <rect x="45" y="106" width="80" height="50" rx="4" fill="url(#bPurple2)" opacity="0.85"/>
  <text x="85" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#7C3AED">+15%</text>
  <text x="85" y="188" text-anchor="middle" font-size="10" fill="#6D28D9">历史新高</text>

  <!-- 中芯国际 +6% -->
  <text x="195" y="100" text-anchor="middle" font-size="11" fill="#64748B">中芯国际</text>
  <rect x="155" y="126" width="80" height="30" rx="4" fill="url(#bBlue)" opacity="0.8"/>
  <text x="195" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#1A56DB">+6%</text>
  <text x="195" y="188" text-anchor="middle" font-size="10" fill="#1E3A7A">成交居前</text>

  <!-- 铜冠铜箔 +20% -->
  <text x="315" y="100" text-anchor="middle" font-size="11" fill="#64748B">铜冠铜箔</text>
  <rect x="275" y="98" width="80" height="58" rx="4" fill="url(#bRed2)" opacity="0.85"/>
  <text x="315" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#DC2626">+20%</text>
  <text x="315" y="188" text-anchor="middle" font-size="10" fill="#B91C1C">PET铜箔</text>

  <!-- 惠丰钻石 +30% -->
  <text x="435" y="100" text-anchor="middle" font-size="11" fill="#64748B">惠丰钻石</text>
  <rect x="395" y="88" width="80" height="68" rx="4" fill="url(#bPurple2)" opacity="0.9"/>
  <text x="435" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#7C3AED">+30%</text>
  <text x="435" y="188" text-anchor="middle" font-size="10" fill="#6D28D9">培育钻石</text>

  <line x1="40" y1="206" x2="480" y2="206" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="226" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">今日科技主线</text>
  <text x="40" y="246" font-size="11" fill="#475569">PCB/CPO方向全线走强 · 液冷服务器多股涨停</text>
  <text x="40" y="264" font-size="11" fill="#475569">超级电容：风华高科/火炬电子/江海股份涨停</text>
  <text x="40" y="282" font-size="11" fill="#475569">但大消费持续调整：白酒/创新药/商贸零售领跌</text>
  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：新浪财经 · 第一财经 · 证券时报</text>
</svg>