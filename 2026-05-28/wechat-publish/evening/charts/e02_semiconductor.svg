<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
  </defs>
  <rect width="520" height="320" fill="url(#bg)" rx="8"/>
  <rect x="15" y="15" width="490" height="290" rx="8" fill="#FFFFFF"/>

  <text x="30" y="48" font-size="18" font-weight="700" fill="#1E293B">算力硬件全线爆发 · 半导体强势拉升</text>
  <text x="30" y="70" font-size="12" fill="#64748B">2026年5月28日 · 华虹公司创历史新高</text>

  <line x1="30" y1="82" x2="490" y2="82" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Card 1: 华虹 -->
  <rect x="35" y="96" width="105" height="100" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="87" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">华虹公司</text>
  <text x="87" y="158" text-anchor="middle" font-size="28" font-weight="700" fill="#7C3AED">+15%</text>
  <text x="87" y="182" text-anchor="middle" font-size="11" fill="#6D28D9">创历史新高</text>

  <!-- Card 2: 中芯 -->
  <rect x="152" y="96" width="105" height="100" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="204" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">中芯国际</text>
  <text x="204" y="158" text-anchor="middle" font-size="28" font-weight="700" fill="#1A56DB">+6%</text>
  <text x="204" y="182" text-anchor="middle" font-size="11" fill="#1E40AF">成交额居前</text>

  <!-- Card 3: 铜冠铜箔 -->
  <rect x="269" y="96" width="105" height="100" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="321" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#991B1B">铜冠铜箔</text>
  <text x="321" y="158" text-anchor="middle" font-size="28" font-weight="700" fill="#DC2626">+20%</text>
  <text x="321" y="182" text-anchor="middle" font-size="11" fill="#991B1B">PET铜箔概念</text>

  <!-- Card 4: 惠丰钻石 -->
  <rect x="386" y="96" width="105" height="100" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="438" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">惠丰钻石</text>
  <text x="438" y="158" text-anchor="middle" font-size="28" font-weight="700" fill="#16A34A">+30%</text>
  <text x="438" y="182" text-anchor="middle" font-size="11" fill="#166534">培育钻石爆发</text>

  <line x1="30" y1="212" x2="490" y2="212" stroke="#E2E8F0" stroke-width="1"/>

  <text x="260" y="238" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">科技主线全面开花</text>
  <text x="260" y="258" text-anchor="middle" font-size="12" fill="#475569">PCB/CPO全线走强 · 液冷服务器/超级电容多股涨停</text>
  <text x="260" y="278" text-anchor="middle" font-size="12" fill="#475569">大消费调整：白酒/创新药/商贸零售领跌</text>

  <text x="490" y="300" text-anchor="end" font-size="10" fill="#CBD5E1">来源：新浪财经 · 第一财经 · 证券时报</text>
</svg>