<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
  </defs>
  <rect width="520" height="320" fill="url(#bg)" rx="8"/>
  <rect x="15" y="15" width="490" height="290" rx="8" fill="#FFFFFF"/>

  <text x="30" y="48" font-size="18" font-weight="700" fill="#1E293B">Snowflake盘后暴涨37%</text>
