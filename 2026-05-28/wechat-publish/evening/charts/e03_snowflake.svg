  <text x="260" y="296" text-anchor="middle" font-size="12" fill="#475569">费城半导体指数创新高后技术性休整</text>

  <text x="490" y="300" text-anchor="end" font-size="10" fill="#CBD5E1">来源：MarketScreener · Yahoo Finance · GuruFocus</text>
