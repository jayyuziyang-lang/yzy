  <line x1="30" y1="82" x2="490" y2="82" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Left: Snowflake price -->
  <rect x="35" y="96" width="210" height="120" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="140" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Snowflake (SNOW)</text>
  <text x="140" y="170" text-anchor="middle" font-size="40" font-weight="700" fill="#16A34A">+37%</text>
  <text x="140" y="196" text-anchor="middle" font-size="13" fill="#475569">$175 → $238（盘后）</text>
  <text x="140" y="214" text-anchor="middle" font-size="11" fill="#166534">几乎抹平全年跌幅</text>

  <!-- Right: Deal details -->
  <rect x="265" y="96" width="220" height="120" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="375" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">60亿美元 · 5年战略合作</text>
