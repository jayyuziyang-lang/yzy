<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="gGreen2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="gRed3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>
  <rect width="520" height="340" fill="url(#bg)" rx="8"/>
  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Snowflake盘后暴涨37% · 签60亿AWS大单</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月27日 · 云计算平台绑定竞争白热化</text>
  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- Left: Snowflake -->
  <rect x="30" y="82" width="220" height="140" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="140" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">Snowflake (SNOW)</text>
  <text x="140" y="136" text-anchor="middle" font-size="36" font-weight="700" fill="#16A34A">+37%</text>
  <text x="140" y="162" text-anchor="middle" font-size="13" fill="#475569">$175 → $238（盘后）</text>
  <text x="140" y="182" text-anchor="middle" font-size="11" fill="#475569">几乎抹平全年跌幅</text>
  <text x="140" y="200" text-anchor="middle" font-size="10" fill="#166534"> "一个明确的拐点" — CEO Ramaswamy</text>

  <!-- Right: Deal details -->
  <rect x="270" y="82" width="220" height="140" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">60亿美元 · 5年</text>
  <text x="380" y="132" text-anchor="middle" font-size="11" fill="#475569">AWS Graviton Arm芯片</text>
  <text x="380" y="150" text-anchor="middle" font-size="11" fill="#475569">+ AI GPU基础设施</text>
  <text x="380" y="172" text-anchor="middle" font-size="11" fill="#475569">Q1营收$13.9亿 (+33%)</text>
  <text x="380" y="190" text-anchor="middle" font-size="11" fill="#475569">全年指引 $56.6亿→$58.4亿</text>
  <text x="380" y="208" text-anchor="middle" font-size="10" fill="#1E40AF">无股权融资 · 纯商业绑定</text>

  <!-- Bottom: AI chip pullback -->
  <line x1="40" y1="234" x2="480" y2="234" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">但AI芯片股昨日普遍回调</text>
  <text x="260" y="274" text-anchor="middle" font-size="11" fill="#475569">高通 -6% · Marvell -4.6% · 英伟达 -1% · 英特尔 -1.4%</text>
  <text x="260" y="294" text-anchor="middle" font-size="11" fill="#475569">费城半导体指数创新高后技术性休整</text>
  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：MarketScreener · Yahoo Finance · GuruFocus</text>
</svg>