<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
  </defs>
  <rect width="520" height="320" fill="url(#bg)" rx="8"/>
  <rect x="15" y="15" width="490" height="290" rx="8" fill="#FFFFFF"/>

  <text x="30" y="48" font-size="18" font-weight="700" fill="#1E293B">美国4月PCE通胀数据</text>
  <text x="30" y="70" font-size="12" fill="#64748B">5月28日发布 · 美联储新主席Warsh首份重大通胀报告</text>

  <line x1="30" y1="82" x2="490" y2="82" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Core PCE -->
  <rect x="40" y="96" width="200" height="110" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="140" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#1E40AF">核心PCE同比</text>
  <text x="140" y="176" text-anchor="middle" font-size="48" font-weight="700" fill="#1A56DB">3.2%</text>
  <text x="140" y="200" text-anchor="middle" font-size="13" fill="#1E40AF">预期3.2% · 前值3.2%</text>

  <!-- Headline PCE -->
  <rect x="270" y="96" width="210" height="110" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="375" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#92400E">整体PCE同比</text>
  <text x="375" y="176" text-anchor="middle" font-size="48" font-weight="700" fill="#D4A017">3.8%</text>
  <text x="375" y="200" text-anchor="middle" font-size="13" fill="#92400E">若确认，创近三年新高</text>

  <line x1="30" y1="222" x2="490" y2="222" stroke="#E2E8F0" stroke-width="1"/>

  <text x="260" y="248" text-anchor="middle" font-size="15" font-weight="600" fill="#1E293B">美联储两难未解</text>
  <text x="260" y="272" text-anchor="middle" font-size="13" fill="#475569">核心通胀原地踏步 · 离2%目标还有很大距离</text>
  <text x="260" y="294" text-anchor="middle" font-size="13" fill="#475569">年内加息概率40-50% · 美联储最可能选择"继续观望"</text>

  <text x="490" y="300" text-anchor="end" font-size="10" fill="#CBD5E1">来源：Investing.com · TradingEconomics · Yahoo Finance</text>
</svg>