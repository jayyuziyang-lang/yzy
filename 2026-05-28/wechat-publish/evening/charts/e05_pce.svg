<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
  </defs>
  <rect width="520" height="340" fill="url(#bg)" rx="8"/>
  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">美国4月PCE通胀数据 · 核心持平3.2%</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月28日发布 · 美联储新主席Warsh首份通胀报告</text>
  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- Core PCE display -->
  <text x="140" y="110" text-anchor="middle" font-size="12" fill="#64748B">核心PCE同比</text>
  <text x="140" y="150" text-anchor="middle" font-size="42" font-weight="700" fill="#1A56DB">3.2%</text>
  <text x="140" y="174" text-anchor="middle" font-size="12" fill="#475569">预期3.2% · 前值3.2%</text>
  <text x="140" y="196" text-anchor="middle" font-size="11" fill="#64748B">与预期一致，原地踏步</text>

  <!-- Separator -->
  <line x1="240" y1="90" x2="240" y2="220" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Headline PCE -->
  <text x="380" y="110" text-anchor="middle" font-size="12" fill="#64748B">整体PCE同比</text>
  <text x="380" y="150" text-anchor="middle" font-size="42" font-weight="700" fill="#D4A017">3.8%</text>
  <text x="380" y="174" text-anchor="middle" font-size="12" fill="#475569">预期3.8% · 前值3.5%</text>
  <text x="380" y="196" text-anchor="middle" font-size="11" fill="#64748B">若确认，创近三年新高</text>

  <!-- Analysis -->
  <line x1="40" y1="228" x2="480" y2="228" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">美联储两难未解</text>
  <text x="40" y="270" font-size="11" fill="#475569">核心通胀离2%目标仍有很大距离，但也没有恶化到需要立刻加息的程度</text>
  <text x="40" y="288" font-size="11" fill="#475569">Cook理事：劳动力走弱则降息，通胀停滞则加息。市场定价年内加息概率约40-50%</text>
  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：Investing.com · TradingEconomics · Yahoo Finance</text>
</svg>