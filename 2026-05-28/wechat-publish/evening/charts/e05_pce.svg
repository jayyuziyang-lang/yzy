<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="360" height="200" fill="#F0F2F5" rx="8"/>
  <rect x="10" y="10" width="340" height="180" rx="6" fill="#fff"/>
  <text x="16" y="34" font-size="14" font-weight="700" fill="#1E293B">美国4月PCE通胀数据</text>
  <text x="16" y="50" font-size="9" fill="#64748B">5月28日发布 · 美联储新主席Warsh首份通胀报告</text>
  <line x1="16" y1="56" x2="344" y2="56" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- Core PCE -->
  <rect x="20" y="62" width="145" height="80" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="92" y="82" text-anchor="middle" font-size="9" fill="#1E40AF">核心PCE同比</text>
  <text x="92" y="116" text-anchor="middle" font-size="30" font-weight="700" fill="#1A56DB">3.2%</text>
  <text x="92" y="136" text-anchor="middle" font-size="9" fill="#1E40AF">预期3.2% · 前值3.2%</text>
  <!-- Headline PCE -->
  <rect x="185" y="62" width="145" height="80" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="257" y="82" text-anchor="middle" font-size="9" fill="#92400E">整体PCE同比</text>
  <text x="257" y="116" text-anchor="middle" font-size="30" font-weight="700" fill="#D4A017">3.8%</text>
  <text x="257" y="136" text-anchor="middle" font-size="9" fill="#92400E">若确认创近三年新高</text>
  <line x1="16" y1="150" x2="344" y2="150" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="16" y="166" font-size="10" fill="#475569">核心通胀原地踏步 · 美联储继续观望 · 年内加息概率40-50%</text>
  <text x="344" y="196" text-anchor="end" font-size="8" fill="#CBD5E1">来源：Investing.com·Yahoo Finance</text>
</svg>