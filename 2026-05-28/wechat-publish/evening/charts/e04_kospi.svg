  <rect x="40" y="96" width="440" height="100" rx="6" fill="#F8F9FA" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Chart: KOSPI intraday -->
  <polyline points="50,130 90,140 150,172 200,185 250,175 300,160 360,142 420,140" fill="none" stroke="#1A56DB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="50,130 90,140 150,172 200,185 250,175 300,160 360,142 420,140 420,196 50,196" fill="#1A56DB" opacity="0.06"/>

