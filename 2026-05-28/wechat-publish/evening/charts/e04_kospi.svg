  <text x="420" y="148" font-size="10" fill="#94A3B8">8185点</text>

  <!-- Key statistics -->
  <line x1="30" y1="210" x2="490" y2="210" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="40" y="220" width="210" height="50" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="145" y="242" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">盘中最低 7841 · 振幅 4.80%</text>
