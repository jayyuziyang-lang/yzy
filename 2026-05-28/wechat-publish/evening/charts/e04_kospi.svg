  <text x="50" y="124" font-size="11" fill="#475569">开盘</text>
  <text x="150" y="186" font-size="12" fill="#DC2626" font-weight="700">暴跌 -4.5%</text>
  <text x="300" y="154" font-size="12" fill="#16A34A" font-weight="700">V型反弹</text>
