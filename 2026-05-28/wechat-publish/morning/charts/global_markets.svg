  <text x="40" y="290" font-size="10" fill="#94A3B8">三大指数均创历史最高收盘纪录，AI/芯片股回调但指数由消费和医疗板块支撑</text>
  <text x="40" y="306" font-size="10" fill="#94A3B8">高盛将标普500年末目标从7,600上调至8,000点</text>

  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：新华财经 · MarketWatch · TradingEconomics</text>
