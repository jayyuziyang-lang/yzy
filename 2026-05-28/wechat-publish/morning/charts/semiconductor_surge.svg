<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
  </defs>

  <rect width="520" height="340" fill="url(#bg)" rx="8"/>

  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">全球AI芯片板块分化</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月27日 · 费半指数创新高后回调，AI个股表现分化</text>

  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- Bar chart - horizontal-ish layout: negative and positive changes -->

  <!-- Row 1: 高通 -6% -->
  <text x="60" y="102" font-size="12" fill="#1E293B">高通</text>
  <rect x="118" y="88" width="184" height="24" rx="4" fill="url(#gRed)" opacity="0.85"/>
  <text x="314" y="106" font-size="13" font-weight="700" fill="#DC2626">-6.0%</text>

  <!-- Row 2: Marvell -4.6% -->
  <text x="60" y="138" font-size="12" fill="#1E293B">Marvell</text>
  <rect x="154" y="124" width="148" height="24" rx="4" fill="url(#gRed)" opacity="0.8"/>
  <text x="314" y="142" font-size="13" font-weight="700" fill="#DC2626">-4.6%</text>

  <!-- Row 3: 英特尔 -1.4% -->
  <text x="60" y="174" font-size="12" fill="#1E293B">英特尔</text>
  <rect x="240" y="160" width="62" height="24" rx="4" fill="url(#gRed)" opacity="0.7"/>
  <text x="314" y="178" font-size="13" font-weight="700" fill="#DC2626">-1.4%</text>

  <!-- Row 4: 英伟达 -1% -->
  <text x="60" y="210" font-size="12" fill="#1E293B">英伟达</text>
  <rect x="252" y="196" width="50" height="24" rx="4" fill="url(#gRed)" opacity="0.65"/>
  <text x="314" y="214" font-size="13" font-weight="700" fill="#DC2626">-1.0%</text>

  <!-- Divider -->
  <line x1="340" y1="84" x2="340" y2="230" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Right side: Snowflake +30% -->
  <text x="430" y="102" text-anchor="middle" font-size="12" fill="#1E293B">Snowflake</text>
  <text x="430" y="126" text-anchor="middle" font-size="18" font-weight="700" fill="#16A34A">+30%</text>
  <text x="430" y="148" text-anchor="middle" font-size="10" fill="#475569">60亿AWS大单</text>
  <text x="430" y="166" text-anchor="middle" font-size="10" fill="#475569">上调全年指引</text>

  <!-- Highlight box for Snowflake -->
  <rect x="360" y="178" width="140" height="44" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="430" y="196" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="600">云平台绑定竞争加剧</text>
  <text x="430" y="212" text-anchor="middle" font-size="10" fill="#475569">Salesforce营收指引低于预期</text>

  <!-- Footnotes -->
  <text x="40" y="290" font-size="10" fill="#94A3B8">费城半导体指数连创新高后技术性休整，AI芯片股获利了结压力加大</text>
  <text x="40" y="306" font-size="10" fill="#94A3B8">市场等待PCE数据，科技成长股对利率预期高度敏感</text>

  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：MarketWatch · MarketScreener · TradingEconomics</text>
</svg>