<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="340" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">A股主要指数昨日表现</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月27日 · 两市成交3.24万亿元</text>

  <!-- Card Panel -->
  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- Bar Chart -->
  <!-- Index bars with labels -->
  <!-- 沪指 -1.25% → bar at ~15% height -->
  <text x="65" y="100" text-anchor="middle" font-size="11" fill="#64748B">沪指</text>
  <rect x="42" y="108" width="46" height="85" rx="4" fill="url(#bar1)" opacity="0.85"/>
  <text x="65" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">-1.25%</text>
  <text x="65" y="218" text-anchor="middle" font-size="11" fill="#475569">4093</text>

  <!-- 创业板 +0.07% -->
  <text x="175" y="100" text-anchor="middle" font-size="11" fill="#64748B">创业板</text>
  <rect x="152" y="172" width="46" height="21" rx="4" fill="url(#bar2)" opacity="0.85"/>
  <text x="175" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#16A34A">+0.07%</text>
  <text x="175" y="218" text-anchor="middle" font-size="11" fill="#475569">4045</text>

  <!-- 成交额 3.24万亿 (use custom scale) -->
  <text x="285" y="100" text-anchor="middle" font-size="11" fill="#64748B">成交额</text>
  <rect x="262" y="120" width="46" height="73" rx="4" fill="url(#bar3)" opacity="0.85"/>
  <text x="285" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#1A56DB">3.24万亿</text>
  <text x="285" y="218" text-anchor="middle" font-size="11" fill="#475569">量能</text>

  <!-- 涨跌家数比 -->
  <text x="395" y="100" text-anchor="middle" font-size="11" fill="#64748B">涨跌比</text>
  <rect x="372" y="138" width="46" height="55" rx="4" fill="url(#bar4)" opacity="0.85"/>
  <text x="395" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#9333EA">970:4500</text>
  <text x="395" y="218" text-anchor="middle" font-size="11" fill="#475569">涨:跌</text>

  <!-- Divider -->
  <line x1="40" y1="234" x2="480" y2="234" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Annotation -->
  <text x="40" y="252" font-size="11" fill="#64748B">白酒 +3.37%</text>
  <text x="260" y="252" text-anchor="middle" font-size="11" fill="#64748B">半导体 -156亿流出</text>
  <text x="480" y="252" text-anchor="end" font-size="11" fill="#64748B">风格切换进行中</text>

  <text x="40" y="272" font-size="10" fill="#94A3B8">沪指失守4100点整数关口，4500只个股下跌</text>
  <text x="40" y="288" font-size="10" fill="#94A3B8">创业板盘中反超沪指后回落，仅微涨0.07%</text>

  <!-- Source -->
  <text x="260" y="320" text-anchor="middle" font-size="10" fill="#94A3B8">来源：证券时报 · 东方财富 · 新华财经</text>
</svg>