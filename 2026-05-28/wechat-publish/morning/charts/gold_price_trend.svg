<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="gGoldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="gShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="520" height="340" fill="url(#bg)" rx="8"/>

  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">COMEX黄金 · 跌至两月新低</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月27日 · 油价反弹推升通胀预期 + 美元走强双重压制</text>

  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- Big number display -->
  <text x="260" y="114" text-anchor="middle" font-size="14" fill="#64748B">最新收盘</text>
  <text x="260" y="158" text-anchor="middle" font-size="44" font-weight="700" fill="#D4A017">$4,456</text>
  <text x="260" y="184" text-anchor="middle" font-size="16" font-weight="700" fill="#16A34A">-1.2%</text>
  <text x="260" y="204" text-anchor="middle" font-size="12" fill="#64748B">创两个月新低</text>

  <!-- Simplified price trend line -->
  <!-- Coordinate labels -->
  <text x="50" y="230" font-size="10" fill="#94A3B8">近期高点 ~$4,600</text>
  <text x="170" y="230" font-size="10" fill="#94A3B8">↓</text>
  <text x="400" y="230" font-size="10" fill="#94A3B8">当前 $4,456</text>

  <!-- Trend visualization -->
  <polyline points="60,218 120,210 200,220 280,240 360,258 440,260" fill="none" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="60,218 120,210 200,220 280,240 360,258 440,260 440,300 60,300" fill="url(#gShadow)" opacity="0.5"/>

  <!-- Footer analysis -->
  <line x1="40" y1="278" x2="480" y2="278" stroke="#E2E8F0" stroke-width="1"/>

  <text x="40" y="296" font-size="11" fill="#475569">压制因素：① 油价反弹推升通胀预期 → 加息预期升温 → 金价承压</text>
  <text x="40" y="312" font-size="11" fill="#475569">② 美元指数走强 ③ VIX降至16.29，恐慌情绪持续降温</text>
  <text x="40" y="328" font-size="10" fill="#94A3B8">花旗：短期看空至$4,300，6-12个月目标$5,000</text>

  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：TradingEconomics · 新华财经</text>
</svg>