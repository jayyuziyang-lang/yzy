<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="gOil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>

  <rect width="520" height="340" fill="url(#bg)" rx="8"/>

  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">金油比：从恐慌避险向滞胀交易切换</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">美伊"打谈结合"格局下，市场风险偏好快速修复</text>

  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- Gold-to-Oil ratio visualization -->
  <text x="260" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">金油比走势</text>

  <!-- Left: old ratio 70.6 -->
  <rect x="60" y="112" width="160" height="100" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="140" y="142" text-anchor="middle" font-size="11" fill="#92400E">冲突初期</text>
  <text x="140" y="168" text-anchor="middle" font-size="28" font-weight="700" fill="#D4A017">70.6</text>
  <text x="140" y="192" text-anchor="middle" font-size="10" fill="#92400E">恐慌避险模式</text>

  <!-- Arrow -->
  <text x="260" y="165" text-anchor="middle" font-size="22" fill="#94A3B8">→</text>

  <!-- Right: new ratio 45 -->
  <rect x="300" y="112" width="160" height="100" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="380" y="142" text-anchor="middle" font-size="11" fill="#166534">当前</text>
  <text x="380" y="168" text-anchor="middle" font-size="28" font-weight="700" fill="#16A34A">~45</text>
  <text x="380" y="192" text-anchor="middle" font-size="10" fill="#166534">滞胀交易模式</text>

  <!-- Explanation -->
  <line x1="40" y1="230" x2="480" y2="230" stroke="#E2E8F0" stroke-width="1"/>

  <text x="260" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">地缘风险溢价大幅回落</text>
  <text x="40" y="272" font-size="11" fill="#475569">冲突初期市场恐慌推高金价（避险）同时打压油价（需求担忧），金油比值飙升至70.6</text>
  <text x="40" y="290" font-size="11" fill="#475569">随着停火预期升温，油价反弹且金价回落，金油比迅速收敛至45附近</text>

  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：新华财经 · 我的钢铁网 · MarketWatch</text>
</svg>