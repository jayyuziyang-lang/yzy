<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <linearGradient id="gWTI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="gBrent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
  </defs>

  <rect width="520" height="340" fill="url(#bg)" rx="8"/>

  <text x="260" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">原油 · 美伊"打谈结合" 油价剧烈波动</text>
  <text x="260" y="54" text-anchor="middle" font-size="11" fill="#64748B">2026年5月27日 · 停火草案传出WTI暴跌后反弹</text>

  <rect x="20" y="68" width="480" height="248" rx="8" fill="#FFFFFF"/>

  <!-- WTI card -->
  <rect x="40" y="86" width="200" height="110" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="140" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">WTI原油</text>
  <text x="140" y="146" text-anchor="middle" font-size="32" font-weight="700" fill="#EA580C">$89.41</text>
  <text x="140" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#16A34A">-4.8%</text>
  <text x="140" y="190" text-anchor="middle" font-size="10" fill="#9A3412">一度暴跌近5%后反弹</text>

  <!-- Brent card -->
  <rect x="280" y="86" width="200" height="110" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">布伦特原油</text>
  <text x="380" y="146" text-anchor="middle" font-size="32" font-weight="700" fill="#1A56DB">$92.88</text>
  <text x="380" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#16A34A">-3.5%</text>
  <text x="380" y="190" text-anchor="middle" font-size="10" fill="#1E40AF">跟随WTI同步下跌</text>

  <!-- Timeline -->
  <line x1="40" y1="216" x2="480" y2="216" stroke="#E2E8F0" stroke-width="1"/>

  <text x="260" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">事件时间线</text>

  <text x="40" y="258" font-size="10" fill="#475569">① 伊朗宣布停火草案 → WTI急跌近5%跌破$90</text>
  <text x="40" y="274" font-size="10" fill="#475569">② 白宫否认草案 → 油价从低点反弹</text>
  <text x="40" y="290" font-size="10" fill="#475569">③ 美方空袭持续 + 全球近700万桶/天供应缺口 → 下行空间有限</text>
  <text x="40" y="306" font-size="10" fill="#475569">④ 即便签署协议，受损油田修复和海峡通航需数月</text>

  <text x="260" y="326" text-anchor="middle" font-size="10" fill="#94A3B8">来源：新华财经 · 我的钢铁网</text>
</svg>