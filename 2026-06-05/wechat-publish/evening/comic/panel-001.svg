<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" fill="#D4A017"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">📊 非农17.2万暴击 + 北证50暴涨5.59%</text>

  <!-- Left: 非农暴击 -->
  <text x="12" y="50" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">5月非农大超预期</text>

  <rect x="12" y="58" width="136" height="32" rx="4" fill="#FFF5F5" stroke="#FECACA" stroke-width="0.5"/>
  <text x="17" y="73" font-size="9" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">+17.2万</text>
  <text x="75" y="73" font-size="7" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">预期：8.5万（翻倍）</text>
  <text x="17" y="86" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">前值上修9.3万 · 失业率4.3%持平</text>

  <rect x="12" y="96" width="136" height="14" rx="3" fill="#FEF2F2"/>
  <text x="17" y="107" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">10月加息概率近60% · 降息预期终结</text>

  <rect x="12" y="114" width="136" height="14" rx="3" fill="#FEF2F2"/>
  <text x="17" y="125" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">费城半导体 -4.43% / 美债4.54%</text>

  <rect x="12" y="132" width="136" height="14" rx="3" fill="#FEF2F2"/>
  <text x="17" y="143" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">黄金 4470 → 4405（暴跌50美元）</text>

  <!-- Divider -->
  <line x1="150" y1="38" x2="150" y2="175" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Right: 北证50暴涨 -->
  <text x="158" y="50" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">A股极端分化</text>

  <rect x="158" y="58" width="134" height="20" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="163" y="68" font-size="9" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">北证50</text>
  <text x="210" y="68" font-size="9" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">+5.59%</text>
  <text x="163" y="76" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">成分股普涨 · 盘中涨超7%</text>

  <rect x="158" y="84" width="134" height="14" rx="3" fill="#F0FDF4"/>
  <text x="163" y="95" font-size="6" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">上证 -0.74% / 创业板 -3.20%</text>

  <rect x="158" y="102" width="134" height="14" rx="3" fill="#FFFBEB"/>
  <text x="163" y="113" font-size="6" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">3200+个股上涨 · 84只涨停</text>

  <rect x="158" y="120" width="134" height="14" rx="3" fill="#EFF6FF"/>
  <text x="163" y="131" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">中际旭创成交583亿（A股历史第四）</text>

  <rect x="158" y="138" width="134" height="14" rx="3" fill="#FAF5FF"/>
  <text x="163" y="149" font-size="6" fill="#6B21A8" font-family="PingFang SC, Microsoft YaHei, sans-serif">机器人涨停潮 · 物理AI新方向</text>

  <!-- Bottom insight -->
  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 非农实际值是预期的两倍+前值上修——市场从"降息"转向"加息"的拐点正式确立</text>
  <text x="20" y="206" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   指数跌≠全市场跌，结构性机会依然存在</text>
</svg>
