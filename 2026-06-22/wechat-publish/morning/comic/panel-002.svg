<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 512" width="768" height="512" font-family="Microsoft YaHei, SimHei, sans-serif">
  <rect width="768" height="512" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="384" y="36" text-anchor="middle" fill="#1E293B" font-size="18" font-weight="700">黄金三周连跌：利率预期的跷跷板效应</text>
  <line x1="200" y1="48" x2="568" y2="48" stroke="#1A56DB" stroke-width="2"/>

  <!-- Seesaw / 跷跷板 -->
  <!-- Triangle fulcrum -->
  <polygon points="384,380 354,420 414,420" fill="#64748B"/>
  <!-- Seesaw beam (tilted: left down = gold down, right up = dollar up) -->
  <line x1="150" y1="330" x2="618" y2="300" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <!-- Left side: Gold falling (lower) -->
  <rect x="80" y="340" width="140" height="70" rx="8" fill="#FFF5F5" stroke="#DC2626" stroke-width="1.5"/>
  <text x="150" y="365" text-anchor="middle" fill="#DC2626" font-size="14" font-weight="700">黄金 ↓</text>
  <text x="150" y="388" text-anchor="middle" fill="#991B1B" font-size="11">,300 → ,150</text>

  <!-- Right side: Dollar rising (higher) -->
  <rect x="548" y="260" width="140" height="70" rx="8" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1.5"/>
  <text x="618" y="285" text-anchor="middle" fill="#1A56DB" font-size="14" font-weight="700">美元 ↑</text>
  <text x="618" y="308" text-anchor="middle" fill="#1E40AF" font-size="11">DXY 100.81</text>

  <!-- Three downward arrows on gold side -->
  <text x="60" y="345" fill="#DC2626" font-size="18">W1</text>
  <text x="60" y="372" fill="#DC2626" font-size="18">W2</text>
  <text x="60" y="399" fill="#DC2626" font-size="18">W3</text>

  <!-- Driver labels -->
  <rect x="230" y="70" width="308" height="160" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="384" y="95" text-anchor="middle" fill="#1E293B" font-size="13" font-weight="700">三重压力叠加</text>

  <!-- Driver 1 -->
  <circle cx="260" cy="118" r="4" fill="#DC2626"/>
  <text x="272" y="122" fill="#475569" font-size="11">加息概率 83.1% → 实际利率预期↑</text>

  <!-- Driver 2 -->
  <circle cx="260" cy="148" r="4" fill="#1A56DB"/>
  <text x="272" y="152" fill="#475569" font-size="11">美元走强 → 非美投资者抛售黄金</text>

  <!-- Driver 3 -->
  <circle cx="260" cy="178" r="4" fill="#16A34A"/>
  <text x="272" y="182" fill="#475569" font-size="11">美伊和谈 → 地缘避险溢价消退</text>

  <!-- Goldman target cut -->
  <text x="384" y="215" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="600">高盛：金价目标 ,400 → ,900</text>

  <!-- Bottom insight -->
  <rect x="100" y="440" width="568" height="55" rx="8" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1.5"/>
  <text x="384" y="462" text-anchor="middle" fill="#1E40AF" font-size="13" font-weight="700">核心认知：黄金不是避险资产，是利率预期资产</text>
  <text x="384" y="482" text-anchor="middle" fill="#475569" font-size="11">利率预期↑ = 黄金↓ | 本周PCE数据将决定,000是目标还是底线</text>

  <!-- Branding -->
  <text x="384" y="504" text-anchor="middle" fill="#94A3B8" font-size="10">扬说财经 · 早报 · 2026.06.22</text>
</svg>