<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFFBEB"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="divGrd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="600" height="420" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#92400E">同一个A股，两个世界</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#B45309">5月收官：科创50涨11% vs 近4000只个股月线收跌</text>

  <!-- Divider line -->
  <line x1="40" y1="55" x2="560" y2="55" stroke="url(#divGrd)" stroke-width="2"/>

  <!-- ===== 左：科创50涨11% ===== -->
  <rect x="30" y="68" width="260" height="155" rx="10" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="68" width="260" height="32" rx="10" fill="#DC2626"/>
  <rect x="30" y="88" width="260" height="12" fill="#DC2626"/>
  <text x="160" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🔥 科创50 月涨 +11%</text>

  <!-- Bar chart - upward -->
  <g transform="translate(50, 110)">
    <rect x="5" y="50" width="28" height="40" rx="3" fill="#FCA5A5" opacity="0.7"/>
    <rect x="38" y="42" width="28" height="48" rx="3" fill="#F87171" opacity="0.8"/>
    <rect x="71" y="32" width="28" height="58" rx="3" fill="#EF4444" opacity="0.85"/>
    <rect x="104" y="22" width="28" height="68" rx="3" fill="#DC2626" opacity="0.9"/>
    <rect x="137" y="10" width="28" height="80" rx="3" fill="url(#fire)"/>
    <rect x="170" y="20" width="28" height="70" rx="3" fill="#EF4444" opacity="0.8"/>
    <rect x="203" y="15" width="28" height="75" rx="3" fill="#DC2626" opacity="0.85"/>
  </g>
  <text x="160" y="215" text-anchor="middle" font-size="10" fill="#991B1B">科创50 5月周线走势</text>

  <!-- ===== 中：584 VS 4000 ===== -->
  <rect x="105" y="233" width="110" height="38" rx="8" fill="#FEF2C7" stroke="#D4A017" stroke-width="1"/>
  <text x="160" y="258" text-anchor="middle" font-size="20" font-weight="800" fill="#92400E">584</text>
  <text x="160" y="277" text-anchor="middle" font-size="10" fill="#B45309">家公司创历史新高</text>

  <!-- VS -->
  <text x="265" y="258" text-anchor="middle" font-size="22" font-weight="800" fill="#DC2626">VS</text>

  <rect x="355" y="233" width="140" height="38" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="425" y="258" text-anchor="middle" font-size="20" font-weight="800" fill="#1D4ED8">4,000+</text>
  <text x="425" y="277" text-anchor="middle" font-size="10" fill="#3B82F6">家公司月线收跌</text>

  <!-- ===== 右：结构分化 ===== -->
  <line x1="30" y1="290" x2="570" y2="290" stroke="#E2E8F0" stroke-width="1"/>

  <text x="300" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">资金大迁徙：从科技→消费/电力</text>

  <!-- Block 1: 主线 -->
  <rect x="30" y="322" width="170" height="82" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="115" y="342" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">🚀 5月主线 AI算力/半导体</text>
  <text x="115" y="360" text-anchor="middle" font-size="10" fill="#7F1D1D">科创50 +11%领跑全球</text>
  <text x="115" y="376" text-anchor="middle" font-size="10" fill="#7F1D1D">584家公司创历史新高</text>
  <text x="115" y="392" text-anchor="middle" font-size="10" fill="#DC2626">但上周五半导体暴跌5%</text>

  <!-- Block 2: 切换 -->
  <rect x="215" y="322" width="170" height="82" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="300" y="342" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">🔄 资金切换方向</text>
  <text x="300" y="360" text-anchor="middle" font-size="10" fill="#78350F">电力板块涨停潮（8只）</text>
  <text x="300" y="376" text-anchor="middle" font-size="10" fill="#78350F">白酒/消费逆势走强</text>
  <text x="300" y="392" text-anchor="middle" font-size="10" fill="#78350F">地产万科A涨停</text>

  <!-- Block 3: PMI -->
  <rect x="400" y="322" width="170" height="82" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="485" y="342" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">📊 PMI 50.0%临界点</text>
  <text x="485" y="360" text-anchor="middle" font-size="10" fill="#1E3A5F">制造业PMI较上月↓0.3</text>
  <text x="485" y="376" text-anchor="middle" font-size="10" fill="#1E3A5F">新订单指数 49.8%收缩</text>
  <text x="485" y="392" text-anchor="middle" font-size="10" fill="#1E3A5F">非制造业 50.1%回升</text>

  <!-- 阿扬 -->
  <g transform="translate(10, 5)">
    <circle cx="20" cy="18" r="14" fill="#FCD34D"/>
    <circle cx="15" cy="15" r="2" fill="#1E293B"/>
    <circle cx="26" cy="15" r="2" fill="#1E293B"/>
    <path d="M14 24 Q20 29 26 24" stroke="#1E293B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <text x="580" y="410" text-anchor="end" font-size="10" fill="#A8A29E">扬说 · 2026.06.01</text>
</svg>