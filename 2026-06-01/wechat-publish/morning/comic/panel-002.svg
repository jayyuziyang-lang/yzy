<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="barGrd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="barLast" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="dowGrd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrUp" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,10 L5,0 L10,10 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <rect width="600" height="420" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">标普500九周连涨创纪录</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#166534">2023年12月以来最长周度连涨 · 道指首次站稳51,000</text>

  <line x1="40" y1="55" x2="560" y2="55" stroke="#4ADE80" stroke-width="2"/>

  <!-- ===== 周线柱状图 ===== -->
  <text x="300" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">标普500 周线连涨纪录</text>

  <g transform="translate(40, 84)">
    <!-- Background bar area -->
    <rect x="0" y="0" width="520" height="92" rx="8" fill="none"/>

    <!-- 9 week bars -->
    <rect x="10" y="52" width="38" height="28" rx="3" fill="#BBF7D0" opacity="0.6"/>
    <rect x="58" y="46" width="38" height="34" rx="3" fill="#86EFAC" opacity="0.65"/>
    <rect x="106" y="42" width="38" height="38" rx="3" fill="#4ADE80" opacity="0.7"/>
    <rect x="154" y="38" width="38" height="42" rx="3" fill="#22C55E" opacity="0.75"/>
    <rect x="202" y="34" width="38" height="46" rx="3" fill="#16A34A" opacity="0.8"/>
    <rect x="250" y="30" width="38" height="50" rx="3" fill="#16A34A" opacity="0.85"/>
    <rect x="298" y="26" width="38" height="54" rx="3" fill="#15803D" opacity="0.9"/>
    <rect x="346" y="20" width="38" height="60" rx="3" fill="#15803D" opacity="0.95"/>
    <rect x="394" y="12" width="38" height="68" rx="3" fill="url(#barLast)" filter="url(#glow)"/>

    <!-- 第9周标注 -->
    <text x="413" y="8" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">第9周</text>
    <line x1="413" y1="10" x2="413" y2="12" stroke="#16A34A" stroke-width="1.5"/>

    <!-- X-axis label -->
    <text x="260" y="98" text-anchor="middle" font-size="10" fill="#4B5563">4月初 ─────────────────────────── 5月底</text>

    <!-- Arrow up -->
    <line x1="470" y1="35" x2="510" y2="15" stroke="#16A34A" stroke-width="2" marker-end="url(#arrUp)"/>
    <text x="510" y="10" text-anchor="end" font-size="11" font-weight="700" fill="#16A34A">+5.15%</text>
  </g>

  <!-- ===== 月度表现 ===== -->
  <rect x="30" y="190" width="540" height="44" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="210" font-size="12" font-weight="700" fill="#166534">5月表现</text>
  <text x="60" y="226" font-size="10" fill="#4B5563">标普500</text>
  <text x="150" y="224" text-anchor="end" font-size="14" font-weight="700" fill="#16A34A">+5.15%</text>
  <line x1="170" y1="196" x2="170" y2="228" stroke="#D1FAE5" stroke-width="1"/>
  <text x="210" y="226" font-size="10" fill="#4B5563">纳斯达克</text>
  <text x="295" y="224" text-anchor="end" font-size="14" font-weight="700" fill="#16A34A">+8.36%</text>
  <line x1="315" y1="196" x2="315" y2="228" stroke="#D1FAE5" stroke-width="1"/>
  <text x="355" y="226" font-size="10" fill="#4B5563">道琼斯</text>
  <text x="430" y="224" text-anchor="end" font-size="14" font-weight="700" fill="#16A34A">+2.78%</text>
  <line x1="450" y1="196" x2="450" y2="228" stroke="#D1FAE5" stroke-width="1"/>
  <text x="485" y="226" font-size="10" fill="#4B5563">费城半导体</text>
  <text x="555" y="224" text-anchor="end" font-size="14" font-weight="700" fill="#16A34A">+22.14%</text>

  <!-- ===== Dell暴涨 ===== -->
  <rect x="30" y="245" width="540" height="76" rx="10" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="245" width="540" height="28" rx="10" fill="#DC2626"/>
  <rect x="30" y="261" width="540" height="12" fill="#DC2626"/>
  <text x="300" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🚀 戴尔科技单日暴涨 32.8% · 创上市以来最大涨幅</text>

  <text x="55" y="294" font-size="11" font-weight="700" fill="#991B1B">Q1营收</text>
  <text x="55" y="310" font-size="12" fill="#7F1D1D">$438亿</text>

  <text x="155" y="294" font-size="11" font-weight="700" fill="#991B1B">AI服务器收入</text>
  <text x="155" y="310" font-size="12" fill="#DC2626">$161亿 +757%</text>

  <text x="290" y="294" font-size="11" font-weight="700" fill="#991B1B">积压订单</text>
  <text x="290" y="310" font-size="12" fill="#7F1D1D">$513亿 创纪录</text>

  <text x="410" y="294" font-size="11" font-weight="700" fill="#991B1B">2026全年指引</text>
  <text x="410" y="310" font-size="12" fill="#7F1D1D">$1,650-1,690亿</text>

  <!-- ===== 风险提示 ===== -->
  <rect x="30" y="332" width="540" height="36" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="45" y="352" font-size="11" fill="#92400E">⚠️ 连涨9周后市场对利空敏感度上升 · 6月为传统弱月 · 本周关注5月非农数据（预期新增就业8.9-10万人）</text>

  <!-- AI同涨 -->
  <rect x="30" y="376" width="260" height="32" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="160" y="396" text-anchor="middle" font-size="11" fill="#166534">HPE +12.6% · 超微电脑 +11.6%</text>

  <rect x="310" y="376" width="260" height="32" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="440" y="396" text-anchor="middle" font-size="11" fill="#991B1B">Gap -15.4% · AEO -11.8%（消费疲软）</text>

  <text x="580" y="415" text-anchor="end" font-size="10" fill="#A8A29E">扬说 · 2026.06.01</text>
</svg>