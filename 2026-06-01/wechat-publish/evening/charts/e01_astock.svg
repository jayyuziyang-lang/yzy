<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FAFAFA"/><stop offset="100%" stop-color="#F5F5F4"/></linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#EF4444"/><stop offset="100%" stop-color="#DC2626"/></linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#16A34A"/></linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg1)" rx="8"/>
  <text x="300" y="32" text-anchor="middle" fill="#1E293B" font-size="18" font-weight="700">今日A股全景 · 指数与个股严重分化</text>
  <text x="300" y="52" text-anchor="middle" fill="#94A3B8" font-size="12">2026年6月1日 收盘数据</text>

  <!-- Index bars -->
  <text x="300" y="80" text-anchor="middle" fill="#64748B" font-size="13" font-weight="600">主要指数表现</text>
  <rect x="80" y="92" width="100" height="28" rx="5" fill="#FEF2F2"/>
  <text x="130" y="111" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">上证</text>
  <text x="130" y="140" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="700">4,057</text>
  <text x="130" y="158" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="600">-0.27%</text>

  <rect x="200" y="92" width="100" height="28" rx="5" fill="#FEF2F2"/>
  <text x="250" y="111" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">深证</text>
  <text x="250" y="140" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="700">15,340</text>
  <text x="250" y="158" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="600">-1.51%</text>

  <rect x="320" y="92" width="100" height="28" rx="5" fill="#FEF2F2"/>
  <text x="370" y="111" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">创业板</text>
  <text x="370" y="140" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="700">3,950</text>
  <text x="370" y="158" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="600">-2.15%</text>

  <rect x="440" y="92" width="100" height="28" rx="5" fill="#7F1D1D"/>
  <text x="490" y="111" text-anchor="middle" fill="#FCA5A5" font-size="12" font-weight="600">科创50</text>
  <text x="490" y="140" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="700">1,663</text>
  <text x="490" y="158" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="600">-5.00%</text>

  <line x1="40" y1="175" x2="560" y2="175" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Divider -->
  <text x="60" y="200" fill="#64748B" font-size="12" font-weight="600">个股情况</text>
  <rect x="50" y="210" width="240" height="28" rx="6" fill="#F0FDF4"/>
  <text x="170" y="229" text-anchor="middle" fill="#16A34A" font-size="13" font-weight="600">上涨 3,774 只</text>
  <text x="50" y="250" fill="#64748B" font-size="11">涨停 166 只</text>

  <rect x="310" y="210" width="240" height="28" rx="6" fill="#FEF2F2"/>
  <text x="430" y="229" text-anchor="middle" fill="#DC2626" font-size="13" font-weight="600">下跌 1,678 只</text>
  <text x="310" y="250" fill="#64748B" font-size="11">跌停 23 只</text>

  <line x1="40" y1="265" x2="560" y2="265" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Sector flow -->
  <text x="60" y="290" fill="#64748B" font-size="12" font-weight="600">板块资金流向</text>
  <text x="60" y="310" fill="#16A34A" font-size="12">流入：软件开发 +89亿、基础化工 +71亿、AI应用 +68亿</text>
  <text x="60" y="330" fill="#EF4444" font-size="12">流出：半导体 -276亿、通信设备 -65亿</text>
</svg>
