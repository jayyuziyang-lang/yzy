  <text x="115" y="140" text-anchor="middle" fill="#16A34A" font-size="13">+0.72%</text>

  <rect x="215" y="72" width="170" height="80" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
