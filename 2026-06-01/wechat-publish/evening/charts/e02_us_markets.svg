  <line x1="30" y1="165" x2="570" y2="165" stroke="#E2E8F0"/>

  <!-- 5月涨幅 -->
  <text x="300" y="190" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="600">5月累计涨幅</text>
