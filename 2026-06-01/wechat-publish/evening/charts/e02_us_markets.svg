  <rect x="60" y="275" width="480" height="30" rx="5" fill="#F0FDF4"/>
  <text x="100" y="295" fill="#16A34A" font-size="12" font-weight="600">道琼斯</text>
  <text x="560" y="295" text-anchor="end" fill="#16A34A" font-size="14" font-weight="700">+2.78%</text>

