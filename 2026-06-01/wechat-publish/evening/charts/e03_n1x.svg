<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FAFAFA"/><stop offset="100%" stop-color="#F5F3FF"/></linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg3)" rx="8"/>
  <text x="300" y="32" text-anchor="middle" fill="#1E293B" font-size="18" font-weight="700">黄仁勋的PC宣言 · N1X芯片正式发布</text>
  <text x="300" y="52" text-anchor="middle" fill="#94A3B8" font-size="12">2026年6月1日 · GTC Taipei</text>

  <!-- Specs box -->
  <rect x="30" y="72" width="540" height="100" rx="8" fill="#fff" stroke="#D8B4FE" stroke-width="1"/>
  <text x="300" y="92" text-anchor="middle" fill="#9333EA" font-size="14" font-weight="700">N1X 核心规格</text>
  <text x="55" y="115" fill="#475569" font-size="12">制程：<tspan fill="#1E293B" font-weight="600">台积电 3nm</tspan></text>
  <text x="220" y="115" fill="#475569" font-size="12">CPU：<tspan fill="#1E293B" font-weight="600">20核 (10性能+10能效)</tspan></text>
  <text x="420" y="115" fill="#475569" font-size="12">AI算力：<tspan fill="#1E293B" font-weight="600">200 TOPS</tspan></text>
  <text x="55" y="138" fill="#475569" font-size="12">GPU：<tspan fill="#1E293B" font-weight="600">Blackwell · 6144 CUDA</tspan></text>
  <text x="220" y="138" fill="#475569" font-size="12">内存：<tspan fill="#1E293B" font-weight="600">128GB LPDDR5X</tspan></text>
  <text x="420" y="138" fill="#475569" font-size="12">合作方：<tspan fill="#1E293B" font-weight="600">联发科</tspan></text>

  <!-- Key partners -->
  <rect x="30" y="185" width="540" height="42" rx="8" fill="#FAF5FF"/>
  <text x="300" y="205" text-anchor="middle" fill="#9333EA" font-size="12" font-weight="600">首批品牌</text>
  <text x="300" y="221" text-anchor="middle" fill="#475569" font-size="12">微软Surface · 戴尔 · 惠普 · 华硕 · 联想 · 微星</text>

  <line x1="30" y1="237" x2="570" y2="237" stroke="#E2E8F0"/>

  <!-- Key insight -->
  <text x="300" y="262" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="600">关键判断</text>
  <rect x="30" y="275" width="260" height="50" rx="8" fill="#FEF3C7"/>
  <text x="160" y="295" text-anchor="middle" fill="#92400E" font-size="11" font-weight="600">郭明錤预测</text>
  <text x="160" y="313" text-anchor="middle" fill="#92400E" font-size="11">未来两年出货约1000万台</text>
  <text x="160" y="323" text-anchor="middle" fill="#92400E" font-size="10">PC市场渗透率不到5%</text>

  <rect x="310" y="275" width="260" height="50" rx="8" fill="#F0FDF4"/>
  <text x="440" y="295" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">市场反应</text>
  <text x="440" y="313" text-anchor="middle" fill="#166534" font-size="11">A股AI PC概念涨停潮</text>
  <text x="440" y="323" text-anchor="middle" fill="#166534" font-size="10">春秋电子2连板 · 雷神科技涨停</text>
</svg>
