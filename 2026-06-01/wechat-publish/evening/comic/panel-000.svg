<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="redLight" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FEF2F2"/><stop offset="100%" stop-color="#FFFFFF"/></linearGradient>
    <linearGradient id="greenLight" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F0FDF4"/><stop offset="100%" stop-color="#FFFFFF"/></linearGradient>
    <linearGradient id="blueLight" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#FFFFFF"/></linearGradient>
    <linearGradient id="headerRed" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#EF4444"/><stop offset="100%" stop-color="#DC2626"/></linearGradient>
    <linearGradient id="headerGreen" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#16A34A"/></linearGradient>
    <linearGradient id="headerBlue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#2563EB"/></linearGradient>
