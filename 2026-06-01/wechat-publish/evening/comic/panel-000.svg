  <text x="665" y="104" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">📅 本周关注</text>

  <rect x="570" y="128" width="190" height="22" rx="5" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="0.5"/>
  <text x="665" y="143" text-anchor="middle" fill="#1D4ED8" font-size="10" font-weight="600">周一 · N1X发布 ✓</text>
  <rect x="570" y="154" width="190" height="22" rx="5" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="0.5"/>
