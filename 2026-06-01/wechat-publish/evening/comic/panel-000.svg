<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei','SimHei',sans-serif">
  <defs>
    <!-- Background -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFBEB"/><stop offset="100%" stop-color="#FFFFFF"/></linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FEE2E2"/><stop offset="100%" stop-color="#FEF2F2"/></linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#DCFCE7"/><stop offset="100%" stop-color="#F0FDF4"/></linearGradient>
  </defs>

  <!-- White background -->
  <rect width="800" height="500" fill="url(#sky)" rx="12"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#E2E8F0" stroke-width="1" rx="12"/>

  <!-- Title banner -->
  <rect x="0" y="0" width="800" height="44" fill="#1E293B" rx="12"/>
  <rect x="0" y="20" width="800" height="24" fill="#1E293B"/>
  <text x="400" y="29" text-anchor="middle" fill="#FDE68A" font-size="17" font-weight="700" letter-spacing="2">🎨 六月第一日 · 风格切换确认</text>

  <!-- ============================================================ -->
  <!-- PANEL 1: "五月主角退场" (Left) -->
  <!-- ============================================================ -->
  <rect x="30" y="60" width="240" height="310" rx="10" fill="url(#redGrad)" stroke="#FECACA" stroke-width="1.5"/>
  <rect x="30" y="60" width="240" height="32" rx="10" fill="#EF4444" opacity="0.9"/>
  <rect x="30" y="82" width="240" height="10" fill="#EF4444" opacity="0.9"/>
  <text x="150" y="82" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">📉 五月的主角在退场</text>

  <!-- Character: Sad chip/semiconductor person -->
  <!-- Body (chip shape) -->
  <rect x="100" y="110" width="100" height="80" rx="8" fill="#475569" stroke="#334155" stroke-width="2"/>
  <rect x="110" y="120" width="80" height="60" rx="4" fill="#64748B"/>
  <!-- Legs -->
  <rect x="115" y="190" width="15" height="40" rx="5" fill="#475569"/>
  <rect x="170" y="190" width="15" height="40" rx="5" fill="#475569"/>
  <!-- Arms -->
  <rect x="85" y="130" width="18" height="8" rx="4" fill="#475569"/>
  <rect x="197" y="130" width="18" height="8" rx="4" fill="#475569"/>
  <!-- Sad face -->
  <circle cx="130" cy="150" r="4" fill="#fff"/>
  <circle cx="170" cy="150" r="4" fill="#fff"/>
  <path d="M130 170 Q150 160 170 170" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Tears -->
  <circle cx="125" cy="160" r="3" fill="#93C5FD" opacity="0.7"/>
  <circle cx="175" cy="160" r="3" fill="#93C5FD" opacity="0.7"/>
  <!-- Label on chip -->
  <text x="150" y="155" text-anchor="middle" fill="#94A3B8" font-size="9">半导体</text>

  <!-- Walking away footprints -->
  <ellipse cx="60" cy="230" rx="12" ry="4" fill="#CBD5E1" opacity="0.5"/>
  <ellipse cx="50" cy="245" rx="10" ry="3" fill="#CBD5E1" opacity="0.4"/>
  <ellipse cx="45" cy="260" rx="8" ry="3" fill="#CBD5E1" opacity="0.3"/>

  <!-- Flowing numbers going down -->
  <text x="110" y="270" fill="#EF4444" font-size="13" font-weight="700">-276亿</text>
  <text x="60" y="295" fill="#EF4444" font-size="11">半导体净流出</text>
  <text x="60" y="315" fill="#EF4444" font-size="11">通信设备 -65亿</text>
  <text x="60" y="335" fill="#EF4444" font-size="11">科创50连跌5%</text>

  <!-- Downtrend arrow -->
  <path d="M100 355 L200 355" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="200,350 210,355 200,360" fill="#EF4444"/>

  <!-- ============================================================ -->
  <!-- Center Arrow Area -->
  <!-- ============================================================ -->
  <text x="285" y="200" font-size="28" fill="#D4A017" font-weight="700">→</text>
  <text x="285" y="225" fill="#D4A017" font-size="11" text-anchor="middle" font-weight="600">资金<br/>切换</text>

  <!-- ============================================================ -->
  <!-- PANEL 2: "六月新角登台" (Middle-Right) -->
  <!-- ============================================================ -->
  <rect x="315" y="60" width="240" height="310" rx="10" fill="url(#greenGrad)" stroke="#BBF7D0" stroke-width="1.5"/>
  <rect x="315" y="60" width="240" height="32" rx="10" fill="#22C55E" opacity="0.9"/>
  <rect x="315" y="82" width="240" height="10" fill="#22C55E" opacity="0.9"/>
  <text x="435" y="82" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">📈 六月的新角已登台</text>

  <!-- Character 1: Coal block (happy) -->
  <rect x="340" y="105" width="55" height="55" rx="10" fill="#1E293B"/>
  <rect x="342" y="107" width="25" height="15" rx="3" fill="#334155"/>
  <rect x="370" y="130" width="15" height="25" rx="3" fill="#334155"/>
  <!-- Happy face -->
  <circle cx="355" cy="125" r="3" fill="#4ADE80"/>
  <circle cx="370" cy="125" r="3" fill="#4ADE80"/>
  <path d="M355 138 Q363 148 370 138" fill="none" stroke="#4ADE80" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="367" y="180" text-anchor="middle" fill="#1E293B" font-size="10" font-weight="600">🔥 煤炭</text>
  <text x="367" y="193" text-anchor="middle" fill="#16A34A" font-size="11" font-weight="700">+6% 七股涨停</text>

  <!-- Character 2: Robot/AI character -->
  <circle cx="430" cy="120" r="20" fill="#7C3AED" opacity="0.85"/>
  <rect x="418" y="140" width="24" height="35" rx="5" fill="#7C3AED" opacity="0.85"/>
  <rect x="421" y="175" width="6" height="20" rx="3" fill="#7C3AED" opacity="0.85"/>
  <rect x="433" y="175" width="6" height="20" rx="3" fill="#7C3AED" opacity="0.85"/>
  <!-- Robot face -->
  <circle cx="424" cy="116" r="3" fill="#C4B5FD"/>
  <circle cx="436" cy="116" r="3" fill="#C4B5FD"/>
  <rect x="425" y="124" width="10" height="3" rx="1" fill="#C4B5FD"/>
  <!-- Antenna -->
  <line x1="430" y1="100" x2="430" y2="95" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="430" cy="92" r="4" fill="#F59E0B"/>
  <text x="440" y="210" text-anchor="middle" fill="#7C3AED" font-size="10" font-weight="600">🤖 AI应用</text>
  <text x="440" y="223" text-anchor="middle" fill="#16A34A" font-size="11" font-weight="700">14只涨停</text>

  <!-- Character 3: Computer/AI PC -->
  <rect x="350" y="240" width="80" height="55" rx="6" fill="#1D4ED8" opacity="0.8"/>
  <rect x="355" y="248" width="70" height="35" rx="3" fill="#DBEAFE"/>
  <rect x="375" y="295" width="30" height="12" rx="3" fill="#1D4ED8" opacity="0.6"/>
  <text x="390" y="268" text-anchor="middle" fill="#1E3A8A" font-size="9" font-weight="700">AI PC</text>
  <text x="390" y="280" text-anchor="middle" fill="#1E3A8A" font-size="8">N1X发布</text>
  <!-- Sparkle around -->
  <text x="430" y="255" fill="#F59E0B" font-size="14">✨</text>
  <text x="345" y="250" fill="#F59E0B" font-size="10">✨</text>
  <text x="345" y="328" fill="#16A34A" font-size="10">⚡ 电力4连板</text>

  <!-- Uptrend arrow -->
  <path d="M340 355 L530 355" stroke="#16A34A" stroke-width="2"/>
  <polygon points="530,350 540,355 530,360" fill="#16A34A"/>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: Key Takeaways -->
  <!-- ============================================================ -->
  <rect x="570" y="60" width="200" height="310" rx="10" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <rect x="570" y="60" width="200" height="32" rx="10" fill="#F97316" opacity="0.9"/>
  <rect x="570" y="82" width="200" height="10" fill="#F97316" opacity="0.9"/>
  <text x="670" y="82" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">📌 关键判断</text>

  <text x="670" y="115" text-anchor="middle" fill="#1E293B" font-size="12" font-weight="600">风格切换确认</text>
  <text x="670" y="135" text-anchor="middle" fill="#64748B" font-size="11">五月退场 · 六月登场</text>

  <line x1="585" y1="148" x2="755" y2="148" stroke="#FED7AA" stroke-width="1"/>

  <text x="670" y="168" text-anchor="middle" fill="#D97706" font-size="12" font-weight="600">本周关注</text>
  <circle cx="592" cy="188" r="4" fill="#F97316"/>
  <text x="600" y="192" fill="#475569" font-size="11">周三 ADP就业</text>
  <circle cx="592" cy="210" r="4" fill="#EF4444"/>
  <text x="600" y="214" fill="#475569" font-size="11">周五 非农 ★★★</text>

  <line x1="585" y1="228" x2="755" y2="228" stroke="#FED7AA" stroke-width="1"/>

  <text x="670" y="250" text-anchor="middle" fill="#64748B" font-size="11">美伊谈判再拉锯</text>
  <text x="670" y="268" text-anchor="middle" fill="#64748B" font-size="11">油价弹回$90</text>
  <text x="670" y="286" text-anchor="middle" fill="#D4A017" font-size="11">黄金$4,527盘整</text>
  <text x="670" y="304" text-anchor="middle" fill="#64748B" font-size="11">PMI 50.0临界点</text>

  <rect x="585" y="320" width="170" height="36" rx="8" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="670" y="338" text-anchor="middle" fill="#92400E" font-size="11" font-weight="600">不追老主线，关注新方向</text>
  <text x="670" y="352" text-anchor="middle" fill="#92400E" font-size="10">半导体退潮 → 煤炭/AI应用接棒</text>

  <!-- ============================================================ -->
  <!-- BOTTOM: 阿扬 character + speech bubble -->
  <!-- ============================================================ -->
  <rect x="30" y="385" width="740" height="100" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>

  <!-- 阿扬 character (simplified cartoon figure) -->
  <!-- Head -->
  <circle cx="85" cy="422" r="25" fill="#FCD34D"/>
  <!-- Hair -->
  <path d="M60 412 Q65 395 85 390 Q105 395 110 412" fill="#1E293B"/>
  <!-- Eyes -->
  <circle cx="78" cy="420" r="3" fill="#1E293B"/>
  <circle cx="92" cy="420" r="3" fill="#1E293B"/>
  <!-- Smile -->
  <path d="M78 430 Q85 438 92 430" fill="none" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>
  <!-- Glasses -->
  <circle cx="78" cy="420" r="8" fill="none" stroke="#475569" stroke-width="1.5"/>
  <circle cx="92" cy="420" r="8" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="86" y1="420" x2="84" y2="420" stroke="#475569" stroke-width="1.5"/>
  <!-- Body -->
  <rect x="70" y="447" width="30" height="30" rx="8" fill="#1A56DB"/>
  <!-- Arms -->
  <rect x="55" y="452" width="18" height="6" rx="3" fill="#FCD34D"/>
  <rect x="97" y="452" width="18" height="6" rx="3" fill="#FCD34D"/>

  <!-- Speech bubble -->
  <path d="M115 395 Q130 380 360 380 L360 380 Q380 380 380 395 L380 440 Q380 455 360 455 L200 455 L175 475 L185 455 L130 455 Q115 455 115 440 Z" fill="#fff" stroke="#D4A017" stroke-width="1.5"/>
  <text x="247" y="415" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="600">💬 六月第一天信号很清晰：</text>
  <text x="247" y="438" text-anchor="middle" fill="#1E293B" font-size="13">半导体退潮、煤炭暴涨、AI应用接棒</text>
  <text x="247" y="458" text-anchor="middle" fill="#D4A017" font-size="12" font-weight="600">→ 关注低位新方向，不追老主线 ←</text>

  <!-- Footer -->
  <text x="400" y="492" text-anchor="middle" fill="#94A3B8" font-size="9">扬说财经 · 2026.06.01 晚报 | 数据来源：东方财富/每日经济新闻/证券时报</text>
</svg>
