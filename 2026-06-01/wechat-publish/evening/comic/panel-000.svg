<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1E293B"/><stop offset="100%" stop-color="#0F172A"/></linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EF4444"/><stop offset="100%" stop-color="#B91C1C"/></linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#15803D"/></linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#1D4ED8"/></linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F97316"/><stop offset="100%" stop-color="#EA580C"/></linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700" letter-spacing="2">📊 六月第一日 · 风格切换确认</text>
  <text x="400" y="64" text-anchor="middle" fill="#94A3B8" font-size="13">2026年6月1日 | 3774只上涨 · 166只涨停 · 但三大指数齐跌</text>

  <!-- Left section: 指数跌 -->
  <rect x="40" y="85" width="230" height="295" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" opacity="0.9"/>
  <rect x="40" y="85" width="230" height="40" rx="12" fill="url(#redGrad)" opacity="0.8"/>
  <rect x="40" y="113" width="230" height="12" fill="url(#redGrad)" opacity="0.8"/>
  <text x="155" y="112" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">📉 指数在跌</text>

  <text x="60" y="152" fill="#FCA5A5" font-size="14" font-weight="600">上证指数</text>
  <text x="240" y="152" text-anchor="end" fill="#F87171" font-size="14" font-weight="700">-0.27%</text>
  <line x1="60" y1="160" x2="250" y2="160" stroke="#334155" stroke-width="0.5"/>

  <text x="60" y="180" fill="#FCA5A5" font-size="14" font-weight="600">深证成指</text>
  <text x="240" y="180" text-anchor="end" fill="#F87171" font-size="14" font-weight="700">-1.51%</text>
  <line x1="60" y1="188" x2="250" y2="188" stroke="#334155" stroke-width="0.5"/>

  <text x="60" y="208" fill="#FCA5A5" font-size="14" font-weight="600">创业板指</text>
  <text x="240" y="208" text-anchor="end" fill="#F87171" font-size="14" font-weight="700">-2.15%</text>
  <line x1="60" y1="216" x2="250" y2="216" stroke="#334155" stroke-width="0.5"/>

  <text x="60" y="236" fill="#FCA5A5" font-size="14" font-weight="600">科创50</text>
  <text x="240" y="236" text-anchor="end" fill="#F87171" font-size="14" font-weight="700">-5.00%</text>

  <!-- Left bottom: 被砸的板块 -->
  <rect x="55" y="260" width="200" height="24" rx="6" fill="#7F1D1D" opacity="0.6"/>
  <text x="155" y="276" text-anchor="middle" fill="#FCA5A5" font-size="11">半导体净流出 -276亿</text>
  <rect x="55" y="288" width="200" height="24" rx="6" fill="#7F1D1D" opacity="0.6"/>
  <text x="155" y="304" text-anchor="middle" fill="#FCA5A5" font-size="11">通信设备净流出 -65亿</text>
  <rect x="55" y="316" width="200" height="24" rx="6" fill="#7F1D1D" opacity="0.6"/>
  <text x="155" y="332" text-anchor="middle" fill="#FCA5A5" font-size="11">科创50连续两日跌5%</text>

  <!-- Arrow in the middle -->
  <text x="290" y="230" font-size="36" fill="#D4A017" font-weight="700">→</text>
  <text x="290" y="255" fill="#D4A017" font-size="11" text-anchor="middle" font-weight="600">资金切换</text>

  <!-- Right section: 个股在涨 -->
  <rect x="340" y="85" width="240" height="295" rx="12" fill="#1E293B" stroke="#22C55E" stroke-width="1.5" opacity="0.9"/>
  <rect x="340" y="85" width="240" height="40" rx="12" fill="url(#greenGrad)" opacity="0.8"/>
  <rect x="340" y="113" width="240" height="12" fill="url(#greenGrad)" opacity="0.8"/>
  <text x="460" y="112" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">📈 个股在涨</text>

  <text x="360" y="152" fill="#86EFAC" font-size="14" font-weight="600">上涨个股</text>
  <text x="555" y="152" text-anchor="end" fill="#4ADE80" font-size="18" font-weight="700">3,774</text>
  <line x1="360" y1="160" x2="560" y2="160" stroke="#334155" stroke-width="0.5"/>

  <text x="360" y="183" fill="#86EFAC" font-size="14" font-weight="600">涨停家数</text>
  <text x="555" y="183" text-anchor="end" fill="#4ADE80" font-size="18" font-weight="700">166</text>

  <!-- Right bottom: 资金去了哪里 -->
  <rect x="355" y="210" width="210" height="24" rx="6" fill="#14532D" opacity="0.6"/>
  <text x="460" y="226" text-anchor="middle" fill="#86EFAC" font-size="11">🔥 煤炭 +6% · 7股涨停</text>
  <rect x="355" y="238" width="210" height="24" rx="6" fill="#14532D" opacity="0.6"/>
  <text x="460" y="254" text-anchor="middle" fill="#86EFAC" font-size="11">🤖 AI应用 14只涨停</text>
  <rect x="355" y="266" width="210" height="24" rx="6" fill="#14532D" opacity="0.6"/>
  <text x="460" y="282" text-anchor="middle" fill="#86EFAC" font-size="11">💻 AI PC 涨停潮</text>
  <rect x="355" y="294" width="210" height="24" rx="6" fill="#14532D" opacity="0.6"/>
  <text x="460" y="310" text-anchor="middle" fill="#86EFAC" font-size="11">⚡ 电力 粤电力A 4连板</text>

  <!-- Right insight panel -->
  <rect x="340" y="340" width="240" height="40" rx="8" fill="#D4A017" opacity="0.15"/>
  <text x="460" y="358" text-anchor="middle" fill="#FDE68A" font-size="12" font-weight="600">💡 风格切换确认：五月退场，六月登场</text>
  <text x="460" y="373" text-anchor="middle" fill="#FDE68A" font-size="11">半导体退潮 → AI应用+煤炭+电力接棒</text>

  <!-- Right section: 本周关注 -->
  <rect x="610" y="85" width="160" height="295" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
  <rect x="610" y="85" width="160" height="40" rx="12" fill="url(#blueGrad)" opacity="0.8"/>
  <rect x="610" y="113" width="160" height="12" fill="url(#blueGrad)" opacity="0.8"/>
  <text x="690" y="112" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">📅 本周关注</text>

  <rect x="625" y="140" width="130" height="20" rx="5" fill="#1E3A5F" opacity="0.6"/>
  <text x="690" y="154" text-anchor="middle" fill="#93C5FD" font-size="10">周一 · N1X发布 ✓</text>

  <rect x="625" y="166" width="130" height="20" rx="5" fill="#1E3A5F" opacity="0.6"/>
  <text x="690" y="180" text-anchor="middle" fill="#93C5FD" font-size="10">周三 · ADP就业</text>

  <rect x="625" y="192" width="130" height="20" rx="5" fill="#1E3A5F" opacity="0.6"/>
  <text x="690" y="206" text-anchor="middle" fill="#93C5FD" font-size="10">周五 · 非农 ★★★</text>

  <line x1="625" y1="218" x2="755" y2="218" stroke="#334155" stroke-width="0.5"/>

  <text x="690" y="240" text-anchor="middle" fill="#93C5FD" font-size="10">美伊谈判再拉锯</text>
  <text x="690" y="258" text-anchor="middle" fill="#93C5FD" font-size="10">油价弹回$90</text>
  <text x="690" y="276" text-anchor="middle" fill="#93C5FD" font-size="10">黄金$4,527盘整</text>
  <text x="690" y="294" text-anchor="middle" fill="#93C5FD" font-size="10">PMI 50.0临界点</text>

  <rect x="625" y="315" width="130" height="50" rx="8" fill="#D4A017" opacity="0.12"/>
  <text x="690" y="335" text-anchor="middle" fill="#FDE68A" font-size="10" font-weight="600">关键判断</text>
  <text x="690" y="353" text-anchor="middle" fill="#FDE68A" font-size="9">关注低位启动方向</text>
  <text x="690" y="365" text-anchor="middle" fill="#FDE68A" font-size="9">不追还在跌的老主线</text>

  <!-- Footer -->
  <text x="400" y="392" text-anchor="middle" fill="#64748B" font-size="10">扬说财经 · 2026.06.01 晚报 | 数据来源：东方财富/每日经济新闻/证券时报</text>
</svg>
