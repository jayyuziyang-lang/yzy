  <rect x="570" y="180" width="190" height="22" rx="5" fill="#FFF7ED" stroke="#FED7AA" stroke-width="0.5"/>
  <text x="665" y="195" text-anchor="middle" fill="#D97706" font-size="10" font-weight="600">周五 · 非农 ★★★</text>

  <line x1="570" y1="212" x2="760" y2="212" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="665" y="232" text-anchor="middle" fill="#475569" font-size="10">美伊谈判再拉锯</text>
  <text x="665" y="250" text-anchor="middle" fill="#475569" font-size="10">油价弹回$90</text>
  <text x="665" y="268" text-anchor="middle" fill="#475569" font-size="10">黄金$4,527盘整</text>
  <text x="665" y="286" text-anchor="middle" fill="#475569" font-size="10">PMI 50.0临界点</text>

  <rect x="570" y="310" width="190" height="58" rx="8" fill="#FEF3C7" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="665" y="328" text-anchor="middle" fill="#92400E" font-size="10" font-weight="600">关键判断</text>
  <text x="665" y="345" text-anchor="middle" fill="#92400E" font-size="9">关注低位启动方向</text>
  <text x="665" y="360" text-anchor="middle" fill="#92400E" font-size="9">不追还在跌的老主线</text>

  <!-- Footer -->
  <text x="400" y="392" text-anchor="middle" fill="#94A3B8" font-size="9">扬说财经 · 2026.06.01 晚报 | 数据来源：东方财富/每日经济新闻/证券时报</text>
