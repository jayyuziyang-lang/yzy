  <text x="415" y="355" text-anchor="middle" fill="#92400E" font-size="11" font-weight="600">💡 风格切换确认：五月退场，六月登场</text>
  <text x="415" y="367" text-anchor="middle" fill="#92400E" font-size="9">半导体退潮 → AI应用+煤炭+电力接棒</text>

