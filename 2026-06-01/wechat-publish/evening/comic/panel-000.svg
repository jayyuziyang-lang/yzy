  <rect x="25" y="106" width="235" height="10" fill="url(#headerRed)"/>
  <text x="143" y="104" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">📉 指数在跌</text>

  <text x="40" y="140" fill="#1E293B" font-size="13" font-weight="600">上证指数</text>
  <text x="245" y="140" text-anchor="end" fill="#EF4444" font-size="13" font-weight="700">-0.27%</text>
  <line x1="40" y1="148" x2="245" y2="148" stroke="#F1F5F9" stroke-width="1"/>

  <text x="40" y="168" fill="#1E293B" font-size="13" font-weight="600">深证成指</text>
  <text x="245" y="168" text-anchor="end" fill="#EF4444" font-size="13" font-weight="700">-1.51%</text>
  <line x1="40" y1="176" x2="245" y2="176" stroke="#F1F5F9" stroke-width="1"/>

  <text x="40" y="196" fill="#1E293B" font-size="13" font-weight="600">创业板指</text>
  <text x="245" y="196" text-anchor="end" fill="#EF4444" font-size="13" font-weight="700">-2.15%</text>
  <line x1="40" y1="204" x2="245" y2="204" stroke="#F1F5F9" stroke-width="1"/>

  <text x="40" y="224" fill="#1E293B" font-size="13" font-weight="600">科创50</text>
  <text x="245" y="224" text-anchor="end" fill="#EF4444" font-size="13" font-weight="700">-5.00%</text>

