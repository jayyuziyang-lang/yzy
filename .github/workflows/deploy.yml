# 扬说财经 · GitHub Pages 自动部署
# 每次推送到 main 分支时自动构建和部署
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Auto-generate article index
        run: python scripts/update-index.py

      - name: Generate deploy version stamp
        run: echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > deploy-version.txt

      - name: Pre-fetch VIX index data (static render)
        run: python scripts/fetch-vix-data.py

      - name: Run site health check
        run: python scripts/site-health.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Warm CDN cache (instant sync)
        run: |
          SITE_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Warming CDN cache for: $SITE_URL"
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "$SITE_URL"
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "${SITE_URL}data/articles.js"
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "${SITE_URL}data/articles.json"
          echo "  CDN cache warmed successfully"
