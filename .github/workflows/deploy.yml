# 扬说财经 · GitHub Pages 自动部署
# 每次推送到 main 分支时自动构建和部署
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Auto-generate article index
        run: python scripts/update-index.py

      - name: Generate deploy version stamp
        run: echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > deploy-version.txt

      - name: Pre-fetch VIX index data (static render)
        run: python scripts/fetch-vix-data.py

      - name: Generate CDN version file (for jsDelivr mirror access)
        run: |
          cat > data/latest-cdn.json << 'JSONEOF'
          {
            "sha": "${{ github.sha }}",
            "date": "$(date +'%Y-%m-%d')",
            "updatedAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "cdnUrl": "https://cdn.jsdmirror.com/gh/jayyuziyang-lang/yzy@${{ github.sha }}/index.html",
            "cdnUrlMain": "https://cdn.jsdmirror.com/gh/jayyuziyang-lang/yzy@main/index.html",
            "githubUrl": "https://jayyuziyang-lang.github.io/yzy/"
          }
          JSONEOF

      - name: Run site health check
        run: python scripts/site-health.py
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Warm CDN cache (instant sync)
        run: |
          SITE_URL="${{ steps.deployment.outputs.page_url }}"
          CDN_URL="https://cdn.jsdmirror.com/gh/jayyuziyang-lang/yzy@main"
          echo "Warming GitHub Pages CDN: $SITE_URL"
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "$SITE_URL" || true
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "${SITE_URL}data/articles.js" || true
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "${SITE_URL}data/articles.json" || true
          echo "Warming CDN mirror (jsDelivr): $CDN_URL"
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "${CDN_URL}/index.html" || true
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "${CDN_URL}/data/articles.js" || true
          curl -s -o /dev/null -w "  %{http_code}  %{url_effective}\n" "${CDN_URL}/data/articles.json" || true
          echo "  CDN cache warmed successfully"

  # 提交 CDN 版本文件回仓库
  commit-cdn-version:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CDN version file
        run: |
          cat > data/latest-cdn.json << JSONEOF
          {
            "sha": "${{ github.sha }}",
            "date": "$(date +'%Y-%m-%d')",
            "updatedAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "cdnUrl": "https://cdn.jsdmirror.com/gh/jayyuziyang-lang/yzy@${{ github.sha }}/index.html",
            "cdnUrlMain": "https://cdn.jsdmirror.com/gh/jayyuziyang-lang/yzy@main/index.html",
            "githubUrl": "https://jayyuziyang-lang.github.io/yzy/"
          }
          JSONEOF
          echo "Generated data/latest-cdn.json"
          cat data/latest-cdn.json

      - name: Commit CDN version file
        run: |
          git config user.name "yang shuo"
          git config user.email "jayyuziyang@gmail.com"
          git add data/latest-cdn.json
          git diff --cached --quiet || git commit -m "Update CDN version file [skip ci]"
          git push
