<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" fill="#D4A017"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">⚡ 全球"利率风暴"：从日债到金价</text>

  <!-- Left: Two key narratives -->
  <text x="12" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">两股力量冲击全球市场</text>

  <!-- Narrative 1: JGB -->
  <rect x="12" y="58" width="136" height="30" rx="4" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="0.5"/>
  <text x="18" y="73" font-size="7" font-weight="700" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">🇯🇵 日债收益率飙升</text>
  <text x="18" y="84" font-size="6" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif">10年期2.74% / 30年期3.97%</text>

  <rect x="12" y="92" width="136" height="22" rx="3" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="18" y="107" font-size="6" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">→ 全球固收重定价 · 套息交易平仓风险</text>

  <!-- Narrative 2: Gold -->
  <rect x="12" y="120" width="136" height="30" rx="4" fill="#FFF7ED" stroke="#FED7AA" stroke-width="0.5"/>
  <text x="18" y="135" font-size="7" font-weight="700" fill="#D97706" font-family="PingFang SC, Microsoft YaHei, sans-serif">🥇 黄金4327 · 持续承压</text>
  <text x="18" y="146" font-size="6" fill="#9A3412" font-family="PingFang SC, Microsoft YaHei, sans-serif">从年内高5477跌超21%，技术性熊市</text>

  <rect x="12" y="154" width="136" height="18" rx="3" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="18" y="166" font-size="6" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">中东冲突中黄金不涨反跌=定价权已转移</text>

  <!-- Divider -->
  <line x1="153" y1="38" x2="153" y2="175" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Right: Key data -->
  <text x="160" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">关键数据</text>

  <!-- 10Y UST -->
  <rect x="160" y="60" width="133" height="26" rx="4" fill="#FFF5F5" stroke="#FECACA" stroke-width="0.5"/>
  <text x="167" y="74" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">10Y美债 4.572%</text>
  <text x="167" y="84" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">创两周新高 · JPM上调至4.7%</text>

  <!-- VIX -->
  <rect x="160" y="92" width="133" height="26" rx="4" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="0.5"/>
  <text x="167" y="106" font-size="7" font-weight="700" fill="#7C3AED" font-family="PingFang SC, Microsoft YaHei, sans-serif">VIX 18.95（-11.90%）</text>
  <text x="167" y="116" font-size="6" fill="#6B21A8" font-family="PingFang SC, Microsoft YaHei, sans-serif">从21.51暴跌，回到20以下</text>

  <!-- Oil -->
  <rect x="160" y="124" width="133" height="26" rx="4" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="167" y="138" font-size="7" font-weight="700" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">WTI 91.35 / 布伦特 93.93</text>
  <text x="167" y="148" font-size="6" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">中东停火+OPEC增产=双压</text>

  <!-- Fed -->
  <rect x="160" y="156" width="133" height="18" rx="3" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.5"/>
  <text x="167" y="169" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">📊 12月加息概率65-70% · 周四CPI定方向</text>

  <!-- Bottom insight -->
  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 黄金已经不再是避险资产——它是"利率预期资产"。中东冲突都不涨，</text>
  <text x="20" y="206" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   说明加息预期已经完全主导了金价定价权。别在加息周期左侧抄底黄金。</text>
</svg>
