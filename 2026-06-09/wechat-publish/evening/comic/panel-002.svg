<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" fill="#7C3AED"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">🤖 Google向Intel下单300万颗TPU</text>

  <!-- Left: The deal -->
  <text x="12" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">超级订单</text>

  <rect x="12" y="58" width="136" height="28" rx="4" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="0.5"/>
  <text x="18" y="73" font-size="7" font-weight="700" fill="#6B21A8" font-family="PingFang SC, Microsoft YaHei, sans-serif">300万颗 TPU · 2028年前交付</text>
  <text x="18" y="84" font-size="6" fill="#7E22CE" font-family="PingFang SC, Microsoft YaHei, sans-serif">这是Intel晶圆代工史上最大订单</text>

  <rect x="12" y="92" width="136" height="28" rx="4" fill="#FFF5F5" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="107" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">Intel股价暴涨12%</text>
  <text x="18" y="118" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">2026年已翻约3倍</text>

  <rect x="12" y="126" width="136" height="28" rx="4" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="18" y="141" font-size="7" font-weight="700" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">台积电产能被占满</text>
  <text x="18" y="152" font-size="6" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">Google等不及——台积电已无产能</text>

  <!-- Divider -->
  <line x1="153" y1="38" x2="153" y2="172" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Right: Impact -->
  <text x="160" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">A股映射 · 半导体涨停潮</text>

  <rect x="160" y="60" width="133" height="16" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="166" y="72" font-size="7" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">沪硅产业 20%涨停（8.6亿净流入）</text>

  <rect x="160" y="80" width="133" height="16" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="166" y="92" font-size="7" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">中芯国际 +4.41%（7.3亿净流入）</text>

  <rect x="160" y="100" width="133" height="16" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="166" y="112" font-size="7" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">深南电路 涨停（7.4亿净流入）</text>

  <rect x="160" y="120" width="133" height="16" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="166" y="132" font-size="7" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">电子化学品 +8.2% 领涨全市场</text>

  <rect x="160" y="140" width="133" height="28" rx="4" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="166" y="155" font-size="7" font-weight="700" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">🇰🇷 KOSPI熔断+4.21%</text>
  <text x="166" y="166" font-size="6" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">韩国扩大做空禁令至半导体/电池</text>

  <!-- Bottom insight -->
  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 AI产业链的瓶颈不在需求端，在供给侧。谁先突破产能限制，谁就吃到下一波红利。</text>
  <text x="20" y="206" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   Intel代工的崛起正在改写全球芯片制造"一超多强"的格局。</text>
</svg>
