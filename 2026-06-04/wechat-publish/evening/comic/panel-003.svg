<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" fill="#D4A017"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">🌍 中东一日三转：停火·跳水·破关</text>

  <!-- Left: Timeline narrative -->
  <text x="12" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">剧情时间线</text>

  <!-- Event 1 -->
  <circle cx="20" cy="70" r="5" fill="#DC2626"/>
  <text x="32" y="74" font-size="7" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">美伊冲突升级 → 霍尔木兹海峡受阻</text>

  <!-- Arrow -->
  <line x1="20" y1="75" x2="20" y2="92" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="14" y="97" font-size="8" fill="#16A34A">↓</text>

  <!-- Event 2 -->
  <circle cx="20" cy="108" r="5" fill="#D4A017"/>
  <text x="32" y="112" font-size="7" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">以黎达成有条件停火</text>

  <!-- Arrow -->
  <line x1="20" y1="113" x2="20" y2="130" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="14" y="135" font-size="8" fill="#16A34A">↓</text>

  <!-- Event 3 -->
  <circle cx="20" cy="146" r="5" fill="#16A34A"/>
  <text x="32" y="150" font-size="7" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">市场反应：原油跳水4% / 黄金破4500</text>

  <!-- Divider -->
  <line x1="145" y1="38" x2="145" y2="170" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Right: Market impact -->
  <text x="153" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">市场冲击</text>

  <!-- Oil -->
  <rect x="153" y="60" width="140" height="30" rx="4" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="160" y="74" font-size="7" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">WTI原油 96.02 → 92.32（-4%）</text>
  <text x="160" y="86" font-size="6" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">停火消息挤出风险溢价</text>

  <!-- Gold -->
  <rect x="153" y="96" width="140" height="30" rx="4" fill="#FFF5F5" stroke="#FECACA" stroke-width="0.5"/>
  <text x="160" y="110" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">黄金 4,424 → 4,506 → 收4,495</text>
  <text x="160" y="122" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">美元回落支撑黄金，4500遇阻</text>

  <!-- VIX -->
  <rect x="153" y="132" width="140" height="30" rx="4" fill="#FFF7ED" stroke="#FED7AA" stroke-width="0.5"/>
  <text x="160" y="146" font-size="7" font-weight="700" fill="#D97706" font-family="PingFang SC, Microsoft YaHei, sans-serif">VIX 17.82（+8.70%）</text>
  <text x="160" y="158" font-size="6" fill="#9A3412" font-family="PingFang SC, Microsoft YaHei, sans-serif">恐慌升温但未至极端</text>

  <!-- Bottom insight -->
  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 黄金≠避险资产。停火→美元弱→黄金涨。核心驱动其实是利率预期。</text>
  <text x="20" y="206" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   美伊谈判才是下半年最大的油价变量，而非以黎停火。</text>
</svg>
