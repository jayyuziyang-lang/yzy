<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" fill="#EF4444"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">💰 CPO三剑客"易中天"成交超千亿</text>

  <!-- Three boxes for the stocks -->
  <!-- 中际旭创 -->
  <rect x="8" y="38" width="90" height="78" rx="5" fill="#FFF5F5" stroke="#FECACA" stroke-width="1"/>
  <text x="14" y="56" font-size="9" font-weight="700" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">中际旭创</text>
  <text x="14" y="72" font-size="7" fill="#7F1D1D" font-family="PingFang SC, Microsoft YaHei, sans-serif">成交 438.8亿</text>
  <text x="14" y="88" font-size="7" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">+6.98%</text>
  <text x="14" y="104" font-size="6" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">盘中股价超茅台</text>

  <!-- 新易盛 -->
  <rect x="105" y="38" width="90" height="78" rx="5" fill="#FFF5F5" stroke="#FECACA" stroke-width="1"/>
  <text x="111" y="56" font-size="9" font-weight="700" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">新易盛</text>
  <text x="111" y="72" font-size="7" fill="#7F1D1D" font-family="PingFang SC, Microsoft YaHei, sans-serif">成交 337.1亿</text>
  <text x="111" y="88" font-size="7" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">+4.72%</text>
  <text x="111" y="104" font-size="6" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">市值一度破8000亿</text>

  <!-- 天孚通信 -->
  <rect x="202" y="38" width="90" height="78" rx="5" fill="#FFF5F5" stroke="#FECACA" stroke-width="1"/>
  <text x="208" y="56" font-size="9" font-weight="700" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">天孚通信</text>
  <text x="208" y="72" font-size="7" fill="#7F1D1D" font-family="PingFang SC, Microsoft YaHei, sans-serif">成交 301.6亿</text>
  <text x="208" y="88" font-size="7" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">+8.84%</text>
  <text x="208" y="104" font-size="6" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">创历史新高</text>

  <!-- Total bar -->
  <rect x="8" y="122" width="284" height="18" rx="4" fill="#FEF2F2"/>
  <text x="150" y="135" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">合计成交 1,077.5亿元 = 全市场成交额3.4%</text>

  <!-- Bottom insight -->
  <rect x="8" y="148" width="284" height="62" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="16" y="166" font-size="8" font-weight="700" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">🔗 产业逻辑链</text>
  <text x="16" y="182" font-size="7" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif">英伟达Spectrum-X硅光量产 → AI互联需求爆发</text>
  <text x="16" y="196" font-size="7" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif">→ CPO/光纤全链受益，但千亿成交需警惕短期过热</text>
</svg>
