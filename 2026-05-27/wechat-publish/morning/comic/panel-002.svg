<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" width="520" height="380">
  <rect width="520" height="380" fill="#F8FAFC" rx="10"/>

  <!-- TOP BANNER -->
  <rect x="0" y="0" width="520" height="44" fill="#D4A017" rx="10"/>
  <rect x="0" y="30" width="520" height="14" fill="#D4A017"/>
  <text x="260" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#FFF">📊 A股+宏观 · 两个新纪录</text>

  <!-- LEFT: A-share margin debt -->
  <rect x="18" y="58" width="232" height="200" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5" rx="8"/>
  <text x="34" y="82" font-size="12" font-weight="700" fill="#1E293B">🔢 A股融资余额破纪录</text>
  <text x="34" y="98" font-size="9" fill="#64748B">杠杆资金仍在加速涌入</text>

  <!-- Giant number display -->
  <rect x="34" y="110" width="200" height="44" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
  <text x="134" y="132" text-anchor="middle" font-size="20" font-weight="800" fill="#059669">2.90 万亿</text>
  <text x="134" y="148" text-anchor="middle" font-size="9" fill="#059669">历史首次站上2.9万亿</text>

  <rect x="34" y="162" width="95" height="24" rx="4" fill="#EFF6FF"/>
  <text x="81" y="178" text-anchor="middle" font-size="9" fill="#1A56DB" font-weight="600">+73.41亿</text>
  <rect x="135" y="162" width="99" height="24" rx="4" fill="#FFFBEB"/>
  <text x="184" y="178" text-anchor="middle" font-size="9" fill="#D97706" font-weight="600">央行净投放1276亿</text>

  <!-- Warning line -->
  <rect x="34" y="196" width="200" height="22" rx="4" fill="#FFF5F5" stroke="#FECACA" stroke-width="0.5"/>
  <text x="134" y="211" text-anchor="middle" font-size="8.5" fill="#DC2626">⚠️ 基金清盘151只 同比+40%</text>

  <!-- Center arrow -->
  <text x="258" y="155" text-anchor="middle" font-size="24" fill="#D4A017" font-weight="700">⟩</text>

  <!-- RIGHT: Xiaomi -->
  <rect x="270" y="58" width="232" height="200" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5" rx="8"/>
  <text x="286" y="82" font-size="12" font-weight="700" fill="#1E293B">📱 小米：业绩降 + 200亿回购</text>
  <text x="286" y="98" font-size="9" fill="#64748B">Q1营收首次跌下千亿</text>

  <!-- Key metrics -->
  <rect x="286" y="112" width="200" height="28" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="296" y="130" font-size="9" fill="#64748B">营收</text>
  <text x="460" y="130" text-anchor="end" font-size="11" font-weight="700" fill="#DC2626">991亿</text>

  <rect x="286" y="144" width="200" height="28" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="296" y="162" font-size="9" fill="#64748B">净利润</text>
  <text x="460" y="162" text-anchor="end" font-size="11" font-weight="700" fill="#DC2626">47.4亿</text>

  <rect x="286" y="176" width="200" height="28" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="296" y="194" font-size="9" fill="#64748B">手机出货</text>
  <text x="460" y="194" text-anchor="end" font-size="11" font-weight="700" fill="#DC2626">3380万台</text>

  <rect x="286" y="210" width="200" height="28" rx="4" fill="#F0FDF4" stroke="#10B981" stroke-width="0.5"/>
  <text x="296" y="228" font-size="9" fill="#64748B">回购计划</text>
  <text x="460" y="228" text-anchor="end" font-size="11" font-weight="700" fill="#059669">200亿港元</text>

  <!-- Bottom insight bar -->
  <rect x="18" y="272" width="484" height="90" fill="#FFF" stroke="#E2E8F0" stroke-width="1" rx="8"/>
  <text x="40" y="295" font-size="12" font-weight="700" fill="#1E293B">💡 信号与隐忧</text>
  <line x1="40" y1="302" x2="486" y2="302" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="40" y="320" font-size="10" fill="#475569">融资余额新高 + 央行净投放 = 流动性充裕，但基金清盘加速提示风险积累</text>
  <text x="40" y="338" font-size="10" fill="#475569">存储成本上升是手机行业最大变量，小米称"不简单转嫁消费者"</text>

  <rect x="18" y="370" width="484" height="1" fill="#E2E8F0"/>
</svg>
