<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#faf8f5"/>
  <text x="150" y="20" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="11" font-weight="700" fill="#c62828">🔥 历史性一刻</text>
  <text x="150" y="34" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="7" fill="#888">创业板指盘中反超上证指数</text>

  <!-- 两座并排的山峰 -->
  <polygon points="60,180 110,60 160,180" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="140,180 185,40 230,180" fill="#fce4e4" stroke="#c62828" stroke-width="2"/>

  <!-- 山峰顶部的红旗 -->
  <rect x="180" y="30" width="3" height="18" fill="#c62828"/>
  <polygon points="183,30 198,36 183,42" fill="#c62828"/>

  <!-- 标签 -->
  <text x="110" y="55" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="8" font-weight="700" fill="#1a1a1a">上证</text>
  <text x="110" y="65" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#888">4093</text>
  <text x="185" y="28" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="8" font-weight="700" fill="#c62828">创业板</text>
  <text x="185" y="38" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#c62828">盘中4148</text>

  <!-- 箭头标记 -->
  <text x="165" y="75" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6" fill="#c62828">← 首次反超！</text>

  <!-- 底部对比表 -->
  <line x1="30" y1="130" x2="270" y2="130" stroke="#ddd" stroke-width="0.8"/>
  <rect x="30" y="132" width="240" height="18" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="40" y="145" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">沪指</text>
  <text x="120" y="145" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">4,093.73</text>
  <text x="200" y="145" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#c62828">-1.25%</text>

  <rect x="30" y="150" width="240" height="18" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="40" y="163" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">创业板指</text>
  <text x="120" y="163" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">4,045.77</text>
  <text x="200" y="163" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#2e7d32">+0.07%</text>

  <rect x="30" y="168" width="240" height="18" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="40" y="181" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">科创50</text>
  <text x="120" y="181" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">1,815.45</text>
  <text x="200" y="181" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#c62828">-2.80%</text>

  <text x="150" y="200" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6" fill="#888">近4500只个股下跌，不足1000只上涨</text>

  <!-- 底部 -->
  <text x="150" y="214" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="5.5" fill="#aaa">数据来源：东方财富 · 2026-05-27</text>
</svg>