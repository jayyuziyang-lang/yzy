<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#faf8f5"/>
  <text x="150" y="20" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="11" font-weight="700" fill="#c9a96e">📈 英伟达财报</text>
  <text x="150" y="34" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="7" fill="#888">营收816亿+85% · 日赚6.4亿 · 股价跌2%</text>

  <!-- 中央数据立方体 -->
  <rect x="100" y="42" width="100" height="55" rx="6" fill="#fff" stroke="#c9a96e" stroke-width="2"/>
  <text x="150" y="60" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="14" font-weight="700" fill="#c9a96e">$816亿</text>
  <text x="150" y="74" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="7" fill="#1a1a1a">Q1营收 +85%</text>
  <text x="150" y="88" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#888">净利润583亿 +211%</text>

  <!-- 对比箭头 -->
  <line x1="150" y1="97" x2="150" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="145,108 150,115 155,108" fill="#1a1a1a"/>

  <!-- 三个箱子对比 -->
  <rect x="15" y="115" width="85" height="42" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/>
  <text x="57" y="132" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="8" font-weight="700" fill="#c62828">📉 股价跌了</text>
  <text x="57" y="146" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">盘后跌约2%</text>
  <text x="57" y="154" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="5.5" fill="#888">连4季超预期后跌</text>

  <rect x="108" y="115" width="85" height="42" rx="4" fill="#fff" stroke="#c9a96e" stroke-width="1.2"/>
  <text x="150" y="132" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="8" font-weight="700" fill="#c9a96e">🔮 Q2指引</text>
  <text x="150" y="146" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">$910亿 ±2%</text>
  <text x="150" y="154" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="5.5" fill="#888">超均值但低于最乐观</text>

  <rect x="200" y="115" width="85" height="42" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="242" y="132" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="8" font-weight="700" fill="#2e7d32">💪 数据中心</text>
  <text x="242" y="146" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">$752亿 +92%</text>
  <text x="242" y="154" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="5.5" fill="#888">占营收92%</text>

  <!-- 底部说明 -->
  <text x="150" y="172" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6.5" fill="#1a1a1a">Vera CPU首次亮相 · Rubin平台样品已出货</text>
  <text x="150" y="182" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6" fill="#888">800亿回购+股息提高25倍</text>

  <text x="150" y="195" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="6" fill="#c62828">"日赚6.4亿也换不来掌声"</text>

  <text x="150" y="214" text-anchor="middle" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="5.5" fill="#aaa">数据来源：NVIDIA IR · 2026-05-27</text>
</svg>