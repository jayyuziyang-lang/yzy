<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扬说·财经 · 品牌视觉预览</title>
<link href="https://fonts.googleapis.com/css2?family=Liu+Jian+Mao+Cao&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/misans-webfont/misans/misans-bold/result.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0d1a26;
  font-family:"Noto Serif SC","Songti SC","SimSun",serif;
}
.card{
  position:relative;isolation:isolate;overflow:hidden;
  width:min(860px,94vw);
  padding:clamp(40px,8vw,80px) clamp(28px,6vw,64px) clamp(36px,6vw,56px);
  border-radius:28px;
  background:
    radial-gradient(circle at 14% 28%, rgba(243,213,134,.16), transparent 35%),
    radial-gradient(circle at 80% 62%, rgba(185,199,211,.09), transparent 36%),
    linear-gradient(140deg, #f9f6ef 0%, #efe8db 42%, #f5f1e7 100%);
  box-shadow:
    0 32px 96px rgba(7,17,28,.22),
    0 8px 24px rgba(7,17,28,.10),
    inset 0 1px 0 rgba(255,255,255,.68);
}
.card::before{
  content:"";
  position:absolute;inset:0;z-index:-1;
  opacity:.1;
  background:
    repeating-linear-gradient(0deg, transparent 0 44px, rgba(16,38,59,.06) 45px 46px),
    repeating-linear-gradient(90deg, transparent 0 52px, rgba(16,38,59,.04) 53px 54px),
    linear-gradient(152deg, transparent 48%, rgba(200,164,93,.12) 49%, rgba(200,164,93,.12) 51%, transparent 52%),
    radial-gradient(ellipse 380px 180px at 14% 92%, rgba(7,17,28,.05) 0%, transparent 70%),
    radial-gradient(ellipse 260px 120px at 68% 94%, rgba(7,17,28,.03) 0%, transparent 65%);
  pointer-events:none;
}

.wordmark{
  position:relative;display:flex;align-items:flex-end;gap:0;z-index:1;
}

/* 扬 */
.yang-svg{
  flex:none;
  width:clamp(140px,20vw,240px);
  height:auto;
  filter:drop-shadow(0 10px 20px rgba(122,79,22,.22)) drop-shadow(0 2px 3px rgba(243,213,134,.3));
  margin-right:clamp(-18px,-2vw,-10px);
}
.yang-svg svg{display:block;width:100%;height:auto;}

/* 说 */
.say-svg{
  flex:none;
  width:clamp(80px,11vw,140px);
  height:auto;
  margin-right:clamp(4px,0.6vw,10px);
}
.say-svg svg{display:block;width:100%;height:auto;}

/* 财经 */
.text-group{
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding-bottom:clamp(10px,1.6vw,20px);
}
.text-main{
  font-family:"MiSans Bold","Noto Sans SC","Microsoft YaHei",sans-serif;
  font-weight:700;
  font-size:clamp(40px,5.8vw,88px);
  color:#0f1d2a;
  letter-spacing:.06em;
  line-height:1.05;
  text-shadow:0 1px 0 rgba(255,255,255,.5),0 4px 12px rgba(7,17,28,.1);
}
.text-sub{
  font-size:clamp(9px,0.9vw,12px);
  font-weight:600;
  letter-spacing:.28em;
  color:rgba(13,26,38,.34);
  text-transform:uppercase;
  margin-top:2px;
}

@media(max-width:640px){
  .wordmark{flex-direction:column;align-items:flex-start;}
  .yang-svg{width:clamp(100px,32vw,170px);margin-right:0;}
  .say-svg{width:clamp(64px,20vw,110px);margin-right:0;}
  .text-group{padding-bottom:0;}
  .text-main{font-size:clamp(34px,10vw,56px);}
}
</style>
</head>
<body>

<div class="card">
  <div class="wordmark" aria-label="扬说财经">

    <!-- 扬 · 醉笔斜阳 + K线 -->
    <span class="yang-svg" aria-hidden="true">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gy" x1="0" y1="0" x2="1.3" y2="1.2">
            <stop offset="0%" stop-color="#3a2008"/><stop offset="18%" stop-color="#8b5e24"/>
            <stop offset="35%" stop-color="#d4a54a"/><stop offset="50%" stop-color="#fef9ed"/>
            <stop offset="65%" stop-color="#e8c97a"/><stop offset="82%" stop-color="#9b621c"/>
            <stop offset="100%" stop-color="#3a2008"/>
          </linearGradient>
          <filter id="fy" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0.08" dy="0.15" stdDeviation="0.14" flood-color="#140a02" flood-opacity="0.38"/>
          </filter>
        </defs>
        <!-- K线集群 + 上升趋势线 -->
        <g opacity="0.16">
          <line x1="5" y1="42.5" x2="5" y2="44.8" stroke="#6f4515" stroke-width="0.35" stroke-linecap="round"/>
          <rect x="4.2" y="42" width="1.6" height="2.5" rx="0.25" fill="#c0392b" opacity="0.5"/>
          <line x1="10" y1="40.5" x2="10" y2="44.8" stroke="#8b5e24" stroke-width="0.35" stroke-linecap="round"/>
          <rect x="9.2" y="39.5" width="1.6" height="4" rx="0.25" fill="#c0392b" opacity="0.55"/>
          <line x1="15" y1="39.5" x2="15" y2="44.8" stroke="#8b5e24" stroke-width="0.35" stroke-linecap="round"/>
          <rect x="14.2" y="38.5" width="1.6" height="4.2" rx="0.25" fill="#c0392b" opacity="0.6"/>
          <line x1="20" y1="38" x2="20" y2="44.5" stroke="#6f4515" stroke-width="0.35" stroke-linecap="round"/>
          <rect x="19.2" y="37" width="1.6" height="5.5" rx="0.25" fill="#16A34A" opacity="0.45"/>
          <line x1="25" y1="38.5" x2="25" y2="44.5" stroke="#8b5e24" stroke-width="0.35" stroke-linecap="round"/>
          <rect x="24.2" y="39" width="1.6" height="4.5" rx="0.25" fill="#c0392b" opacity="0.55"/>
          <line x1="30" y1="37" x2="30" y2="44.5" stroke="#6f4515" stroke-width="0.35" stroke-linecap="round"/>
          <rect x="29.2" y="36.5" width="1.6" height="6" rx="0.25" fill="#c0392b" opacity="0.65"/>
          <path d="M3 43.5 L31 37" fill="none" stroke="#c89a3c" stroke-width="0.45" stroke-linecap="round" stroke-dasharray="1.2,0.6" opacity="0.5"/>
        </g>
        <!-- 扬 3D 挤出 -->
        <g text-anchor="middle" font-family="'Liu Jian Mao Cao','Ma Shan Zheng',cursive" font-size="36" font-weight="400">
          <text x="24" y="38" fill="#1a0a02" opacity="0.5" transform="rotate(-8,24,24) skewX(-10) translate(0.6,0.8)">扬</text>
          <text x="24" y="38" fill="#3a1e08" opacity="0.42" transform="rotate(-8,24,24) skewX(-10) translate(0.42,0.55)">扬</text>
          <text x="24" y="38" fill="#5c3614" opacity="0.38" transform="rotate(-8,24,24) skewX(-10) translate(0.28,0.36)">扬</text>
          <text x="24" y="38" fill="#7a4f1e" opacity="0.4" transform="rotate(-8,24,24) skewX(-10) translate(0.16,0.22)">扬</text>
          <text x="24" y="38" fill="#9b6b28" opacity="0.48" transform="rotate(-8,24,24) skewX(-10) translate(0.08,0.1)">扬</text>
          <text x="24" y="38" fill="#b8862c" opacity="0.55" transform="rotate(-8,24,24) skewX(-10) translate(0.03,0.05)">扬</text>
          <text x="24" y="38" fill="url(#gy)" filter="url(#fy)" transform="rotate(-8,24,24) skewX(-10)">扬</text>
          <text x="23.88" y="37.85" fill="white" opacity="0.15" transform="rotate(-8,24,24) skewX(-10)">扬</text>
        </g>
        <!-- 金色珍珠 -->
        <circle cx="7" cy="5" r="2" fill="#D4A54A" opacity=".88"/>
        <circle cx="7" cy="5" r="3.8" fill="#C8963E" opacity=".12"/>
        <circle cx="6.5" cy="4.5" r="0.8" fill="#FEF9ED" opacity=".65"/>
      </svg>
    </span>

    <!-- 说 · 声波扩散 -->
    <span class="say-svg" aria-hidden="true">
      <svg viewBox="0 0 36 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gs" x1="0" y1="0" x2="1" y2="1.2">
            <stop offset="0%" stop-color="#2a1a08"/><stop offset="40%" stop-color="#6b4a1e"/>
            <stop offset="70%" stop-color="#9b6b28"/><stop offset="100%" stop-color="#2a1a08"/>
          </linearGradient>
          <filter id="fs"><feDropShadow dx="0.05" dy="0.1" stdDeviation="0.1" flood-color="#140a02" flood-opacity="0.25"/></filter>
        </defs>
        <!-- 声波涟漪 (从兑部"口"扩散) -->
        <g opacity="0.22">
          <ellipse cx="26" cy="28" rx="6" ry="4.5" fill="none" stroke="#c89a3c" stroke-width="0.55" opacity=".7"/>
          <ellipse cx="26" cy="28" rx="9" ry="6.5" fill="none" stroke="#c89a3c" stroke-width="0.45" opacity=".5"/>
          <ellipse cx="26" cy="28" rx="12.5" ry="9" fill="none" stroke="#c89a3c" stroke-width="0.35" opacity=".34"/>
          <ellipse cx="26" cy="28" rx="16" ry="11.5" fill="none" stroke="#c89a3c" stroke-width="0.22" opacity=".18"/>
          <path d="M24 21 Q29 14 35 18" fill="none" stroke="#d4a54a" stroke-width="0.5" opacity=".5"/>
          <path d="M22 18 Q29 10 37 15" fill="none" stroke="#d4a54a" stroke-width="0.35" opacity=".35"/>
          <path d="M4 16 Q1 14 3 10" fill="none" stroke="#c89a3c" stroke-width="0.6" opacity=".38" stroke-linecap="round"/>
          <path d="M8 14 Q5 12 7 8" fill="none" stroke="#c89a3c" stroke-width="0.5" opacity=".28" stroke-linecap="round"/>
        </g>
        <!-- 说 3D -->
        <g text-anchor="middle" font-family="'Zhi Mang Xing','Ma Shan Zheng',cursive" font-size="27" font-weight="400">
          <text x="18" y="35" fill="#1a0a02" opacity="0.4" transform="translate(0.35,0.45)">说</text>
          <text x="18" y="35" fill="#3a1e08" opacity="0.35" transform="translate(0.2,0.28)">说</text>
          <text x="18" y="35" fill="#6b4518" opacity="0.38" transform="translate(0.08,0.12)">说</text>
          <text x="18" y="35" fill="url(#gs)" filter="url(#fs)">说</text>
          <text x="17.94" y="34.9" fill="white" opacity="0.1">说</text>
        </g>
        <circle cx="26" cy="28" r="2" fill="#d4a54a" opacity=".25"/>
        <circle cx="26" cy="28" r="3.5" fill="#d4a54a" opacity=".09"/>
      </svg>
    </span>

    <!-- 财经 · MiSans Bold -->
    <span class="text-group">
      <span class="text-main">财经</span>
      <span class="text-sub">YANG SAYS · FINANCE</span>
    </span>

  </div>
</div>

</body>
</html>
