<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 512" width="768" height="512" font-family="Microsoft YaHei, SimHei, sans-serif">
  <rect width="768" height="512" fill="#FAFBFC"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="768" height="48" fill="#1A56DB"/>
  <text x="384" y="31" text-anchor="middle" fill="white" font-size="18" font-weight="700">分裂之夜：大科技 vs 硬科技</text>

  <!-- Left side: Big Tech DOWN (Red/negative zone) -->
  <rect x="20" y="62" width="275" height="195" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="157" y="88" text-anchor="middle" fill="#DC2626" font-size="15" font-weight="700">大科技·讲故事</text>
  <text x="157" y="108" text-anchor="middle" fill="#991B1B" font-size="11">十年期美债4.51% → 折现率↑</text>
  <!-- Down arrows -->
  <text x="157" y="138" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">Alphabet -5.02%</text>
  <text x="157" y="158" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">Amazon -4.75%</text>
  <text x="157" y="178" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">Microsoft -3.18%</text>
  <text x="157" y="198" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">Meta -2.32%</text>
  <text x="157" y="228" text-anchor="middle" fill="#991B1B" font-size="11">纳指 -1.32%</text>
  <!-- Stick figure looking down -->
  <circle cx="157" cy="248" r="5" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="157" y1="253" x2="157" y2="252" stroke="#DC2626" stroke-width="1.5"/>

  <!-- Center divider - split -->
  <line x1="384" y1="72" x2="384" y2="245" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="384" y="150" text-anchor="middle" fill="#64748B" font-size="11" font-weight="600">劈叉</text>
  <text x="384" y="167" text-anchor="middle" fill="#64748B" font-size="9">利率筛选</text>

  <!-- Right side: Hard tech UP (Green/positive zone) -->
  <rect x="473" y="62" width="275" height="195" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="610" y="88" text-anchor="middle" fill="#16A34A" font-size="15" font-weight="700">硬科技·有订单</text>
  <text x="610" y="108" text-anchor="middle" fill="#166534" font-size="11">真实产能不依赖利率</text>
  <!-- Up arrows -->
  <text x="610" y="138" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">美光 +6.82%</text>
  <text x="610" y="158" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">英特尔 +5.19%</text>
  <text x="610" y="178" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">泛林 +5.27%</text>
  <text x="610" y="198" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">联电ADR +14.20%</text>
  <text x="610" y="228" text-anchor="middle" fill="#166534" font-size="11">费半 +2.04%（22/30涨）</text>
  <!-- Stick figure looking up -->
  <circle cx="610" cy="248" r="5" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <line x1="610" y1="253" x2="610" y2="252" stroke="#16A34A" stroke-width="1.5"/>

  <!-- Bottom: SpaceX extreme case -->
  <rect x="20" y="272" width="728" height="110" rx="10" fill="#FFF5F5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="384" y="298" text-anchor="middle" fill="#DC2626" font-size="15" font-weight="700">SpaceX：同一个逻辑的极端版</text>
  <text x="384" y="322" text-anchor="middle" fill="#991B1B" font-size="12">$200亿债券发行 + $4000亿潜在债务 → 单日 -16.43% · 三日 -31%</text>
  <text x="384" y="346" text-anchor="middle" fill="#475569" font-size="11">市场在问：AI烧钱的速度什么时候能追上AI的回报？</text>
  <text x="384" y="368" text-anchor="middle" fill="#94A3B8" font-size="10">MSCI ESG评级CCC → 强制卖出 · 距$135发行价仅剩14%</text>

  <!-- Bottom: key insight card -->
  <rect x="20" y="396" width="728" height="96" rx="10" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1"/>
  <text x="384" y="420" text-anchor="middle" fill="#1E40AF" font-size="14" font-weight="700">核心洞察</text>
  <text x="384" y="442" text-anchor="middle" fill="#1E3A7A" font-size="12">10年期美债4.51%是分水岭——"讲故事"的成本越来越高，"有订单"的优势越来越大</text>
  <text x="384" y="464" text-anchor="middle" fill="#1E3A7A" font-size="12">这个逻辑对A股同样适用：AI硬件（有订单）vs AI软件（有故事）→ 同一个分化在重演</text>
  <text x="384" y="482" text-anchor="middle" fill="#64748B" font-size="10">美光周三财报是下一个关键验证点</text>

  <!-- Branding -->
  <text x="384" y="504" text-anchor="middle" fill="#94A3B8" font-size="10">扬说财经 · 早报 · 2026.06.23 · 蓝色系</text>
</svg>