<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 512" width="768" height="512" font-family="Microsoft YaHei, SimHei, sans-serif">
  <rect width="768" height="512" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="384" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#7C3AED">科技/AI：产业利好 vs 股价暴跌</text>
  <line x1="160" y1="40" x2="608" y2="40" stroke="#7C3AED" stroke-width="2"/>

  <!-- LEFT SIDE: Industry Good News (火箭上升) -->
  <rect x="20" y="58" width="345" height="205" rx="8" fill="#FAF5FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="192" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#7C3AED">产业基本面 · 三大利好</text>

  <!-- Rocket metaphor -->
  <polygon points="192,95 178,120 186,120 186,140 198,140 198,120 206,120" fill="#7C3AED"/>
  <!-- Rocket body -->
  <rect x="179" y="120" width="26" height="30" rx="4" fill="#7C3AED"/>
  <!-- Rocket window -->
  <circle cx="192" cy="130" r="5" fill="#FAF5FF"/>
  <!-- Flame -->
  <ellipse cx="188" cy="153" rx="4" ry="8" fill="#F59E0B" opacity="0.8"/>
  <ellipse cx="196" cy="153" rx="4" ry="8" fill="#F59E0B" opacity="0.8"/>
  <ellipse cx="192" cy="157" rx="3" ry="6" fill="#DC2626" opacity="0.6"/>

  <!-- Arrow up -->
  <line x1="192" y1="160" x2="192" y2="95" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="192,90 187,98 197,98" fill="#7C3AED"/>

  <!-- 3 news items -->
  <text x="100" y="195" text-anchor="middle" font-size="9" fill="#5B21B6">  美光+Anthropic 战略结盟</text>
  <text x="100" y="212" text-anchor="middle" font-size="9" fill="#5B21B6">  三星HBM4四个月销售$10亿</text>
  <text x="100" y="229" text-anchor="middle" font-size="9" fill="#5B21B6">  高通$40亿收购Modular</text>
  <text x="100" y="250" text-anchor="middle" font-size="8" fill="#8B5CF6">三条利好指向：AI硬件需求在加速</text>

  <!-- RIGHT SIDE: Stock Plunge (气球下坠) -->
  <rect x="403" y="58" width="345" height="205" rx="8" fill="#FFF5F5" stroke="#FECACA" stroke-width="1"/>
  <text x="575" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">股价面 · 集体暴跌</text>

  <!-- Falling sticks -->
  <!-- 3 arrows down -->
  <polygon points="575,90 570,85 580,85" fill="#DC2626"/>
  <line x1="575" y1="85" x2="575" y2="140" stroke="#DC2626" stroke-width="2"/>
  <polygon points="575,145 570,140 580,140" fill="#DC2626"/>

  <!-- Stock price labels falling -->
  <text x="490" y="180" text-anchor="middle" font-size="9" fill="#DC2626">  三星 -12%+（HBM4龙头）</text>
  <text x="490" y="197" text-anchor="middle" font-size="9" fill="#DC2626">  SK海力士 -12%+</text>
  <text x="490" y="214" text-anchor="middle" font-size="9" fill="#DC2626">  英伟达盘前 -3%</text>
  <text x="490" y="231" text-anchor="middle" font-size="9" fill="#DC2626">  英特尔盘前 -8%+</text>
  <text x="490" y="250" text-anchor="middle" font-size="8" fill="#991B1B">不是基本面差——是"钱的价格"在重估一切</text>

  <!-- BOTTOM: The anchor (Fed) -->
  <rect x="140" y="278" width="488" height="80" rx="8" fill="#F0F4FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="384" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#1A56DB">为什么利好反而暴跌？—— Fed鹰派是最重的锚</text>

  <!-- Weight/Anchor symbol -->
  <rect x="344" y="310" width="80" height="35" rx="6" fill="#1A56DB"/>
  <text x="384" y="333" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF">Fed加息锚</text>

  <text x="260" y="348" text-anchor="middle" font-size="9" fill="#1E40AF">2年期美债 4.22% (16月高)</text>
  <text x="508" y="348" text-anchor="middle" font-size="9" fill="#1E40AF">美元指数 101 (1年高)</text>

  <!-- Stick figure looking at the paradox -->
  <circle cx="70" cy="385" r="10" fill="none" stroke="#475569" stroke-width="1.8"/>
  <line x1="70" y1="395" x2="70" y2="425" stroke="#475569" stroke-width="1.8"/>
  <line x1="70" y1="405" x2="55" y2="418" stroke="#475569" stroke-width="1.8"/>
  <line x1="70" y1="405" x2="85" y2="418" stroke="#475569" stroke-width="1.8"/>
  <line x1="70" y1="425" x2="58" y2="445" stroke="#475569" stroke-width="1.8"/>
  <line x1="70" y1="425" x2="82" y2="445" stroke="#475569" stroke-width="1.8"/>
  <!-- Thought bubble: "?" -->
  <ellipse cx="88" cy="370" rx="14" ry="10" fill="#FFFBEB" stroke="#D4A017" stroke-width="1"/>
  <text x="88" y="374" text-anchor="middle" font-size="11" font-weight="700" fill="#D4A017">?</text>

  <!-- Bottom message -->
  <rect x="180" y="455" width="408" height="32" rx="8" fill="#FFF7ED" stroke="#FDE68A" stroke-width="1"/>
  <text x="384" y="476" text-anchor="middle" font-size="11" fill="#92400E">40倍PE的科技股面对4.5%的无风险利率——只有一条路：重估</text>

  <text x="384" y="505" text-anchor="middle" font-size="9" fill="#94A3B8">扬说财经 · 2026.6.23 晚报 · 反常信号</text>
</svg>