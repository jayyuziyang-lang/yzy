<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="panel1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="panel3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="600" fill="url(#bg)" rx="16"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="900" height="44" fill="#1E3A7A" rx="16"/>
  <rect x="0" y="20" width="900" height="24" fill="#1E3A7A"/>
  <text x="450" y="28" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="system-ui">扬说财经 · 6.2早报漫画</text>

  <!-- ============ 面板1: 英伟达宣战PC芯片 ============ -->
  <g transform="translate(15, 56)">
    <rect width="285" height="280" fill="url(#panel1)" rx="12" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 面板标签 -->
    <rect x="8" y="8" width="80" height="20" rx="10" fill="#22C55E"/>
    <text x="48" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="system-ui">⚡ AI PC革命</text>

    <!-- 英伟达芯片角色 -->
    <g transform="translate(60, 55)">
      <rect x="-30" y="-25" width="60" height="50" rx="8" fill="#76B900"/>
      <text x="0" y="2" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold" font-family="system-ui">RTX</text>
      <text x="0" y="14" text-anchor="middle" fill="#D4FF8C" font-size="7" font-weight="bold" font-family="system-ui">Spark</text>
      <!-- 笑脸 -->
      <circle cx="-10" cy="-8" r="2.5" fill="#fff"/>
      <circle cx="10" cy="-8" r="2.5" fill="#fff"/>
      <path d="M-8,2 Q0,10 8,2" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- 英特尔角色（哭泣） -->
    <g transform="translate(142, 50)">
      <rect x="-22" y="-18" width="44" height="36" rx="4" fill="#0071C5"/>
      <text x="0" y="4" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="system-ui">Intel</text>
      <!-- 哭脸 -->
      <circle cx="-8" cy="-4" r="2" fill="#fff"/>
      <circle cx="8" cy="-4" r="2" fill="#fff"/>
      <path d="M-4,6 Q0,4 4,6" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
      <!-- 眼泪 -->
      <path d="M-6,0 Q-8,6 -6,10" fill="none" stroke="#93C5FD" stroke-width="1.5"/>
      <circle cx="-6" cy="11" r="1.5" fill="#93C5FD"/>
    </g>

    <!-- 高通角色（惊讶） -->
    <g transform="translate(220, 60)">
      <rect x="-20" y="-15" width="40" height="30" rx="4" fill="#32529D"/>
      <text x="0" y="3" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold" font-family="system-ui">Qualcomm</text>
      <!-- 惊讶 -->
      <circle cx="-6" cy="-3" r="2.5" fill="#FFD700"/>
      <circle cx="6" cy="-3" r="2.5" fill="#FFD700"/>
      <ellipse cx="0" cy="4" rx="3" ry="2" fill="#FFD700"/>
    </g>

    <!-- 股价标注 -->
    <g transform="translate(50, 130)">
      <text x="0" y="0" fill="#22C55E" font-size="11" font-weight="bold" font-family="system-ui">NVDA +6.3%</text>
      <text x="0" y="18" fill="#22C55E" font-size="10" font-family="system-ui">ARM +16.1%</text>
      <text x="130" y="0" fill="#EF4444" font-size="11" font-weight="bold" font-family="system-ui">INTC -4.7%</text>
      <text x="130" y="18" fill="#EF4444" font-size="10" font-family="system-ui">QCOM -5.6%</text>
    </g>

    <!-- 对话气泡 -->
    <g transform="translate(210, 130)">
      <path d="M0,0 Q-60,0 -60,-25 Q-60,-40 -35,-40 L20,-40 Q45,-40 45,-25 L45,-10 Q45,5 25,5 L10,5 L0,15 L3,5 Q20,3 20,-10 L20,-25 Q20,-40 -5,-40 L-40,-40 Q-55,-40 -55,-25 L-55,-10 Q-55,0 -25,0" fill="#fff" stroke="#22C55E" stroke-width="1.5"/>
      <text x="-8" y="-22" fill="#1E293B" font-size="9" font-weight="bold" font-family="system-ui">40年来最大</text>
      <text x="-8" y="-10" fill="#1E293B" font-size="9" font-weight="bold" font-family="system-ui">PC变革！</text>
    </g>

    <!-- 底部文字 -->
    <text x="142" y="210" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold" font-family="system-ui">英伟达RTX Spark芯片宣战</text>
    <text x="142" y="228" text-anchor="middle" fill="#166534" font-size="10" font-family="system-ui">英特尔/高通遭重创</text>

    <!-- 编序号 -->
    <circle cx="20" cy="262" r="10" fill="#22C55E"/>
    <text x="20" y="266" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="system-ui">1</text>
  </g>

  <!-- ============ 面板2: 霍尔木兹海峡风暴 ============ -->
  <g transform="translate(307, 56)">
    <rect width="285" height="280" fill="url(#panel2)" rx="12" stroke="#FDBA74" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 面板标签 -->
    <rect x="8" y="8" width="80" height="20" rx="10" fill="#F97316"/>
    <text x="48" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="system-ui">🌍 中东风暴</text>

    <!-- 油桶角色 -->
    <g transform="translate(72, 70)">
      <ellipse cx="0" cy="-15" rx="22" ry="28" fill="#D97706"/>
      <rect x="-22" y="-43" width="44" height="28" rx="4" fill="#B45309"/>
      <rect x="-10" y="-38" width="20" height="4" rx="2" fill="#F59E0B"/>
      <rect x="-10" y="-30" width="20" height="4" rx="2" fill="#F59E0B"/>
      <!-- 惊恐表情 -->
      <circle cx="-8" cy="-8" r="3" fill="#fff"/>
      <circle cx="8" cy="-8" r="3" fill="#fff"/>
      <ellipse cx="0" cy="2" rx="5" ry="3" fill="#fff"/>
      <!-- 汗滴 -->
      <path d="M12,-14 Q16,-18 14,-14" fill="#93C5FD"/>
    </g>

    <!-- 波斯湾地图简约表示 -->
    <g transform="translate(160, 70)">
      <path d="M0,0 Q10,-20 30,-25 Q50,-20 55,0 Q50,20 30,25 Q10,20 0,0" fill="#1E40AF" opacity="0.3"/>
      <circle cx="20" cy="0" r="20" fill="#1E40AF" opacity="0.15"/>
      <text x="20" y="3" text-anchor="middle" fill="#1E40AF" font-size="7" font-family="system-ui">霍尔木兹</text>
      <!-- 叉号 -->
      <line x1="12" y1="-8" x2="28" y2="8" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="28" y1="-8" x2="12" y2="8" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- WTI油价走势箭头 -->
    <g transform="translate(60, 140)">
      <text x="0" y="0" fill="#EA580C" font-size="11" font-weight="bold" font-family="system-ui">WTI +5.49%</text>
      <text x="0" y="18" fill="#EA580C" font-size="10" font-family="system-ui">布伦特 +4.24%</text>
      <text x="0" y="36" fill="#64748B" font-size="9" font-family="system-ui">伊朗封锁海峡威胁</text>
      <!-- 向上箭头 -->
      <path d="M150,28 L160,10 L170,28" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M160,10 L160,40" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- 释放战略储备 -->
    <g transform="translate(210, 160)">
      <rect x="-5" y="-5" width="70" height="40" rx="6" fill="#fff" stroke="#F97316" stroke-width="1"/>
      <text x="30" y="8" text-anchor="middle" fill="#EA580C" font-size="8" font-weight="bold" font-family="system-ui">特朗普</text>
      <text x="30" y="20" text-anchor="middle" fill="#EA580C" font-size="8" font-weight="bold" font-family="system-ui">释放储备</text>
      <text x="30" y="32" text-anchor="middle" fill="#64748B" font-size="7" font-family="system-ui">未来一周谈判</text>
    </g>

    <!-- 底部文字 -->
    <text x="142" y="210" text-anchor="middle" fill="#9A3412" font-size="11" font-weight="bold" font-family="system-ui">伊朗计划彻底封锁海峡</text>
    <text x="142" y="228" text-anchor="middle" fill="#9A3412" font-size="10" font-family="system-ui">全球能源心脏骤停风险</text>

    <!-- 编序号 -->
    <circle cx="20" cy="262" r="10" fill="#F97316"/>
    <text x="20" y="266" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="system-ui">2</text>
  </g>

  <!-- ============ 面板3: Anthropic IPO ============ -->
  <g transform="translate(600, 56)">
    <rect width="285" height="280" fill="url(#panel3)" rx="12" stroke="#D8B4FE" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 面板标签 -->
    <rect x="8" y="8" width="80" height="20" rx="10" fill="#8B5CF6"/>
    <text x="48" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="system-ui">🤖 AI新王</text>

    <!-- 大模型笑脸角色 -->
    <g transform="translate(80, 65)">
      <!-- 圆形头部 -->
      <circle cx="0" cy="0" r="28" fill="#8B5CF6"/>
      <!-- 眼睛 -->
      <circle cx="-10" cy="-6" r="4" fill="#fff"/>
      <circle cx="10" cy="-6" r="4" fill="#fff"/>
      <circle cx="-9" cy="-5" r="2" fill="#1E293B"/>
      <circle cx="11" cy="-5" r="2" fill="#1E293B"/>
      <!-- 微笑 -->
      <path d="M-8,4 Q0,14 8,4" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <!-- 天线 -->
      <line x1="0" y1="-28" x2="0" y2="-40" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="-42" r="4" fill="#A78BFA"/>
      <circle cx="0" cy="-42" r="2" fill="#fff"/>
      <!-- 标注 -->
      <text x="0" y="42" text-anchor="middle" fill="#6B21A8" font-size="8" font-weight="bold" font-family="system-ui">Anthropic</text>
      <text x="0" y="54" text-anchor="middle" fill="#7C3AED" font-size="7" font-family="system-ui">Claude制造商</text>
    </g>

    <!-- 钱袋 -->
    <g transform="translate(160, 62)">
      <ellipse cx="0" cy="0" rx="18" ry="20" fill="#FBBF24"/>
      <text x="0" y="3" text-anchor="middle" fill="#92400E" font-size="8" font-weight="bold" font-family="system-ui">$965B</text>
      <!-- 绳子 -->
      <path d="M-8,-20 Q-5,-28 0,-30 Q5,-28 8,-20" fill="none" stroke="#D97706" stroke-width="2"/>
      <circle cx="0" cy="-30" r="3" fill="#D97706"/>
      <!-- 美元符号 -->
      <text x="2" y="-40" text-anchor="middle" fill="#10B981" font-size="10" font-weight="bold" font-family="system-ui">🚀</text>
    </g>

    <!-- 数据标注 -->
    <g transform="translate(55, 148)">
      <rect x="-5" y="-5" width="170" height="50" rx="6" fill="#fff" stroke="#D8B4FE" stroke-width="1"/>
      <text x="10" y="10" fill="#6B21A8" font-size="9" font-weight="bold" font-family="system-ui">估值9650亿美元</text>
      <text x="10" y="24" fill="#7C3AED" font-size="8" font-family="system-ui">超OpenAI的8520亿</text>
      <text x="10" y="38" fill="#7C3AED" font-size="8" font-family="system-ui">最快2026秋季上市</text>
    </g>

    <!-- 对话气泡 - 阿扬评价 -->
    <g transform="translate(150, 210)">
      <path d="M0,0 Q-120,0 -120,-25 Q-120,-45 -90,-45 L-10,-45 Q20,-45 20,-25 L20,-10 Q20,5 0,5 L-15,5 L-25,18 L-20,5 Q-5,3 -5,-10 L-5,-25 Q-5,-40 -30,-40 L-85,-40 Q-105,-40 -105,-25 L-105,-10 Q-105,0 -70,0" fill="#fff" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="-50" y="-28" fill="#1E293B" font-size="9" font-weight="bold" font-family="system-ui">AI竞赛白热化：</text>
      <text x="-50" y="-16" fill="#1E293B" font-size="9" font-weight="bold" font-family="system-ui">谁先上市谁是王</text>
    </g>

    <!-- 底部文字 -->
    <text x="142" y="210" text-anchor="middle" fill="#6B21A8" font-size="11" font-weight="bold" font-family="system-ui">Anthropic秘密提交IPO</text>
    <text x="142" y="228" text-anchor="middle" fill="#6B21A8" font-size="10" font-family="system-ui">华尔街AI争霸战白热化</text>

    <!-- 编序号 -->
    <circle cx="20" cy="262" r="10" fill="#8B5CF6"/>
    <text x="20" y="266" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="system-ui">3</text>
  </g>

  <!-- ============ 底部：阿扬出场 + 总结 ============ -->
  <g transform="translate(15, 355)">
    <rect width="870" height="78" rx="14" fill="#1E3A7A" filter="url(#shadow)"/>

    <!-- 阿扬角色（右） -->
    <g transform="translate(770, 39)">
      <!-- 身体 -->
      <rect x="-18" y="-12" width="36" height="34" rx="10" fill="#3B82F6"/>
      <!-- 头 -->
      <circle cx="0" cy="-18" r="18" fill="#FCD34D"/>
      <!-- 眼镜 -->
      <circle cx="-9" cy="-20" r="8" fill="none" stroke="#1E293B" stroke-width="1.5"/>
      <circle cx="9" cy="-20" r="8" fill="none" stroke="#1E293B" stroke-width="1.5"/>
      <line x1="-1" y1="-20" x2="1" y2="-20" stroke="#1E293B" stroke-width="1.5"/>
      <!-- 眼睛 -->
      <circle cx="-9" cy="-20" r="2" fill="#1E293B"/>
      <circle cx="9" cy="-20" r="2" fill="#1E293B"/>
      <!-- 微笑 -->
      <path d="M-4,-12 Q0,-8 4,-12" fill="none" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 领带 -->
      <polygon points="0,2 -5,12 0,14 5,12" fill="#EF4444"/>
    </g>

    <!-- 总结文字 -->
    <text x="30" y="28" fill="#FCD34D" font-size="13" font-weight="bold" font-family="system-ui">今日核心：三重冲击波</text>
    <text x="30" y="50" fill="#E2E8F0" font-size="11" font-family="system-ui">🔵 科技三重冲击：NVIDIA PC芯片宣战 + Anthropic近万亿美元IPO + AI应用全面爆发</text>
    <text x="30" y="66" fill="#94A3B8" font-size="10" font-family="system-ui">🔴 能源定价权博弈：霍尔木兹封锁威胁推动油价暴涨，金价受紧缩预期压制</text>
  </g>

</svg>
