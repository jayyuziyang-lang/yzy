  <text x="150" y="218" text-anchor="middle" fill="#92400E" font-size="6" font-family="PingFang SC, Microsoft YaHei, sans-serif">06.02 晚报 · 创业板+2.66% · 3876股跌 · CPO涨停潮</text>
