  <text x="230" y="168" text-anchor="middle" fill="#fff" font-size="8" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">Vera</text>
  <text x="230" y="178" text-anchor="middle" fill="#fff" font-size="7" font-family="PingFang SC, Microsoft YaHei, sans-serif">Rubin</text>

