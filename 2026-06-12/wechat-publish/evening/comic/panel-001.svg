<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="background:#FAFAFA;">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF5"/>
      <stop offset="100%" stop-color="#FFFBEB"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">🕊️ 美伊48小时 · 全球资本市场一日三转</text>

  <!-- Timeline: 3 key events -->
  <!-- Event 1: Wednesday - Panic -->
  <rect x="30" y="70" width="230" height="140" rx="10" fill="url(#cardGrad)" stroke="#FECACA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="70" width="230" height="34" rx="10" fill="#FEF2F2"/>
  <rect x="30" y="94" width="230" height="10" fill="#FEF2F2"/>
  <circle cx="50" cy="87" r="12" fill="#DC2626"/>
  <text x="50" y="91" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">1</text>
  <text x="68" y="91" font-size="13" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">周三 · 全面恐慌</text>
  <text x="42" y="120" font-size="11" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">🔴 伊朗打击美军基地</text>
  <text x="42" y="140" font-size="11" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">🔴 特朗普威胁"炸个稀巴烂"</text>
  <text x="42" y="160" font-size="11" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">🔴 霍尔木兹海峡关闭</text>
  <text x="42" y="185" font-size="11" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">道指跌破5万 · 黄金闪崩</text>

  <!-- Arrow 1->2 -->
  <text x="270" y="140" font-size="20" fill="#D4A017" font-weight="700">→</text>

  <!-- Event 2: Thursday - Reversal -->
  <rect x="290" y="70" width="230" height="140" rx="10" fill="url(#cardGrad)" stroke="#FDE68A" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="290" y="70" width="230" height="34" rx="10" fill="#FFFBEB"/>
  <rect x="290" y="94" width="230" height="10" fill="#FFFBEB"/>
  <circle cx="310" cy="87" r="12" fill="#D4A017"/>
  <text x="310" y="91" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">2</text>
  <text x="328" y="91" font-size="13" font-weight="700" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">周四 · 惊天逆转</text>
  <text x="302" y="120" font-size="11" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">⏳ 空袭前数小时特朗普叫停</text>
  <text x="302" y="140" font-size="11" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">⏳ 和平协议最快周末签署</text>
  <text x="302" y="160" font-size="11" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">🟢 道指暴涨929点</text>
  <text x="302" y="185" font-size="11" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">美解除制裁 · 撤军 · 石油解禁</text>

  <!-- Arrow 2->3 -->
  <text x="530" y="140" font-size="20" fill="#D4A017" font-weight="700">→</text>

  <!-- Event 3: Friday risk -->
  <rect x="550" y="70" width="220" height="140" rx="10" fill="url(#cardGrad)" stroke="#FDE68A" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="550" y="70" width="220" height="34" rx="10" fill="#FFF7ED"/>
  <rect x="550" y="94" width="220" height="10" fill="#FFF7ED"/>
  <circle cx="570" cy="87" r="12" fill="#EA580C"/>
  <text x="570" y="91" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">?</text>
  <text x="588" y="91" font-size="13" font-weight="700" fill="#EA580C" font-family="PingFang SC, Microsoft YaHei, sans-serif">下周 · 关键变量</text>
  <text x="562" y="120" font-size="11" fill="#9A3412" font-family="PingFang SC, Microsoft YaHei, sans-serif">⚠️ 伊朗否认协议已敲定</text>
  <text x="562" y="140" font-size="11" fill="#9A3412" font-family="PingFang SC, Microsoft YaHei, sans-serif">⚠️ 海峡目前仍处于关闭状态</text>
  <text x="562" y="160" font-size="11" fill="#9A3412" font-family="PingFang SC, Microsoft YaHei, sans-serif">⚠️ 协议签署前仍有变数</text>
  <text x="562" y="185" font-size="11" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">若无协议→油价反弹+避险回归</text>

  <!-- Market impact summary bar -->
  <rect x="30" y="230" width="740" height="170" rx="12" fill="#FFFDF5" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>

  <text x="50" y="260" font-size="14" font-weight="700" fill="#D4A017" font-family="PingFang SC, Microsoft YaHei, sans-serif">📊 市场冲击全景</text>

  <!-- Equities -->
  <rect x="40" y="275" width="170" height="55" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="125" y="295" text-anchor="middle" font-size="11" fill="#166534" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">美股</text>
  <text x="125" y="318" text-anchor="middle" font-size="15" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">道指 +929 (+1.86%)</text>

  <rect x="220" y="275" width="170" height="55" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="305" y="295" text-anchor="middle" font-size="11" fill="#166534" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">A股</text>
  <text x="305" y="318" text-anchor="middle" font-size="15" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">沪指 4,032 (+1.12%)</text>

  <rect x="400" y="275" width="170" height="55" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="485" y="295" text-anchor="middle" font-size="11" fill="#166534" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">韩股</text>
  <text x="485" y="318" text-anchor="middle" font-size="15" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">KOSPI +~8%</text>

  <rect x="580" y="275" width="170" height="55" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="665" y="295" text-anchor="middle" font-size="11" fill="#166534" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">日股</text>
  <text x="665" y="318" text-anchor="middle" font-size="15" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">日经 +3.5%</text>

  <!-- Commodities -->
  <rect x="40" y="338" width="355" height="46" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="220" y="358" text-anchor="middle" font-size="11" fill="#991B1B" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">原油暴跌</text>
  <text x="220" y="376" text-anchor="middle" font-size="14" fill="#DC2626" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">WTI $87.17 (-5.96%) · 布伦特 $88.54 (-5.55%)</text>

  <rect x="405" y="338" width="355" height="46" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="582" y="358" text-anchor="middle" font-size="11" fill="#92400E" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">黄金深V</text>
  <text x="582" y="376" text-anchor="middle" font-size="14" fill="#D4A017" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">$4,024 → $4,211 (+3.46%)</text>

  <!-- Footer -->
  <text x="400" y="412" text-anchor="middle" font-size="9" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, sans-serif">数据截至2026年6月12日收盘</text>
</svg>