<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#FAFAFA;">
  <defs>
    <linearGradient id="headerGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="url(#headerGrad2)"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">📈 A股 · 沪指重返4000 · 风格切换确认</text>

  <!-- Left: Index data -->
  <rect x="25" y="70" width="245" height="180" rx="12" fill="#FFFDF5" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="40" y="98" font-size="14" font-weight="700" fill="#D4A017" font-family="PingFang SC, Microsoft YaHei, sans-serif">三大指数走势</text>

  <rect x="35" y="112" width="225" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="147" y="130" text-anchor="middle" font-size="12" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">上证指数</text>
  <text x="147" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">4,031.51 +1.12%</text>

  <rect x="35" y="154" width="225" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="147" y="172" text-anchor="middle" font-size="12" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">深证成指</text>
  <text x="147" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">14,963.41 +0.75%</text>

  <rect x="35" y="196" width="225" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="147" y="214" text-anchor="middle" font-size="12" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">创业板指</text>
  <text x="147" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">3,835.46 +0.50%</text>

  <!-- Center: Flow data -->
  <rect x="285" y="70" width="245" height="180" rx="12" fill="#FFFDF5" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="300" y="98" font-size="14" font-weight="700" fill="#D4A017" font-family="PingFang SC, Microsoft YaHei, sans-serif">资金流向</text>

  <rect x="295" y="112" width="225" height="36" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="407" y="130" text-anchor="middle" font-size="12" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">成交额</text>
  <text x="407" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">3.21万亿（+6629亿）</text>

  <rect x="295" y="154" width="225" height="36" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="407" y="172" text-anchor="middle" font-size="12" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">北向资金</text>
  <text x="407" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">+89亿</text>

  <rect x="295" y="196" width="225" height="36" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="407" y="214" text-anchor="middle" font-size="12" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">内资净买入</text>
  <text x="407" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">+106亿</text>

  <!-- Right: Sector Rotation -->
  <rect x="545" y="70" width="230" height="180" rx="12" fill="#FFFDF5" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="560" y="98" font-size="14" font-weight="700" fill="#D4A017" font-family="PingFang SC, Microsoft YaHei, sans-serif">板块轮动</text>

  <rect x="555" y="112" width="210" height="60" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="660" y="132" text-anchor="middle" font-size="11" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">🔥 领涨（周期）</text>
  <text x="660" y="152" text-anchor="middle" font-size="11" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">工业金属 +5.2% · 贵金属 +4.8%</text>
  <text x="660" y="166" text-anchor="middle" font-size="10" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">铜陵有色 · 洛阳钼业 · 金钼涨停</text>

  <rect x="555" y="180" width="210" height="56" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="660" y="200" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">❄️ 领跌（科技）</text>
  <text x="660" y="218" text-anchor="middle" font-size="11" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">电子化学品 -4.1% · MLCC -2.8%</text>
  <text x="660" y="232" text-anchor="middle" font-size="10" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">AI光模块 -2.3% · 科创50 -0.24%</text>

  <!-- Bottom: Core insight -->
  <rect x="25" y="262" width="750" height="55" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="40" y="284" font-size="11" font-weight="700" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 核心判断：风格切换确认——资金从AI(P/E 50-80x)向周期(P/E 10-20x)迁移</text>
  <text x="40" y="302" font-size="11" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">驱动逻辑：和平协议→油价暴跌→通胀降温→Fed降息空间打开→周期成本下行。持续性取决于下周四前能否签署协议。</text>

  <!-- Footer -->
  <rect x="25" y="330" width="750" height="50" rx="10" fill="#FFFDF5" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="40" y="352" font-size="12" font-weight="700" fill="#D4A017" font-family="PingFang SC, Microsoft YaHei, sans-serif">📌 投资视角</text>
  <text x="40" y="370" font-size="11" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">成交3.21万亿+内外资方向一致=增量资金进场信号。但沪指4000上方需持续3万亿+放量才能站稳。若协议生变，周期股回吐风险大。</text>

  <text x="400" y="396" text-anchor="middle" font-size="9" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, sans-serif">数据截至2026年6月12日收盘 · 来源：东方财富</text>
</svg>