<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="oil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <rect x="180" y="16" width="440" height="36" rx="18" fill="#D4A017"/>
  <text x="400" y="40" text-anchor="middle" fill="white" font-size="16" font-weight="700">🥇 黄金深V反弹 · 油价暴跌6%</text>

  <!-- 左侧：黄金V型反弹图 -->
  <g filter="url(#shadow)">
    <rect x="20" y="70" width="370" height="260" rx="10" fill="white" stroke="#FDE68A" stroke-width="2"/>
    <rect x="20" y="70" width="370" height="36" rx="10" fill="#FFFBEB"/>
    <text x="205" y="93" text-anchor="middle" fill="#D4A017" font-size="13" font-weight="700">🥇 黄金 · 教科书级深V</text>

    <!-- V型图 -->
    <rect x="50" y="120" width="310" height="110" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>

    <!-- 坐标 -->
    <line x1="70" y1="215" x2="340" y2="215" stroke="#D4A017" stroke-width="1"/>
    <text x="60" y="218" font-size="8" fill="#64748B">$4,000</text>
    <text x="60" y="145" font-size="8" fill="#64748B">$4,250</text>

    <!-- V曲线 -->
    <path d="M70 145 L120 150 L170 155 L220 190 L250 215 L280 215 L300 200 L320 180 L340 155"
          stroke="#D4A017" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M70 145 L120 150 L170 155 L220 190 L250 215 L280 215 L300 200 L320 180 L340 155"
          stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- 标注点 -->
    <circle cx="170" cy="155" r="5" fill="#DC2626"/>
    <text x="170" y="145" text-anchor="middle" font-size="9" fill="#DC2626" font-weight="700">$4,024</text>

    <circle cx="340" cy="155" r="5" fill="#16A34A"/>
    <text x="340" y="145" text-anchor="middle" font-size="9" fill="#16A34A" font-weight="700">$4,211</text>

    <!-- 标签 -->
    <text x="210" y="240" text-anchor="middle" font-size="11" fill="#DC2626">"避险消退"打压</text>
    <text x="210" y="256" text-anchor="middle" font-size="11" fill="#16A34A">"降息预期"推升</text>

    <!-- 核心数据 -->
    <rect x="50" y="272" width="310" height="44" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="205" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#16A34A">收 $4,211 · 日内振幅 $187 · +3.46%</text>
    <text x="205" y="306" text-anchor="middle" font-size="10" fill="#16A34A">白银 +6.24% → $67.33</text>
  </g>

  <!-- 右侧：油价暴跌 -->
  <g filter="url(#shadow)">
    <rect x="410" y="70" width="370" height="260" rx="10" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="410" y="70" width="370" height="36" rx="10" fill="#1E293B"/>
    <text x="595" y="93" text-anchor="middle" fill="white" font-size="13" font-weight="700">🛢️ 原油 · 暴跌近6%</text>

    <!-- WTI -->
    <rect x="425" y="120" width="340" height="44" rx="8" fill="#F8FAFC"/>
    <text x="445" y="142" font-size="12" fill="#374151">WTI原油</text>
    <text x="660" y="148" text-anchor="end" font-size="20" font-weight="800" fill="#16A34A">$87.17</text>
    <text x="745" y="148" text-anchor="end" font-size="12" font-weight="700" fill="#16A34A">-5.96%</text>

    <!-- 布伦特 -->
    <rect x="425" y="172" width="340" height="44" rx="8" fill="#F8FAFC"/>
    <text x="445" y="194" font-size="12" fill="#374151">布伦特原油</text>
    <text x="660" y="200" text-anchor="end" font-size="20" font-weight="800" fill="#16A34A">$88.54</text>
    <text x="745" y="200" text-anchor="end" font-size="12" font-weight="700" fill="#16A34A">-5.55%</text>

    <!-- 暴跌原因 -->
    <rect x="425" y="228" width="340" height="90" rx="8" fill="#FFF5F5" stroke="#FECACA" stroke-width="1"/>
    <text x="595" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">暴跌原因：地缘风险溢价释放</text>
    <text x="445" y="272" font-size="11" fill="#374151">• 伊朗石油将重返国际市场</text>
    <text x="445" y="290" font-size="11" fill="#374151">• 美国解除石油出口制裁</text>
    <text x="445" y="308" font-size="11" fill="#374151">• 霍尔木兹海峡恢复通行</text>
  </g>

  <!-- 底部左：美元 -->
  <g filter="url(#shadow)">
    <rect x="20" y="348" width="240" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="140" y="378" text-anchor="middle" font-size="11" fill="#64748B">美元指数跌破100</text>
    <text x="140" y="402" text-anchor="middle" font-size="24" font-weight="800" fill="#16A34A">99.69</text>
    <text x="140" y="420" text-anchor="middle" font-size="10" fill="#16A34A">-0.35%</text>
  </g>

  <!-- 底部中：阿扬分析 -->
  <g filter="url(#shadow)">
    <rect x="275" y="348" width="250" height="80" rx="10" fill="white" stroke="#FDE68A" stroke-width="1"/>
    <circle cx="305" cy="385" r="18" fill="#FFE4B5"/>
    <circle cx="305" cy="378" r="9" fill="#FFD699"/>
    <circle cx="301" cy="375" r="1.5" fill="#333"/>
    <circle cx="309" cy="375" r="1.5" fill="#333"/>
    <path d="M300 380 Q305 385 310 380" stroke="#333" stroke-width="1.5" fill="none"/>
    <text x="340" y="378" font-size="11" font-weight="600" fill="#1E293B">阿扬说：</text>
    <text x="340" y="396" font-size="10" fill="#475569">"黄金定价因子已从</text>
    <text x="340" y="412" font-size="10" fill="#475569">'避险'切换为'利率预期'"</text>
  </g>

  <!-- 底部右：VIX -->
  <g filter="url(#shadow)">
    <rect x="540" y="348" width="240" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="660" y="378" text-anchor="middle" font-size="11" fill="#64748B">VIX恐慌指数</text>
    <text x="660" y="402" text-anchor="middle" font-size="24" font-weight="800" fill="#16A34A">~19.50</text>
    <text x="660" y="420" text-anchor="middle" font-size="10" fill="#16A34A">-12.2%（恐慌退潮）</text>
  </g>

  <!-- 底部警告 -->
  <rect x="80" y="445" width="640" height="36" rx="12" fill="#FFF5F5" stroke="#FECACA" stroke-width="1"/>
  <text x="400" y="468" text-anchor="middle" font-size="11" fill="#DC2626">⚠️ 伊朗否认协议已敲定 · 若周末签署失败 · 油价可能暴拉回$90+</text>
</svg>