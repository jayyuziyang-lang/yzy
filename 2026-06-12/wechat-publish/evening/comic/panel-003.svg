<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="background:#FAFAFA;">
  <defs>
    <linearGradient id="headerGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="oilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="url(#headerGrad3)"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">🥇 黄金深V反弹 + 🛢️ 原油暴跌6%</text>

  <!-- Left: Gold V-chart -->
  <rect x="25" y="70" width="365" height="210" rx="12" fill="#FFFDF5" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow3)"/>
  <text x="40" y="98" font-size="14" font-weight="700" fill="#D4A017" font-family="PingFang SC, Microsoft YaHei, sans-serif">黄金日内走势 · 教科书级深V</text>

  <!-- V-shape chart -->
  <rect x="35" y="108" width="345" height="90" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
  <!-- Chart grid lines -->
  <line x1="35" y1="128" x2="380" y2="128" stroke="#FEF3C7" stroke-width="0.5"/>
  <line x1="35" y1="148" x2="380" y2="148" stroke="#FEF3C7" stroke-width="0.5"/>
  <line x1="35" y1="168" x2="380" y2="168" stroke="#FEF3C7" stroke-width="0.5"/>
  <line x1="35" y1="188" x2="380" y2="188" stroke="#FEF3C7" stroke-width="0.5"/>

  <!-- Y-axis labels -->
  <text x="42" y="125" font-size="8" fill="#B45309">$4,200</text>
  <text x="42" y="165" font-size="8" fill="#B45309">$4,100</text>
  <text x="42" y="195" font-size="8" fill="#B45309">$4,030</text>

  <!-- V-curve -->
  <path d="M55 178 L90 172 L125 165 L160 158 L195 170 L230 182 L260 178 L290 160 L320 140 L350 120 L370 112" stroke="url(#goldGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- V-bottom point -->
  <circle cx="160" cy="158" r="6" fill="#DC2626"/>
  <text x="160" y="142" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">$4,024</text>
  <!-- End point -->
  <circle cx="370" cy="112" r="6" fill="#16A34A"/>
  <text x="370" y="105" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">$4,211</text>

  <!-- Gold key data -->
  <rect x="35" y="206" width="345" height="60" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
  <rect x="42" y="212" width="103" height="48" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="93" y="232" text-anchor="middle" font-size="11" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">DXY 美元</text>
  <text x="93" y="249" text-anchor="middle" font-size="13" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">99.69 ↓</text>

  <rect x="152" y="212" width="103" height="48" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="203" y="232" text-anchor="middle" font-size="11" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">白银</text>
  <text x="203" y="249" text-anchor="middle" font-size="13" fill="#16A34A" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">$67.33 +6.24%</text>

  <rect x="262" y="212" width="110" height="48" rx="6" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="0.5"/>
  <text x="317" y="232" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">ETF资金流</text>
  <text x="317" y="249" text-anchor="middle" font-size="13" fill="#7C3AED" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">+4.3吨</text>

  <!-- Right: Oil crash -->
  <rect x="405" y="70" width="370" height="210" rx="12" fill="#FFFDF5" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow3)"/>
  <text x="420" y="98" font-size="14" font-weight="700" fill="#D4A017" font-family="PingFang SC, Microsoft YaHei, sans-serif">原油 · 地缘溢价一夜蒸发</text>

  <rect x="415" y="112" width="350" height="90" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <!-- Chart labels -->
  <text x="590" y="135" text-anchor="middle" font-size="11" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">地缘溢价释放</text>

  <!-- Price drop bars -->
  <rect x="440" y="132" width="60" height="60" rx="4" fill="#1F2937"/>
  <text x="470" y="148" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">前日</text>
  <text x="470" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">$92.7</text>

  <text x="510" y="162" font-size="20" fill="#DC2626" font-weight="700">→</text>

  <rect x="535" y="140" width="60" height="52" rx="4" fill="#DC2626"/>
  <text x="565" y="156" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">今日</text>
  <text x="565" y="171" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">$87.2</text>

  <text x="605" y="162" font-size="20" fill="#DC2626" font-weight="700">= -5.96%</text>

  <!-- Oil key data -->
  <rect x="415" y="206" width="350" height="60" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <rect x="422" y="212" width="165" height="48" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="504" y="232" text-anchor="middle" font-size="11" fill="#991B1B" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">WTI</text>
  <text x="504" y="249" text-anchor="middle" font-size="13" fill="#DC2626" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">$87.17 (-5.96%)</text>

  <rect x="594" y="212" width="165" height="48" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="676" y="232" text-anchor="middle" font-size="11" fill="#991B1B" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">布伦特</text>
  <text x="676" y="249" text-anchor="middle" font-size="13" fill="#DC2626" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif">$88.54 (-5.55%)</text>

  <!-- Bottom insight -->
  <rect x="25" y="292" width="750" height="55" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="40" y="312" font-size="12" font-weight="700" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 传导链完整验证：美伊和谈 → 霍尔木兹复通预期 → 油价暴跌6% → 通胀预期降温 → Fed降息空间打开</text>
  <text x="40" y="334" font-size="11" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">黄金走势反映了两股力量的角力：早盘避险消退（跌至$4,024）→ 美元跌破100+降息预期再起（V反弹至$4,211）。最终"利率预期"战胜"避险消退"。</text>

  <text x="400" y="375" text-anchor="middle" font-size="9" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, sans-serif">数据截至2026年6月12日收盘</text>
</svg>