<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system,PingFang SC,Microsoft YaHei,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="upGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FEE2E2"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <rect x="0" y="0" width="800" height="56" fill="url(#bar)" rx="12"/>
  <rect x="0" y="28" width="800" height="28" fill="url(#bar)"/>
  <text x="400" y="37" text-anchor="middle" fill="white" font-size="22" font-weight="700">一夜反转！道指反弹929点 · 特朗普叫停对伊打击</text>

  <!-- Panel 1: Market Reversal -->
  <rect x="30" y="75" width="360" height="400" fill="white" rx="10" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="30" y="75" width="360" height="38" fill="#DC2626" rx="10"/>
  <rect x="30" y="95" width="360" height="18" fill="#DC2626"/>
  <text x="210" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">📈 美股V型反转</text>

  <!-- Big number -->
  <text x="210" y="165" text-anchor="middle" fill="#DC2626" font-size="52" font-weight="800">+929</text>
  <text x="210" y="190" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="600">道指单日暴涨929点</text>

  <!-- Table -->
  <rect x="50" y="210" width="320" height="95" fill="url(#upGrad)" rx="6" stroke="#FECACA" stroke-width="1"/>
  <text x="70" y="234" fill="#DC2626" font-size="13" font-weight="600">道琼斯    50,848.75   +1.86%</text>
  <text x="70" y="258" fill="#DC2626" font-size="13" font-weight="600">标普500    7,394.30    +1.75%</text>
  <text x="70" y="282" fill="#DC2626" font-size="13" font-weight="600">纳斯达克   25,809.66   +2.54%</text>

  <!-- Drivers -->
  <rect x="50" y="320" width="320" height="50" fill="#EFF6FF" rx="6" stroke="#BFDBFE" stroke-width="1"/>
  <text x="70" y="344" fill="#1E40AF" font-size="12" font-weight="600">反转驱动力:</text>
  <text x="70" y="364" fill="#1E40AF" font-size="12">特朗普取消打击 → 和平预期升温</text>

  <text x="50" y="400" fill="#1E293B" font-size="13" font-weight="700">亚洲跟进大涨:</text>
  <text x="50" y="422" fill="#475569" font-size="12">日经 +3.25%  |  KOSPI +6%</text>
  <text x="50" y="444" fill="#475569" font-size="12">恒生 +0.92%  |  上证 +0.53%</text>

  <!-- Panel 2: Trump Iran -->
  <rect x="410" y="75" width="360" height="400" fill="white" rx="10" stroke="#FECACA" stroke-width="1.5"/>
  <rect x="410" y="75" width="360" height="38" fill="#1A56DB" rx="10"/>
  <rect x="410" y="95" width="360" height="18" fill="#1A56DB"/>
  <text x="590" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">🕊️ 特朗普叫停打击</text>

  <!-- Timeline narrative -->
  <text x="430" y="140" fill="#1E293B" font-size="13" font-weight="700">周四白天: 威胁"炸个稀巴烂"</text>
  <text x="430" y="162" fill="#475569" font-size="12">美军发射49枚战斧 · 伊朗攻击18处目标</text>

  <text x="430" y="196" fill="#1E293B" font-size="13" font-weight="700">周四晚: 180度逆转</text>
  <rect x="430" y="206" width="320" height="55" fill="#F0FDF4" rx="6" stroke="#BBF7D0" stroke-width="1"/>
  <text x="450" y="228" fill="#16A34A" font-size="12" font-weight="600">Truth Social宣布取消打击</text>
  <text x="450" y="248" fill="#14532D" font-size="11">"和平协议已敲定，本周末欧洲签署"</text>

  <!-- Deal terms -->
  <rect x="430" y="275" width="320" height="65" fill="#EFF6FF" rx="6" stroke="#BFDBFE" stroke-width="1"/>
  <text x="450" y="298" fill="#1E40AF" font-size="12" font-weight="600">协议核心条款</text>
  <text x="450" y="318" fill="#1E40AF" font-size="11">① 伊朗永不开发核武器</text>
  <text x="450" y="334" fill="#1E40AF" font-size="11">② 霍尔木兹海峡重新开放</text>

  <!-- Iran caution -->
  <rect x="430" y="355" width="320" height="50" fill="#FFFBEB" rx="6" stroke="#FDE68A" stroke-width="1"/>
  <text x="450" y="378" fill="#D4A017" font-size="12" font-weight="600">⚠️ 伊朗回应"尚未最终决定"</text>
  <text x="450" y="396" fill="#92400E" font-size="11">过去2个月特朗普38次说"即将签"</text>

  <!-- Weekend watch -->
  <text x="430" y="430" fill="#DC2626" font-size="12" font-weight="600">周末盯紧！协议签署决定下周方向</text>
</svg>