  <text x="384.0" y="30" font-size="18" fill="#1A56DB" text-anchor="middle" font-weight="bold">A股：外部冲击波袭来，但有缓冲垫在托底</text><rect x="30" y="80" width="160" height="100" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/><text x="110" y="110" font-size="13" fill="#DC2626" text-anchor="middle" font-weight="bold">费城半导体</text><text x="110" y="134" font-size="30" fill="#DC2626" text-anchor="middle" font-weight="bold">−5.7%</text><text x="110" y="158" font-size="10" fill="#991B1B" text-anchor="middle" font-weight="normal">年内最大单日跌幅</text><line x1="195" y1="110" x2="235" y2="110" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ar)"/><line x1="223" y1="118" x2="263" y2="118" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ar)"/><line x1="251" y1="126" x2="291" y2="126" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ar)"/><text x="260" y="95" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="bold">冲击传导</text><rect x="290" y="80" width="180" height="100" rx="8" fill="#FFF5F5" stroke="#EF4444" stroke-width="2"/><text x="380" y="110" font-size="13" fill="#EF4444" text-anchor="middle" font-weight="bold">A股芯片板块</text><text x="380" y="130" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="normal">中芯国际 -1.7%</text><text x="380" y="148" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="normal">华虹宏力 -2.7%</text><text x="380" y="166" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="normal">寒武纪 -1.3%</text><line x1="470" y1="130" x2="500" y2="130" stroke="#DC2626" stroke-width="2" stroke-linecap="round" marker-end="url(#ar)"/><rect x="510" y="80" width="220" height="100" rx="8" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/><text x="620" y="110" font-size="13" fill="#334155" text-anchor="middle" font-weight="bold">A股大盘</text><text x="620" y="135" font-size="13" fill="#16A34A" text-anchor="middle" font-weight="bold">沪指 4074 -0.43%</text><text