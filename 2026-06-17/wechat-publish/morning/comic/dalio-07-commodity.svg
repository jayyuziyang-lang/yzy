" font-weight="normal">油价↓ → 通胀预期↓</text><text x="470" y="230" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="normal">→ 对黄金利空</text><text x="610" y="210" font-size="10" fill="#16A34A" text-anchor="middle" font-weight="normal">DXY破100</text><text x="610" y="230" font-size="10" fill="#16A34A" text-anchor="middle" font-weight="normal">→ 对黄金利多</text><line x1="540" y1="195" x2="470" y2="195" stroke="#DC2626" stroke-width="2" stroke-linecap="round" marker-end="url(#ar)"/><line x1="540" y1="195" x2="610" y2="195" stroke="#16A34A" stroke-width="2" stroke-linecap="round" marker-end="url(#ag)"/><text x="540" y="380" font-size="11" fill="#64748B" text-anchor="middle" font-weight="normal">FOMC决议后</text><text x="540" y="398" font-size="11" fill="#DC2626" text-anchor="middle" font-weight="bold">必选方向 ↑↓</text><rect x="60" y="420" width="650" height="36" rx="6" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1"/><text x="384" y="444" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="bold">油价已跌回「伊朗危机前」· 黄金在等FOMC给出下一个方向</text></svg>