  <line x1="406.0" y1="279.17499999999995" x2="416.0" y2="291.17499999999995" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/><text x="390" y="340" font-size="13" fill="#D4A017" text-anchor="middle" font-weight="bold">日元</text><text x="390" y="356" font-size="11" fill="#64748B" text-anchor="middle" font-weight="normal">USD/JPY 160.40</text><text x="390" y="372" font-size="11" fill="#DC2626" text-anchor="middle" font-weight="bold">还在原地!</text><rect x="460" y="130" width="270" height="150" rx="8" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/><text x="595" y="155" font-size="13" fill="#475569" text-anchor="middle" font-weight="bold">为什么会这样?</text><text x="595" y="185" font-size="12" fill="#475569" text-anchor="middle" font-weight="bold">实际利率 = 名义利率 − 通胀</text><line x1="490" y1="198" x2="700" y2="198" stroke="#E2E8F0" stroke-width="1"/><text x="520" y="220" font-size="16" fill="#1A56DB" text-anchor="start" font-weight="bold">1.00%</text><text x="520" y="240" font-size="10" fill="#1A56DB" text-anchor="start" font-weight="normal">名义利率（BOJ加息后）</text><text x="670" y="220" font-size="16" fill="#475569" text-anchor="middle" font-weight="normal">−</text><text x="530" y="265" font-size="16" fill="#DC2626" text-anchor="start" font-weight="bold">2%+</text><text x="530" y="285" font-size="10" fill="#DC2626" text-anchor="start" font-weight="normal">通胀率</text><line x1="490" y1="295" x2="700" y2="295" stroke="#E2E8F0" stroke-width="1"/><text x="530" y="315" font-size="16" fill="#DC2626" text-anchor="start" font-weight="bold">≈ −1.5%</text><text x="530" y="335" font-size="10" fill="#DC2626" text-anchor="start" font-weight="normal">实际利率仍是深度负值</text><rect x="60" y="410" width="650" height="42" rx="6" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1"/><text x="384" y="436" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="bold">借日元的成本从0.75%变成1%——套利交易还在继续，日元涨不起来</text></svg>