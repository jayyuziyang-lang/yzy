  <text x="384.0" y="30" font-size="18" fill="#1A56DB" text-anchor="middle" font-weight="bold">BOJ加息悖论：利率上去了，日元为什么还在地上？</text><rect x="60" y="130" width="140" height="140" rx="5" fill="#FFF7ED" stroke="#EA580C" stroke-width="2.5"/><text x="130" y="150" font-size="14" fill="#EA580C" text-anchor="middle" font-weight="bold">日本銀行</text><text x="130" y="170" font-size="11" fill="#EA580C" text-anchor="middle" font-weight="normal">BOJ</text><rect x="75" y="185" width="110" height="40" rx="4" fill="white" stroke="#EA580C" stroke-width="1.5"/><text x="130" y="202" font-size="10" fill="#EA580C" text-anchor="middle" font-weight="normal">政策金利</text><text x="130" y="218" font-size="13" fill="#DC2626" text-anchor="middle" font-weight="bold">0.75%→1.00%</text><text x="290" y="155" font-size="12" fill="#DC2626" text-anchor="middle" font-weight="bold">加息</text><text x="290" y="172" font-size="10" fill="#64748B" text-anchor="middle" font-weight="normal">理论上</text><line x1="220" y1="200" x2="320" y2="200" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ar)"/><circle cx="390" cy="264.9" r="10" fill="#E2E8F0" stroke="#D4A017" stroke-width="2"/>
