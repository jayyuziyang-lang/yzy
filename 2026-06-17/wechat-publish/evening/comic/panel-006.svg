<rect x="70.0" y="358" width="90" height="22" rx="6" fill="white" stroke="#D4A017" stroke-width="1.5" filter="url(#soft)"/>
  <text x="115" y="373.0" font-size="10" fill="#8B6914" text-anchor="middle" font-weight="bold">日本央行</text>  <g filter="url(#soft)">
