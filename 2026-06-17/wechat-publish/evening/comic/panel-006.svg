  <text x="500" y="444" font-size="11" fill="#DC2626" text-anchor="middle" font-weight="bold">日美利差 ≈ 250bp+ 仍巨大</text>
  <text x="384" y="462" font-size="9" fill="#64748B" text-anchor="middle">"借日元买全球" 套利成本从0.75%→1% —— 结构完全没变</text>
  <text x="384" y="506" font-size="9" fill="#A8A49A" text-anchor="middle">加息≠货币走强 — 实际利率和利差才是真正的驱动力</text>
