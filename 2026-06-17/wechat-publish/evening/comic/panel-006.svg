  <text x="115" y="195" font-size="12" fill="#1A56DB" text-anchor="middle" font-weight="bold">利率↑ 至 1%</text>
  <text x="115" y="210" font-size="9" fill="#64748B" text-anchor="middle">31年最高利率</text>
<line x1="155" y1="140" x2="220" y2="115" stroke="#1A56DB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ablue)"/>
  <text x="200" y="108" font-size="9" fill="#1A56DB" text-anchor="middle">理论: 日元应升值</text>
  <rect x="240" y="130" width="160" height="80" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" filter="url(#soft)"/>
  <text x="320" y="154" font-size="11" fill="#DC2626" text-anchor="middle" font-weight="bold">实际: 美元/日元</text>
  <text x="320" y="176" font-size="18" fill="#DC2626" text-anchor="middle" font-weight="bold">160.40</text>
