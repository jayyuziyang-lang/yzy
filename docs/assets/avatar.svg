<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB"/>
      <stop offset="100%" style="stop-color:#1E3A7A"/>
    </linearGradient>
    <linearGradient id="shirt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A6BE0"/>
      <stop offset="100%" style="stop-color:#153E9E"/>
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.15"/>
    </filter>
  </defs>
  <circle cx="150" cy="150" r="150" fill="url(#bg)"/>
<g transform="translate(150, 140)">
  <!-- ===== 真实人物肖像 ===== -->
  <defs>
    <clipPath id="char-clip-150-140">
      <ellipse cx="0" cy="-7.0" rx="16.0" ry="22.0"/>
    </clipPath>
  </defs>
  <image href="data:image/jpeg;base64," x="-16.0" y="-30.0" width="32.0" height="48.0"
         preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip-150-140)"
         filter="url(#drop-shadow)"/>
  <!-- ===== 下半身简约处理 ===== -->
  <rect x="-19.0" y="12.0" width="38.0" height="34.0" rx="11.0" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
  <polygon points="-7.0,12.0 0,-2.0 7.0,12.0" fill="#FFFFFF" opacity="0.9"/>
  <polygon points="-2.5,8.0 0,0.0 2.5,8.0" fill="#D4A017"/>
  <rect x="-2.0" y="9.0" width="4.0" height="8.0" rx="1.0" fill="#D4A017"/>
</g>
  <rect x="50" y="265" width="200" height="26" rx="13" fill="rgba(255,255,255,0.12)"/>
  <text x="150" y="283" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="14" font-weight="bold" fill="white">扬说财经</text>
</svg>