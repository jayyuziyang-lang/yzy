<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <rect width="520" height="320" fill="#F0F2F5"/>
  <text x="20" y="28" font-size="14" font-weight="bold" fill="#1E293B">A股收盘全景 — 2026.05.29</text>
  <text x="20" y="42" font-size="9" fill="#64748B">三大指数集体回调 · 放量至3.34万亿 · 近3900只个股下跌</text>

  <!-- Card: 上证 -->
  <rect x="15" y="52" width="155" height="80" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="92" y="72" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E293B">上证指数</text>
  <text x="92" y="96" text-anchor="middle" font-size="18" font-weight="bold" fill="#16A34A">4,068</text>
  <text x="92" y="115" text-anchor="middle" font-size="11" fill="#16A34A">-0.73%</text>

  <!-- Card: 深证 -->
  <rect x="182" y="52" width="155" height="80" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="260" y="72" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E293B">深证成指</text>
  <text x="260" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#16A34A">15,575</text>
  <text x="260" y="115" text-anchor="middle" font-size="11" fill="#16A34A">-1.81%</text>

  <!-- Card: 创业板 -->
  <rect x="350" y="52" width="155" height="80" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="428" y="72" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E293B">创业板指</text>
  <text x="428" y="96" text-anchor="middle" font-size="18" font-weight="bold" fill="#16A34A">4,037</text>
  <text x="428" y="115" text-anchor="middle" font-size="11" fill="#16A34A">-2.11%</text>

  <!-- Card: 成交量+涨跌家数 -->
  <rect x="15" y="145" width="490" height="60" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="135" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E293B">成交额</text>
  <text x="135" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">3.34万亿</text>
  <text x="135" y="200" text-anchor="middle" font-size="7" fill="#64748B">放量3500亿</text>
  <line x1="245" y1="152" x2="245" y2="198" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="305" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#16A34A">下跌</text>
  <text x="305" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#16A34A">3,881</text>
  <text x="305" y="200" text-anchor="middle" font-size="7" fill="#64748B">只个股飘绿</text>
  <line x1="380" y1="152" x2="380" y2="198" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="430" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#DC2626">涨停</text>
  <text x="430" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#DC2626">67</text>
  <text x="430" y="200" text-anchor="middle" font-size="7" fill="#64748B">跌停59</text>

  <!-- Sectors card -->
  <rect x="15" y="218" width="490" height="65" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="20" y="238" font-size="10" font-weight="bold" fill="#1E293B">板块极端分化</text>
  <text x="20" y="256" font-size="9" fill="#DC2626">电力涨停潮（8只）  ·  白酒/消费逆势  ·  银行拉升</text>
  <text x="20" y="274" font-size="9" fill="#16A34A">半导体-5%  ·  科创50-5%  ·  消费电子/军工重挫</text>

  <!-- Source -->
  <text x="20" y="305" font-size="7" fill="#9CA3AF">来源: 新浪财经 · 21世纪经济报道 · 东方财富</text>
</svg>
