<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <rect width="520" height="320" fill="#F0F2F5"/>
  <text x="20" y="28" font-size="14" font-weight="bold" fill="#1E293B">AI军备竞赛 — Dell炸裂财报 + Anthropic估值登顶</text>
  <text x="20" y="42" font-size="9" fill="#64748B">2026.05.28 — 隔夜AI产业链全面引爆</text>

  <!-- Left: Dell -->
  <rect x="15" y="52" width="240" height="218" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="135" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C3AED">Dell · 盘后暴涨39%</text>

  <text x="135" y="100" text-anchor="middle" font-size="22" font-weight="bold" fill="#DC2626">+39%</text>
  <text x="135" y="116" text-anchor="middle" font-size="8" fill="#64748B">盘后突破443美元创历史新高</text>

  <line x1="30" y1="126" x2="240" y2="126" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="30" y="142" font-size="8" fill="#334155">营收 438.4亿 ⟶ <tspan fill="#DC2626" font-weight="bold">+88%</tspan></text>
  <text x="30" y="158" font-size="8" fill="#334155">AI服务器 161亿 ⟶ <tspan fill="#DC2626" font-weight="bold">+757%</tspan></text>
  <text x="30" y="174" font-size="8" fill="#334155">AI积压订单 <tspan font-weight="bold">513亿美元</tspan></text>
  <text x="30" y="190" font-size="8" fill="#334155">全年指引上调至1650-1690亿</text>
  <text x="30" y="206" font-size="8" fill="#334155">AI服务器年预期上调至600亿</text>

  <rect x="30" y="220" width="210" height="38" rx="4" fill="#F3E8FF"/>
  <text x="135" y="238" text-anchor="middle" font-size="8" fill="#7C3AED">2:1的AI服务器占比意味着</text>
  <text x="135" y="252" text-anchor="middle" font-size="8" fill="#7C3AED">Dell已不是PC公司，是AI基建公司</text>

  <!-- Right: Anthropic -->
  <rect x="265" y="52" width="240" height="218" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="385" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A56DB">Anthropic · 首超OpenAI</text>

  <text x="385" y="100" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A56DB">$9,650亿</text>
  <text x="385" y="116" text-anchor="middle" font-size="8" fill="#64748B">OpenAI $8,520亿（3月估值）</text>

  <line x1="280" y1="126" x2="490" y2="126" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="280" y="142" font-size="8" fill="#334155">H轮融资 <tspan font-weight="bold">650亿美元</tspan></text>
  <text x="280" y="158" font-size="8" fill="#334155">年化收入 <tspan font-weight="bold">&gt;470亿美元</tspan></text>
  <text x="280" y="174" font-size="8" fill="#334155">亚马逊 投资50亿</text>
  <text x="280" y="190" font-size="8" fill="#334155">美光·三星·SK海力士战略参投</text>
  <text x="280" y="206" font-size="8" fill="#334155">红杉·Altimeter·Dragoneer领投</text>

  <rect x="280" y="220" width="210" height="38" rx="4" fill="#E3F2FD"/>
  <text x="385" y="238" text-anchor="middle" font-size="8" fill="#1A56DB">存储三巨头投资AI模型公司</text>
  <text x="385" y="252" text-anchor="middle" font-size="8" fill="#1A56DB">产业链全面绑定AI军备</text>

  <!-- Source -->
  <text x="20" y="305" font-size="7" fill="#9CA3AF">来源: 财联社 · 东方财富 · 新浪财经 · 上海证券报</text>
</svg>
