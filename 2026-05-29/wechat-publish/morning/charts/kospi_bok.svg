<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <rect width="520" height="320" fill="#F0F2F5"/>
  <text x="20" y="28" font-size="14" font-weight="bold" fill="#1E293B">韩国市场 — KOSPI反弹 &amp; BOK维持利率</text>
  <text x="20" y="42" font-size="9" fill="#64748B">2026.05.28 韩国央行利率决议</text>

  <!-- Left: KOSPI -->
  <rect x="15" y="52" width="240" height="160" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="135" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A56DB">KOSPI 反弹超2%</text>

  <!-- Chart area - simplified line -->
  <polyline points="50,170 90,160 130,130 170,110 210,95" fill="none" stroke="#1A56DB" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="50,170 90,165 130,145 170,125 210,95" fill="none" stroke="#1A56DB" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <text x="55" y="185" font-size="7" fill="#64748B">5/25</text>
  <text x="95" y="185" font-size="7" fill="#64748B">5/26</text>
  <text x="130" y="185" font-size="7" fill="#64748B">5/27</text>
  <text x="170" y="185" font-size="7" fill="#64748B">5/28</text>
  <text x="205" y="185" font-size="7" fill="#64748B">5/29</text>

  <text x="135" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#DC2626">8,352</text>
  <text x="135" y="122" text-anchor="middle" font-size="10" fill="#DC2626">+2.0%</text>

  <!-- Right: BOK -->
  <rect x="265" y="52" width="240" height="160" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="385" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#D4A017">韩国央行维持利率2.5%</text>
  <text x="385" y="88" text-anchor="middle" font-size="7" fill="#64748B">连续第8次冻结 · 两名委员投票加息</text>

  <line x1="280" y1="98" x2="490" y2="98" stroke="#E2E8F0" stroke-width="0.5"/>

  <text x="280" y="113" font-size="9" font-weight="bold" fill="#1E293B">关键调整</text>

  <text x="280" y="130" font-size="8" fill="#334155">GDP预测: 2.0% → <tspan font-weight="bold" fill="#DC2626">2.6%</tspan></text>
  <text x="280" y="146" font-size="8" fill="#334155">通胀预测: 2.2% → <tspan font-weight="bold" fill="#EA580C">2.7%</tspan></text>
  <text x="280" y="162" font-size="8" fill="#334155">行长申铉松: "有必要适当时间加息"</text>

  <rect x="280" y="175" width="210" height="26" rx="3" fill="#FFF8E1"/>
  <text x="385" y="190" text-anchor="middle" font-size="7" fill="#D4A017">半导体出口强劲是GDP上调主动力</text>
  <text x="385" y="200" text-anchor="middle" font-size="7" fill="#D4A017">三星电子股价涨超5%</text>

  <!-- Source -->
  <text x="20" y="305" font-size="7" fill="#9CA3AF">来源: 韩联社 · AJU PRESS · 搜狐</text>
</svg>
