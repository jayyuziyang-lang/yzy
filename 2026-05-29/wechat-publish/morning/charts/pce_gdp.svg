<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <rect width="520" height="320" fill="#F0F2F5"/>
  <text x="20" y="28" font-size="14" font-weight="bold" fill="#1E293B">美国4月PCE通胀数据 — 2026.05.28</text>
  <text x="20" y="42" font-size="9" fill="#64748B">整体PCE 3.8%符合预期但创近三年新高 | GDP下修至1.6%</text>

  <!-- PCE headline card -->
  <rect x="15" y="52" width="155" height="120" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="92" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E293B">整体PCE</text>
  <text x="92" y="106" text-anchor="middle" font-size="28" font-weight="bold" fill="#D4A017">3.8%</text>
  <text x="92" y="126" text-anchor="middle" font-size="9" fill="#64748B">同比 · 符合预期</text>
  <text x="92" y="142" text-anchor="middle" font-size="8" fill="#64748B">前值3.5% | 扩0.3pp</text>
  <text x="92" y="158" text-anchor="middle" font-size="7" fill="#EA580C">创近三年新高</text>

  <!-- Core PCE card -->
  <rect x="182" y="52" width="155" height="120" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="260" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E293B">核心PCE</text>
  <text x="260" y="106" text-anchor="middle" font-size="28" font-weight="bold" fill="#1A56DB">3.3%</text>
  <text x="260" y="126" text-anchor="middle" font-size="9" fill="#64748B">同比 · 符合预期</text>
  <text x="260" y="142" text-anchor="middle" font-size="8" fill="#64748B">前值3.2% | 扩0.1pp</text>
  <text x="260" y="158" text-anchor="middle" font-size="7" fill="#64748B">环比0.2%低于预期</text>

  <!-- GDP card -->
  <rect x="350" y="52" width="155" height="120" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="428" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E293B">Q1 GDP修正值</text>
  <text x="428" y="106" text-anchor="middle" font-size="28" font-weight="bold" fill="#16A34A">1.6%</text>
  <text x="428" y="126" text-anchor="middle" font-size="9" fill="#64748B">年化增速 · 低于预期</text>
  <text x="428" y="142" text-anchor="middle" font-size="8" fill="#64748B">初值2.0% | 下修0.4pp</text>
  <text x="428" y="158" text-anchor="middle" font-size="7" fill="#16A34A">滞胀担忧升温</text>

  <!-- Detail card -->
  <rect x="15" y="185" width="490" height="95" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="30" y="205" font-size="10" font-weight="bold" fill="#1E293B">数据结构 + 政策解读</text>

  <text x="30" y="222" font-size="8" fill="#334155">汽油环比 <tspan font-weight="bold" fill="#EA580C">+5.5%</tspan> 住房环比 <tspan font-weight="bold" fill="#EA580C">+0.6%</tspan>（创今年最大月涨幅）</text>
  <text x="30" y="237" font-size="8" fill="#334155">个人储蓄率 <tspan font-weight="bold" fill="#16A34A">3.2% → 2.6%</tspan> 创2022.6以来新低</text>
  <text x="30" y="252" font-size="8" fill="#334155">美联储理事库克: <tspan font-weight="bold">"已准备好提高利率"</tspan></text>
  <text x="30" y="267" font-size="8" fill="#334155">市场定价: 6月维持不变99.4% · 年内加息概率约52%</text>

  <!-- Source -->
  <text x="20" y="305" font-size="7" fill="#9CA3AF">来源: 华尔街见闻 · 东方财富 · 财联社 · Investopedia</text>
</svg>
