<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320" font-family="PingFang SC,Microsoft YaHei,sans-serif">
  <rect width="520" height="320" fill="#F0F2F5"/>
  <!-- Title -->
  <text x="20" y="28" font-size="14" font-weight="bold" fill="#1E293B">A股主要指数 — 2026.05.28</text>
  <text x="20" y="42" font-size="9" fill="#64748B">各指数收盘表现 | 创业板创历史新高</text>

  <!-- Card: 上证指数 -->
  <rect x="15" y="52" width="155" height="110" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="92" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E293B">上证指数</text>
  <text x="92" y="102" text-anchor="middle" font-size="20" font-weight="bold" fill="#DC2626">4,098</text>
  <text x="92" y="122" text-anchor="middle" font-size="12" fill="#DC2626">+0.12%</text>
  <text x="92" y="142" text-anchor="middle" font-size="8" fill="#64748B">前日 4,093 (-1.25%)</text>

  <!-- Card: 深证成指 -->
  <rect x="182" y="52" width="155" height="110" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="260" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E293B">深证成指</text>
  <text x="260" y="102" text-anchor="middle" font-size="18" font-weight="bold" fill="#DC2626">15,861</text>
  <text x="260" y="122" text-anchor="middle" font-size="12" fill="#DC2626">+0.80%</text>
  <text x="260" y="142" text-anchor="middle" font-size="8" fill="#64748B">前日 15,736 (-0.88%)</text>

  <!-- Card: 创业板指 -->
  <rect x="350" y="52" width="155" height="110" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="428" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="#DC2626">创业板指</text>
  <text x="428" y="102" text-anchor="middle" font-size="20" font-weight="bold" fill="#DC2626">4,125</text>
  <text x="428" y="122" text-anchor="middle" font-size="12" fill="#DC2626">+1.96%</text>
  <text x="428" y="142" text-anchor="middle" font-size="8" fill="#64748B">创历史新高</text>

  <!-- Card: 北向资金 -->
  <rect x="15" y="175" width="490" height="70" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="260" y="197" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E293B">北向资金净流入</text>
  <text x="140" y="225" text-anchor="middle" font-size="24" font-weight="bold" fill="#DC2626">+249亿</text>
  <text x="350" y="225" text-anchor="middle" font-size="11" fill="#64748B">两市成交 2.97万亿（缩量2700亿）</text>

  <!-- Source -->
  <text x="20" y="305" font-size="7" fill="#9CA3AF">来源: 澎湃新闻 · 证券时报 · 东方财富</text>
</svg>
