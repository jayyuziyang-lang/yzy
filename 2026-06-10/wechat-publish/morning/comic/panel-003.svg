<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" fill="#EA580C"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">🥇 黄金跌破4200 · 加息预期摧毁避险溢价</text>

  <!-- Left: Gold decline path -->
  <text x="12" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">金价下跌路径</text>

  <rect x="12" y="58" width="136" height="18" rx="3" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="18" y="71" font-size="7" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">年内高点 5,477 美元（2月）</text>

  <rect x="12" y="80" width="136" height="6" rx="3" fill="#FEF2F2"/>
  <text x="70" y="88" font-size="6" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">▼ -23.6% 技术性熊市</text>

  <rect x="12" y="94" width="136" height="18" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="107" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">最新 4,182 美元（6/9收盘）</text>

  <rect x="12" y="116" width="136" height="18" rx="3" fill="#FFF7ED" stroke="#FED7AA" stroke-width="0.5"/>
  <text x="18" y="129" font-size="7" fill="#D97706" font-family="PingFang SC, Microsoft YaHei, sans-serif">花旗下调目标价至4,000</text>

  <rect x="12" y="138" width="136" height="18" rx="3" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="18" y="151" font-size="7" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">若破4,000 → 下探3,800</text>

  <!-- Divider -->
  <line x1="153" y1="38" x2="153" y2="172" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Right: Key signal -->
  <text x="160" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">反常信号：冲突不涨反跌</text>

  <rect x="160" y="58" width="133" height="28" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="166" y="73" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">🚁 伊朗击落美阿帕奇直升机</text>
  <text x="166" y="84" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">「地缘风险升级→金价不涨反跌」</text>

  <rect x="160" y="92" width="133" height="22" rx="4" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="0.5"/>
  <text x="166" y="105" font-size="7" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">WTI 89.62（-2.55%）</text>
  <text x="166" y="114" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">油价「脱敏」OPEC增产主导</text>

  <!-- Chain -->
  <rect x="160" y="120" width="133" height="50" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="166" y="135" font-size="7" font-weight="700" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">🧩 因果链</text>
  <text x="166" y="149" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">加息预期→实际利率↑</text>
  <text x="166" y="161" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">→持有机会成本飙升</text>
  <text x="166" y="171" font-size="6" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">→黄金定价权=利率预期</text>

  <!-- Bottom insight -->
  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 直升机被击落金价都不涨——定价权已从避险完全让渡给利率预期。</text>
  <text x="20" y="206" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   在加息预期降温前，别左侧抄底黄金。</text>
</svg>
