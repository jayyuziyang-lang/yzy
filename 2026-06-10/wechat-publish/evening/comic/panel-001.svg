<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" fill="#D4A017"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">🔥 CPI 4.2% · 鹰派表面 鸽派内核</text>

  <!-- Left: Data breakdown -->
  <text x="12" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">美国5月CPI · 今夜20:30</text>

  <rect x="12" y="58" width="136" height="18" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="71" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">CPI同比 4.2%（创三年新高）</text>

  <rect x="12" y="80" width="136" height="18" rx="3" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="18" y="93" font-size="7" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">核心CPI环比 0.2%（低于预期）</text>

  <rect x="12" y="102" width="136" height="18" rx="3" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="18" y="115" font-size="7" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">汽油同比 +40.5%（贡献60%涨幅）</text>

  <rect x="12" y="124" width="136" height="18" rx="3" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="0.5"/>
  <text x="18" y="137" font-size="7" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">12月加息概率 70% → 43~50%</text>

  <!-- Divider -->
  <line x1="153" y1="38" x2="153" y2="172" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Right: Market reaction -->
  <text x="160" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">市场反应 · 分化非恐慌</text>

  <rect x="160" y="58" width="133" height="22" rx="4" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="166" y="73" font-size="7" font-weight="700" fill="#16A34A" font-family="PingFang SC, Microsoft YaHei, sans-serif">道琼斯 +0.17%（防御轮动）</text>

  <rect x="160" y="84" width="133" height="22" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="166" y="99" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">纳指 -0.97%（科技承压）</text>

  <rect x="160" y="110" width="133" height="22" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="166" y="125" font-size="7" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">SOX -1.93%（盘中曾跌-8.6%）</text>

  <rect x="160" y="136" width="133" height="18" rx="3" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="0.5"/>
  <text x="166" y="149" font-size="7" fill="#7C3AED" font-family="PingFang SC, Microsoft YaHei, sans-serif">VIX 19.86（盘中最高21.64）</text>

  <rect x="160" y="158" width="133" height="14" rx="3" fill="#FFF7ED" stroke="#FED7AA" stroke-width="0.5"/>
  <text x="166" y="169" font-size="6" fill="#D97706" font-family="PingFang SC, Microsoft YaHei, sans-serif">黄金 4182（-1.94%）跌破4200</text>

  <!-- Bottom insight -->
  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 整体CPI由油价推高，核心通胀实则降温。市场解读为"higher for longer"而非"加息加速"。</text>
  <text x="20" y="206" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   资金从科技轮动到防御，道指涨、纳指跌——这是有选择的分化，不是无差别的恐慌。</text>
</svg>
