<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Balance scale -->
  <line x1="150" y1="85" x2="150" y2="170" stroke="#1E293B" stroke-width="3"/>
  <line x1="75" y1="55" x2="225" y2="55" stroke="#1E293B" stroke-width="2.5"/>
  <!-- Left pan: slightly lighter -->
  <path d="M60,55 Q45,70 60,85 Q75,70 60,55" fill="none" stroke="#D4A017" stroke-width="2"/>
  <rect x="52" y="64" width="6" height="10" fill="#D4A017" stroke="none"/>
  <text x="52" y="46" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#D4A017">避险退</text>
  <!-- Right pan: price still heavy -->
  <path d="M240,55 Q255,70 240,85 Q225,70 240,55" fill="none" stroke="#1E293B" stroke-width="2"/>
  <text x="240" y="72" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="800" fill="#1E293B">$4542</text>
  <!-- Price chart mini -->
  <polyline points="20,175 40,168 60,175 80,162 100,170 120,158 140,166 160,152 180,160 200,148 220,155 240,142 260,150 280,138" fill="none" stroke="#D4A017" stroke-width="2"/>
  <!-- Annotations -->
  <text x="150" y="110" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#16A34A">震荡下行</text>
  <line x1="150" y1="113" x2="150" y2="120" stroke="#16A34A" stroke-width="0.5"/>
  <!-- China prices -->
  <text x="230" y="200" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="700" fill="#1E293B">国内 ¥985-998</text>
  <text x="230" y="212" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">上海金交所 / 克</text>
</svg>
