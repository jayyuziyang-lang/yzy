<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="28" rx="8" fill="#1A56DB" filter="url(#shadow)"/>
  <rect x="0" y="18" width="300" height="10" fill="#1A56DB"/>
  <text x="150" y="19" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="bold" fill="white">隔夜美股</text>

  <!-- Left: 道指 -->
  <rect x="8" y="36" width="140" height="90" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="78" y="58" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" font-weight="bold" fill="#059669">道指 首破50000点</text>
  <rect x="20" y="64" width="116" height="1" fill="#10B981" opacity="0.3"/>
  <text x="78" y="85" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="22" font-weight="bold" fill="#059669">50,285</text>
  <text x="78" y="104" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#047857">收涨 +0.55% · 历史新高</text>
  <text x="78" y="118" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">标普+0.17% 纳指+0.09%</text>

  <!-- Right: 科技 -->
  <rect x="152" y="36" width="140" height="90" rx="8" fill="#F0F4FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="222" y="58" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" font-weight="bold" fill="#7C3AED">科技双线爆发</text>
  <rect x="164" y="64" width="116" height="1" fill="#8B5CF6" opacity="0.3"/>

  <text x="222" y="80" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="bold" fill="#7C3AED">量子计算</text>
  <text x="222" y="94" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#475569">IBM +12% · D-Wave +33%</text>

  <text x="222" y="112" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="bold" fill="#DC2626">存储芯片</text>
  <text x="222" y="126" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#475569">ARM +16% · 闪迪+10% · 希捷+8%</text>

  <!-- Bottom: 20亿政策 -->
  <rect x="30" y="136" width="240" height="24" rx="6" fill="#1A56DB" opacity="0.06"/>
  <text x="150" y="152" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1A56DB">⚡ 特朗普20亿美元量子计算扶持计划</text>

  <!-- 阿扬 -->
  <g transform="translate(150, 180)">
    <defs><clipPath id="char"><ellipse cx="0" cy="-4.5" rx="10.3" ry="14.1"/></clipPath></defs>
    <image href="data:image/jpeg;base64," x="-10.3" y="-19.2" width="20.6" height="30.9" preserveAspectRatio="xMidYMin slice" clip-path="url(#char)" filter="url(#shadow)"/>
    <rect x="-12.35" y="7.8" width="24.7" height="22.1" rx="7.15" fill="#1A56DB" opacity="0.85" filter="url(#shadow)"/>
  </g>
</svg>
