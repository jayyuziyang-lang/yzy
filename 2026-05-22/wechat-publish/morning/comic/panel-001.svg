<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <!-- 主投影滤镜 -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <!-- 柔和投影 -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <!-- 品牌蓝色渐变 -->
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <!-- 品牌金色渐变 -->
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- 对话框渐变 -->
    <linearGradient id="bubble-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(26,86,219,0.15)"/>
      <stop offset="100%" stop-color="rgba(26,86,219,0.02)"/>
    </linearGradient>
    <!-- 背景网格图案 -->
    <pattern id="dot-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#E2E8F0" opacity="0.3"/>
    </pattern>
  </defs>
  <g transform="translate(0, 28)">

  <rect width="300" height="220" fill="#FAFAFA"/>
    <!-- 叙事性标题栏（FT研究方法） -->
    <rect x="0" y="0" width="300.0" height="28" fill="#1A56DB" rx="0"/>
    <text x="150.0" y="15.0" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">-2.04%</text>
    <line x1="0" y1="28" x2="300.0" y2="28" stroke="#D4A017" stroke-width="1.5"/>

  <!-- K-line rising then sharply falling -->
  <polyline points="20,145 45,130 65,135 85,100 105,105 125,80 145,85 160,50 175,58 190,35 200,42" fill="none" stroke="#1E293B" stroke-width="2.8"/>
  <!-- Sharp drop line -->
  <line x1="200" y1="42" x2="240" y2="165" stroke="#16A34A" stroke-width="3.5"/>
  <polygon points="240,165 233,152 247,152" fill="#16A34A"/>
  <polygon points="246,158 233,170 250,172" fill="#16A34A"/>
  <!-- Speed lines on drop -->
  <line x1="210" y1="60" x2="216" y2="50" stroke="#94A3B8" stroke-width="0.7"/>
  <line x1="215" y1="80" x2="224" y2="74" stroke="#94A3B8" stroke-width="0.7"/>
  <line x1="222" y1="105" x2="230" y2="100" stroke="#94A3B8" stroke-width="0.7"/>
  <line x1="228" y1="135" x2="237" y2="132" stroke="#94A3B8" stroke-width="0.7"/>
  <!-- Annotations -->
  <text x="195" y="28" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="900" fill="#1E293B">4199</text>
  <text x="255" y="170" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="14" font-weight="900" fill="#16A34A">-2.04%</text>
  <text x="255" y="185" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#64748B">4077.28</text>
  <!-- Bank building rising -->
  <rect x="10" y="110" width="22" height="60" fill="none" stroke="#1E293B" stroke-width="2.2"/>
  <rect x="14" y="115" width="5" height="6" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <rect x="22" y="115" width="5" height="6" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <rect x="14" y="125" width="5" height="6" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <rect x="22" y="125" width="5" height="6" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <rect x="14" y="135" width="5" height="6" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <rect x="22" y="135" width="5" height="6" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <line x1="21" y1="95" x2="21" y2="108" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="14,100 21,90 28,100" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <text x="21" y="82" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#DC2626">银行新高</text>
  <!-- Volume bar -->
  <rect x="262" y="135" width="18" height="55" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="271" y="202" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">3.5万亿</text>
  </g>
</svg>
