<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>
  <rect width="300" height="220" fill="#F0F4FF" rx="8"/>

  <!-- Mountain visual -->
  <!-- Left peak (Dow 50000) - tall -->
  <polygon points="50,190 100,60 150,190" fill="#10B981" opacity="0.2"/>
  <polygon points="50,190 100,60 150,190" fill="none" stroke="#10B981" stroke-width="2"/>
  <circle cx="100" cy="60" r="6" fill="#10B981"/>
  <text x="100" y="54" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#059669">道指50000</text>

  <!-- Right peak (A股) - shorter -->
  <polygon points="130,190 180,110 230,190" fill="#EF4444" opacity="0.15"/>
  <polygon points="130,190 180,110 230,190" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="180" cy="110" r="6" fill="#EF4444" opacity="0.7"/>
  <text x="180" y="104" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#DC2626">A股4000</text>

  <!-- Ground -->
  <rect x="30" y="190" width="240" height="2" fill="#CBD5E1" rx="1"/>

  <!-- Title -->
  <text x="150" y="30" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#1A56DB">50000点的风景</text>
  <text x="150" y="48" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#64748B">同一个天空，两个世界</text>

  <!-- Divider arrow -->
  <text x="150" y="160" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="12" fill="#94A3B8">↕ 差距</text>
  <text x="150" y="178" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#94A3B8">10000点的距离</text>

  <!-- 阿扬角色 -->
  <g transform="translate(150, 200)">
    <defs>
      <clipPath id="char"><ellipse cx="0" cy="-2.7" rx="6.15" ry="8.45"/></clipPath>
    </defs>
    <image href="data:image/jpeg;base64," x="-6.15" y="-11.55" width="12.3" height="20.4" preserveAspectRatio="xMidYMin slice" clip-path="url(#char)" filter="url(#shadow)"/>
  </g>
</svg>
