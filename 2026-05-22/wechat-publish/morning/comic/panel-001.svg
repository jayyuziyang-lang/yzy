<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>
  <circle cx="150" cy="90" r="80" fill="#10B981" opacity="0.06"/>

  <!-- Title -->
  <text x="150" y="38" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="17" font-weight="bold" fill="#059669">道指首破50000点</text>
  <text x="150" y="58" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="11" fill="#1E293B">美股道琼斯指数创收盘历史新高</text>

  <!-- Big number -->
  <rect x="40" y="72" width="220" height="56" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <text x="150" y="98" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="26" font-weight="bold" fill="#059669">50,285</text>
  <text x="150" y="118" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#047857">收涨 +0.55% · 年内第15次创新高</text>

  <!-- Context -->
  <text x="150" y="150" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#64748B">与此同时 标普500 +0.17% | 纳指 +0.09%</text>

  <!-- 阿扬角色 -->
  <g transform="translate(150, 182)">
    <defs>
      <clipPath id="char-clip">
        <ellipse cx="0" cy="-4.5" rx="10.3" ry="14.1"/>
      </clipPath>
    </defs>
    <image href="data:image/jpeg;base64," x="-10.3" y="-19.2" width="20.6" height="30.9"
             preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip)"
             filter="url(#drop-shadow)"/>
    <rect x="-12.35" y="7.8" width="24.7" height="22.1" rx="7.15" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
    <polygon points="-4.55,7.8 0,-1.3 4.55,7.8" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="-1.625,5.2 0,0.0 1.625,5.2" fill="#D4A017"/>
    <rect x="-1.3" y="5.85" width="2.6" height="5.2" rx="0.65" fill="#D4A017"/>
  </g>

  <!-- 气泡 -->
  <g transform="translate(210, 132)">
    <path d="M0,0 Q-8,-12 8,-12 L55,-12 Q68,-12 68,0 L68,18 Q68,26 60,26 L22,26 L14,34 L16,26 L8,26 Q0,26 0,18 Z" fill="white" stroke="#10B981" stroke-width="1"/>
    <text x="34" y="6" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#1E293B">50000点！</text>
    <text x="34" y="17" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#1E293B">里程碑时刻 🎉</text>
  </g>
</svg>
