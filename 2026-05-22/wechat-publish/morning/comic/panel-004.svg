<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <!-- 主投影滤镜 -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <!-- 柔和投影 -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <!-- 品牌蓝色渐变 -->
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <!-- 品牌金色渐变 -->
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- 对话框渐变 -->
    <linearGradient id="bubble-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(26,86,219,0.15)"/>
      <stop offset="100%" stop-color="rgba(26,86,219,0.02)"/>
    </linearGradient>
    <!-- 背景网格图案 -->
    <pattern id="dot-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#E2E8F0" opacity="0.3"/>
    </pattern>
  </defs>
  <g transform="translate(0, 28)">

  <rect width="300" height="220" fill="#FAFAFA"/>
    <!-- 叙事性标题栏（FT研究方法） -->
    <rect x="0" y="0" width="300.0" height="28" fill="#1A56DB" rx="0"/>
    <text x="150.0" y="15.0" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">$</text>
    <line x1="0" y1="28" x2="300.0" y2="28" stroke="#D4A017" stroke-width="1.5"/>

  <!-- Central quantum/atom symbol -->
  <circle cx="150" cy="95" r="22" fill="none" stroke="#1A56DB" stroke-width="2.5"/>
  <circle cx="150" cy="95" r="6" fill="#1A56DB"/>
  <!-- Orbiting electron paths -->
  <ellipse cx="150" cy="95" rx="40" ry="15" fill="none" stroke="#1E293B" stroke-width="1.5" transform="rotate(-30,150,95)"/>
  <ellipse cx="150" cy="95" rx="40" ry="15" fill="none" stroke="#1E293B" stroke-width="1.5" transform="rotate(30,150,95)"/>
  <ellipse cx="150" cy="95" rx="40" ry="15" fill="none" stroke="#1E293B" stroke-width="1.5"/>
  <!-- Electrons -->
  <circle cx="115" cy="78" r="5" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="180" cy="105" r="5" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="155" cy="55" r="5" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <!-- Dollar signs orbiting -->
  <text x="112" y="145" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="14" font-weight="900" fill="#D4A017">$</text>
  <text x="190" y="55" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="14" font-weight="900" fill="#D4A017">$</text>
  <!-- Trump/IBM labels -->
  <text x="92" y="176" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#64748B">特朗普20亿扶持</text>
  <text x="200" y="176" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#64748B">IBM+12% · D-Wave+33%</text>
  <!-- Title at bottom -->
  <line x1="80" y1="192" x2="220" y2="192" stroke="#1A56DB" stroke-width="0.8"/>
  <text x="150" y="208" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="700" fill="#1E293B">量子计算 · 产业化加速</text>
  </g>
</svg>
