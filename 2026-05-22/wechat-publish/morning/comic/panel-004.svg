<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="300" height="220" fill="#FFF8E7" rx="8"/>

  <!-- Quote card -->
  <rect x="25" y="20" width="250" height="120" rx="14" fill="white" stroke="#D4A017" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Decorative quote marks -->
  <text x="45" y="52" font-family="Georgia,serif" font-size="28" fill="#D4A017" opacity="0.4">"</text>

  <text x="62" y="85" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="13" font-weight="bold" fill="#92400E">隔夜的故事讲完了</text>
  <text x="62" y="108" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="13" font-weight="bold" fill="#92400E">今天的剧本才刚刚开始</text>

  <text x="230" y="130" font-family="Georgia,serif" font-size="20" fill="#D4A017" opacity="0.4">"</text>

  <!-- Bottom line -->
  <rect x="60" y="152" width="180" height="1" fill="#D4A017" opacity="0.3"/>
  <text x="150" y="165" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#B8860B">关注开盘信号，不急于做判断</text>

  <!-- 阿扬 -->
  <g transform="translate(150, 190)">
    <defs><clipPath id="char"><ellipse cx="0" cy="-3.6" rx="8.2" ry="11.3"/></clipPath></defs>
    <image href="data:image/jpeg;base64," x="-8.2" y="-15.4" width="16.4" height="24.6" preserveAspectRatio="xMidYMin slice" clip-path="url(#char)" filter="url(#shadow)"/>
  </g>
</svg>
