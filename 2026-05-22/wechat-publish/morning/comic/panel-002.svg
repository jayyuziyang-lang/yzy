<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" rx="8" fill="#7C3AED" filter="url(#drop-shadow)"/>
  <rect x="0" y="20" width="300" height="10" fill="#7C3AED"/>
  <text x="150" y="20" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="bold" fill="white">🚀 科技双线爆发</text>

  <!-- Left: 量子计算 -->
  <rect x="8" y="38" width="140" height="85" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <text x="78" y="58" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#7C3AED">量子计算</text>
  <rect x="20" y="64" width="116" height="1" fill="#8B5CF6" opacity="0.3"/>
  <text x="78" y="80" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="bold" fill="#7C3AED">+12%</text>
  <text x="78" y="96" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">IBM · 特朗普20亿计划</text>
  <text x="78" y="112" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#EF4444">D-Wave +33.4%</text>

  <!-- Right: 存储芯片 -->
  <rect x="152" y="38" width="140" height="85" rx="8" fill="white" stroke="#EF4444" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <text x="222" y="58" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#DC2626">存储芯片</text>
  <rect x="164" y="64" width="116" height="1" fill="#EF4444" opacity="0.3"/>
  <text x="222" y="80" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="bold" fill="#DC2626">+16%</text>
  <text x="222" y="96" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">ARM 市值首破3000亿</text>
  <text x="222" y="112" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#EF4444">闪迪+10% 希捷+8%</text>

  <!-- Bottom summary -->
  <rect x="20" y="133" width="260" height="30" rx="8" fill="#7C3AED" opacity="0.08"/>
  <text x="150" y="152" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#7C3AED">AI驱动：从GPU算力需求 → 存储基础设施扩张</text>

  <!-- 阿扬角色 -->
  <g transform="translate(150, 185)">
    <defs>
      <clipPath id="char-clip">
        <ellipse cx="0" cy="-3.6" rx="8.2" ry="11.3"/>
      </clipPath>
    </defs>
    <image href="data:image/jpeg;base64," x="-8.2" y="-15.4" width="16.4" height="24.6"
             preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip)"
             filter="url(#drop-shadow)"/>
    <rect x="-9.85" y="6.24" width="19.7" height="17.68" rx="5.72" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
    <polygon points="-3.64,6.24 0,-1.04 3.64,6.24" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="-1.3,4.16 0,0.0 1.3,4.16" fill="#D4A017"/>
    <rect x="-1.04" y="4.68" width="2.08" height="4.16" rx="0.52" fill="#D4A017"/>
  </g>
</svg>
