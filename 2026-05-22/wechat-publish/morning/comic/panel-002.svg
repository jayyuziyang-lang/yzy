<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>
  <rect x="0" y="0" width="300" height="30" rx="8" fill="#D4A017" filter="url(#drop-shadow)"/>
  <rect x="0" y="20" width="300" height="10" fill="#D4A017"/>
  <text x="150" y="20" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="bold" fill="white">💥 为什么跌？三大元凶</text>

  <!-- 元凶1 -->
  <rect x="10" y="40" width="280" height="44" rx="6" fill="white" stroke="#EF4444" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="25" y="58" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#DC2626">元凶一：伊朗局势升级</text>
  <text x="25" y="75" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">霍尔木兹海峡通行费争议 → 94艘商船改道</text>
  <text x="275" y="58" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#EF4444">⚠️ 地缘</text>

  <!-- 元凶2 -->
  <rect x="10" y="92" width="280" height="44" rx="6" fill="white" stroke="#D4A017" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="25" y="110" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#B8860B">元凶二：流动性拐点担忧</text>
  <text x="25" y="127" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">华创张瑜：债市杠杆率突破90% → 流动性收紧在即</text>
  <text x="275" y="110" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#D4A017">💰 资金</text>

  <!-- 元凶3 -->
  <rect x="10" y="144" width="280" height="44" rx="6" fill="white" stroke="#1A56DB" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="25" y="162" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#1A56DB">元凶三：美联储鹰派转向</text>
  <text x="25" y="179" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">美10年国债收益率>4.57% 加息概率42% → 全球资金回流</text>
  <text x="275" y="162" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1A56DB">🌍 宏观</text>

  <!-- 底部总结 -->
  <rect x="30" y="196" width="240" height="18" rx="8" fill="#EF4444" opacity="0.1"/>
  <text x="150" y="209" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#DC2626">三重利空叠加，A股午后单边崩跌</text>
</svg>
