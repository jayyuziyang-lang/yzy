<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>

  <!-- Wave path -->
  <path d="M0,160 C40,120 60,180 100,140 C140,100 160,160 200,120 C240,80 260,140 300,100 L300,220 L0,220 Z" fill="url(#wave)"/>

  <!-- Quantum icon -->
  <circle cx="80" cy="70" r="32" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="80" cy="70" r="26" fill="none" stroke="#8B5CF6" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="80" y="74" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="bold" fill="#7C3AED">⚛</text>
  <text x="80" y="118" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="bold" fill="#7C3AED">量子计算</text>
  <text x="80" y="132" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#475569">IBM +12%</text>
  <text x="80" y="143" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#EF4444">D-Wave +33%</text>

  <!-- Storage chip icon -->
  <circle cx="220" cy="65" r="32" fill="white" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="204" y="49" width="32" height="32" rx="4" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <text x="220" y="69" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" font-weight="bold" fill="#DC2626">💾</text>
  <text x="220" y="113" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="bold" fill="#DC2626">存储芯片</text>
  <text x="220" y="127" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#475569">ARM +16%</text>
  <text x="220" y="138" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#EF4444">闪迪+10% 希捷+8%</text>

  <!-- Center: connection arrows -->
  <path d="M125,75 C140,55 160,55 175,75" fill="none" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="150" y="50" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="14" font-weight="bold" fill="#1A56DB">科技浪潮</text>

  <!-- Bottom tag -->
  <rect x="60" y="160" width="180" height="22" rx="11" fill="#7C3AED" opacity="0.1"/>
  <text x="150" y="175" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#7C3AED">AI驱动：GPU扩张 → 存储爆发</text>

  <!-- 阿扬 -->
  <g transform="translate(272, 200)">
    <defs><clipPath id="char"><ellipse cx="0" cy="-2.7" rx="6.15" ry="8.45"/></clipPath></defs>
    <image href="data:image/jpeg;base64," x="-6.15" y="-11.55" width="12.3" height="20.4" preserveAspectRatio="xMidYMin slice" clip-path="url(#char)" filter="url(#shadow)"/>
  </g>
</svg>
