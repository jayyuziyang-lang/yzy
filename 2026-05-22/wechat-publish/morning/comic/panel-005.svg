<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <!-- 主投影滤镜 -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <!-- 柔和投影 -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <!-- 品牌蓝色渐变 -->
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <!-- 品牌金色渐变 -->
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- 对话框渐变 -->
    <linearGradient id="bubble-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(26,86,219,0.15)"/>
      <stop offset="100%" stop-color="rgba(26,86,219,0.02)"/>
    </linearGradient>
    <!-- 背景网格图案 -->
    <pattern id="dot-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#E2E8F0" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Storm cloud -->
  <ellipse cx="150" cy="55" rx="80" ry="30" fill="none" stroke="#1E293B" stroke-width="2.5"/>
  <ellipse cx="120" cy="45" rx="40" ry="22" fill="none" stroke="#1E293B" stroke-width="2"/>
  <ellipse cx="180" cy="48" rx="35" ry="20" fill="none" stroke="#1E293B" stroke-width="2"/>
  <!-- Lightning bolts -->
  <polyline points="130,70 125,90 140,90 130,120" fill="none" stroke="#D4A017" stroke-width="2.5" stroke-linejoin="round"/>
  <polyline points="170,75 165,92 180,92 170,115" fill="none" stroke="#D4A017" stroke-width="2" stroke-linejoin="round"/>
  <!-- Fed building silhouette -->
  <rect x="60" y="110" width="70" height="55" fill="none" stroke="#1E293B" stroke-width="2.2"/>
  <rect x="70" y="115" width="12" height="15" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <rect x="88" y="115" width="12" height="15" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <rect x="106" y="115" width="12" height="15" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <text x="95" y="180" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="700" fill="#1E293B">美联储</text>
  <!-- Bond yields -->
  <rect x="170" y="120" width="90" height="35" fill="none" stroke="#D4A017" stroke-width="2"/>
  <text x="215" y="137" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="700" fill="#B8860B">10Y</text>
  <text x="215" y="148" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1E293B">&gt; 4.57%</text>
  <!-- Labels -->
  <text x="215" y="180" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="700" fill="#DC2626">沃什今晚就职</text>
  <text x="215" y="195" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">12月加息概率42%</text>
</svg>
