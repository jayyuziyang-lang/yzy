<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- ARM chip -->
  <rect x="15" y="45" width="80" height="55" rx="3" fill="none" stroke="#1E293B" stroke-width="2.5"/>
  <text x="55" y="78" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" font-weight="800" fill="#1E293B">ARM</text>
  <text x="55" y="92" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="700" fill="#DC2626">+16%</text>
  <!-- Radiating lines from ARM -->
  <line x1="95" y1="55" x2="120" y2="45" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="95" y1="72" x2="125" y2="72" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="95" y1="90" x2="120" y2="100" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- OpenAI + Broadcom -->
  <rect x="150" y="65" width="75" height="55" rx="3" fill="none" stroke="#1E293B" stroke-width="2.5"/>
  <text x="187" y="90" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="700" fill="#1E293B">OpenAI</text>
  <text x="187" y="102" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">+博通</text>
  <text x="187" y="114" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="700" fill="#DC2626">+10%</text>
  <!-- Connection cross -->
  <line x1="130" y1="72" x2="145" y2="72" stroke="#D4A017" stroke-width="1.5"/>
  <line x1="130" y1="100" x2="145" y2="100" stroke="#D4A017" stroke-width="1.5"/>
  <line x1="138" y1="72" x2="138" y2="100" stroke="#D4A017" stroke-width="1.5"/>
  <!-- 10GW label -->
  <text x="150" y="140" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" font-weight="700" fill="#DC2626">10GW自研芯片</text>
  <!-- Other storage names -->
  <text x="95" y="170" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">闪迪+10%</text>
  <text x="230" y="52" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">希捷+8%</text>
  <text x="115" y="190" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">西数+3%</text>
  <text x="230" y="130" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">美光+3%</text>
  <!-- Decorative circuit traces -->
  <line x1="30" y1="175" x2="270" y2="175" stroke="#E2E8F0" stroke-width="0.6"/>
  <rect x="40" y="180" width="4" height="4" fill="none" stroke="#CBD5E1" stroke-width="0.8"/>
  <rect x="60" y="183" width="4" height="4" fill="none" stroke="#CBD5E1" stroke-width="0.8"/>
  <rect x="220" y="180" width="4" height="4" fill="none" stroke="#CBD5E1" stroke-width="0.8"/>
  <rect x="240" y="183" width="4" height="4" fill="none" stroke="#CBD5E1" stroke-width="0.8"/>
</svg>
