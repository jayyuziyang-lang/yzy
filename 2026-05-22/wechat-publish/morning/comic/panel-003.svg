<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="30" rx="8" fill="#1A56DB" filter="url(#drop-shadow)"/>
  <rect x="0" y="20" width="300" height="10" fill="#1A56DB"/>
  <text x="150" y="20" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="bold" fill="white">🌍 宏观风向</text>

  <!-- Item 1: 美债收益率 -->
  <rect x="10" y="40" width="280" height="48" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="25" y="58" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#DC2626">美债收益率飙升</text>
  <text x="25" y="76" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">10年期 &gt; 4.57% · 30年期突破5.1%（2007年以来新高）</text>
  <rect x="210" y="44" width="72" height="18" rx="4" fill="#EF4444" opacity="0.15"/>
  <text x="246" y="57" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#DC2626">利空风险资产</text>

  <!-- Item 2: 沃什就职 -->
  <rect x="10" y="96" width="280" height="48" rx="6" fill="#F0F4FF" stroke="#1A56DB" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="25" y="114" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#1A56DB">沃什今晚宣誓就任美联储主席</text>
  <text x="25" y="132" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">市场预期鹰派立场 → 12月加息概率升至42%</text>
  <rect x="210" y="100" width="72" height="18" rx="4" fill="#1A56DB" opacity="0.12"/>
  <text x="246" y="113" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#1A56DB">今晚关注</text>

  <!-- Item 3: 国内政策 -->
  <rect x="10" y="152" width="280" height="40" rx="6" fill="#FFF8E7" stroke="#D4A017" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="25" y="170" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#B8860B">国内政策：央行法修订</text>
  <text x="25" y="185" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">国常会推进统一大市场建设，政策面释放积极信号</text>

  <!-- 阿扬角色 -->
  <g transform="translate(268, 200)">
    <defs>
      <clipPath id="char-clip">
        <ellipse cx="0" cy="-2.7" rx="6.15" ry="8.45"/>
      </clipPath>
    </defs>
    <image href="data:image/jpeg;base64," x="-6.15" y="-11.55" width="12.3" height="20.4"
             preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip)"
             filter="url(#drop-shadow)"/>
    <rect x="-8.55" y="5.4" width="17.1" height="15.3" rx="4.95" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
    <polygon points="-3.15,5.4 0,-0.9 3.15,5.4" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="-1.125,3.6 0,0.0 1.125,3.6" fill="#D4A017"/>
    <rect x="-0.9" y="4.05" width="1.8" height="3.6" rx="0.45" fill="#D4A017"/>
  </g>
</svg>
