<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="storm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
  </defs>
  <rect width="300" height="220" fill="#F8FAFC" rx="8"/>

  <!-- Storm clouds -->
  <ellipse cx="80" cy="40" rx="60" ry="25" fill="#334155" opacity="0.5"/>
  <ellipse cx="150" cy="30" rx="70" ry="20" fill="#475569" opacity="0.4"/>
  <ellipse cx="230" cy="45" rx="50" ry="22" fill="#334155" opacity="0.45"/>

  <!-- Lightning bolt -->
  <polygon points="120,75 108,120 128,120 115,165 140,115 120,115 133,75" fill="#F59E0B" opacity="0.8" filter="url(#shadow)"/>

  <!-- Fed building silhouette -->
  <rect x="50" y="150" width="200" height="60" rx="4" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="110" y="155" width="80" height="12" rx="2" fill="#94A3B8"/>
  <!-- Columns -->
  <rect x="65" y="167" width="12" height="43" fill="#CBD5E1" rx="1"/>
  <rect x="95" y="167" width="12" height="43" fill="#CBD5E1" rx="1"/>
  <rect x="125" y="167" width="12" height="43" fill="#CBD5E1" rx="1"/>
  <rect x="155" y="167" width="12" height="43" fill="#CBD5E1" rx="1"/>
  <rect x="185" y="167" width="12" height="43" fill="#CBD5E1" rx="1"/>
  <rect x="220" y="167" width="12" height="43" fill="#CBD5E1" rx="1"/>

  <!-- Title -->
  <text x="150" y="80" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#1E293B">风暴前夜</text>
  <text x="150" y="98" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#EF4444">美债收益率飙升至2007年以来新高</text>
  <text x="150" y="112" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#64748B">10Y>4.57% · 30Y>5.1% · 加息概率42%</text>

  <!-- 阿扬 -->
  <g transform="translate(35, 200)">
    <defs><clipPath id="char"><ellipse cx="0" cy="-2.7" rx="6.15" ry="8.45"/></clipPath></defs>
    <image href="data:image/jpeg;base64," x="-6.15" y="-11.55" width="12.3" height="20.4" preserveAspectRatio="xMidYMin slice" clip-path="url(#char)" filter="url(#shadow)"/>
  </g>
</svg>
