<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>

  <!-- 道指新高 -->
  <rect x="10" y="10" width="135" height="90" rx="8" fill="#D1FAE5" filter="url(#drop-shadow)"/>
  <rect x="10" y="10" width="135" height="90" rx="8" fill="#10B981" opacity="0.05"/>
  <text x="77" y="38" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="14" font-weight="bold" fill="#059669">道指</text>
  <text x="77" y="62" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="18" font-weight="bold" fill="#10B981">50,285</text>
  <text x="77" y="82" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#059669">历史新高！+0.55%</text>

  <!-- 沪指 -->
  <rect x="155" y="10" width="135" height="90" rx="8" fill="#FEE2E2" filter="url(#drop-shadow)"/>
  <rect x="155" y="10" width="135" height="90" rx="8" fill="#EF4444" opacity="0.05"/>
  <text x="222" y="38" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="14" font-weight="bold" fill="#DC2626">沪指</text>
  <text x="222" y="62" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="18" font-weight="bold" fill="#EF4444">4,077</text>
  <text x="222" y="82" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="9" fill="#DC2626">大跌2.04% 放量</text>

  <!-- 对比箭头 -->
  <text x="150" y="68" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="16" fill="#64748B">↔</text>

  <!-- 科技股亮点 -->
  <rect x="10" y="110" width="280" height="50" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="150" y="132" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="11" font-weight="bold" fill="#7C3AED">✨ 但科技股有亮点</text>
  <text x="150" y="150" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#475569">量子计算：IBM+12%  D-Wave+33%  |  存储：ARM +16% 闪迪+10%</text>

  <!-- 阿扬角色在右下 -->
  <g transform="translate(150, 186)">
    <defs>
      <clipPath id="char-clip-150-186">
        <ellipse cx="0" cy="-4.5" rx="10.3" ry="14.1"/>
      </clipPath>
    </defs>
    <image href="data:image/jpeg;base64," x="-10.3" y="-19.2" width="20.6" height="30.9"
             preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip-150-186)"
             filter="url(#drop-shadow)"/>
    <rect x="-12.35" y="7.800000000000001" width="24.7" height="22.1" rx="7.15" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
    <polygon points="-4.55,7.800000000000001 0,-1.3 4.55,7.800000000000001" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="-1.625,5.2 0,0.0 1.625,5.2" fill="#D4A017"/>
    <rect x="-1.3" y="5.8500000000000005" width="2.6" height="5.2" rx="0.65" fill="#D4A017"/>
  </g>

  <text x="150" y="214" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#64748B">一边创新高，一边4000点保卫战，这差距…</text>
</svg>
