<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>
  <!-- 标题栏 -->
  <rect x="0" y="0" width="300" height="30" rx="8" fill="#1A56DB" filter="url(#drop-shadow)"/>
  <rect x="0" y="20" width="300" height="10" fill="#1A56DB"/>
  <text x="150" y="20" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="13" font-weight="bold" fill="white">📡 扬说财经 · 今日热点速览</text>

  <!-- 新闻条目（左侧6条） -->
  <!-- 1: A股大跌 -->
  <rect x="8" y="36" width="175" height="24" rx="4" fill="#EF4444" opacity="0.08" filter="url(#drop-shadow)"/>
  <rect x="8" y="36" width="3" height="24" rx="2" fill="#EF4444" filter="url(#drop-shadow)"/>
  <text x="16" y="52" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#DC2626">A股大跌</text>
  <text x="52" y="52" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1E293B">沪指-2.04% 深成指-2.07%</text>
  <text x="175" y="52" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#EF4444">放量3.5万亿</text>

  <!-- 2: 道指新高 -->
  <rect x="8" y="64" width="175" height="24" rx="4" fill="#10B981" opacity="0.08" filter="url(#drop-shadow)"/>
  <rect x="8" y="64" width="3" height="24" rx="2" fill="#10B981" filter="url(#drop-shadow)"/>
  <text x="16" y="80" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#059669">道指新高</text>
  <text x="52" y="80" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1E293B">道指50285点创历史新高</text>
  <text x="175" y="80" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#10B981">+0.55%</text>

  <!-- 3: 量子计算 -->
  <rect x="8" y="92" width="175" height="24" rx="4" fill="#8B5CF6" opacity="0.08" filter="url(#drop-shadow)"/>
  <rect x="8" y="92" width="3" height="24" rx="2" fill="#8B5CF6" filter="url(#drop-shadow)"/>
  <text x="16" y="108" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#7C3AED">量子计算</text>
  <text x="52" y="108" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1E293B">IBM+12% D-Wave+33%</text>
  <text x="175" y="108" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#EF4444">🔥</text>

  <!-- 4: 黄金 -->
  <rect x="8" y="120" width="175" height="24" rx="4" fill="#D4A017" opacity="0.08" filter="url(#drop-shadow)"/>
  <rect x="8" y="120" width="3" height="24" rx="2" fill="#D4A017" filter="url(#drop-shadow)"/>
  <text x="16" y="136" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#B8860B">黄金</text>
  <text x="52" y="136" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1E293B">$4,542/oz 高位震荡</text>
  <text x="175" y="136" text-anchor="end" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#B8860B">994.5元/克</text>

  <!-- 5: 伊朗局势 -->
  <rect x="8" y="148" width="175" height="24" rx="4" fill="#EF4444" opacity="0.06" filter="url(#drop-shadow)"/>
  <rect x="8" y="148" width="3" height="24" rx="2" fill="#EF4444" filter="url(#drop-shadow)"/>
  <text x="16" y="164" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#DC2626">伊朗局势</text>
  <text x="52" y="164" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1E293B">霍尔木兹海峡通行费争议</text>

  <!-- 6: 小米YU7 -->
  <rect x="8" y="176" width="175" height="24" rx="4" fill="#1A56DB" opacity="0.06" filter="url(#drop-shadow)"/>
  <rect x="8" y="176" width="3" height="24" rx="2" fill="#1A56DB" filter="url(#drop-shadow)"/>
  <text x="16" y="192" font-family="'Noto Sans SC',sans-serif" font-size="8" font-weight="bold" fill="#1A56DB">小米YU7</text>
  <text x="52" y="192" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#1E293B">标准版23.35万 YU7 GT 38.99万</text>

  <!-- 阿扬角色在右侧播报 -->
  <g transform="translate(245, 138)">
    <defs>
      <clipPath id="char-clip-245-138">
        <ellipse cx="0" cy="-4.55" rx="10.4" ry="14.3"/>
      </clipPath>
    </defs>
    <image href="data:image/jpeg;base64," x="-10.4" y="-19.5" width="20.8" height="31.200000000000003"
             preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip-245-138)"
             filter="url(#drop-shadow)"/>
    <rect x="-12.35" y="7.800000000000001" width="24.7" height="22.1" rx="7.15" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
    <polygon points="-4.55,7.800000000000001 0,-1.3 4.55,7.800000000000001" fill="#FFFFFF" opacity="0.9"/>
    <polygon points="-1.625,5.2 0,0.0 1.625,5.2" fill="#D4A017"/>
    <rect x="-1.3" y="5.8500000000000005" width="2.6" height="5.2" rx="0.65" fill="#D4A017"/>
  </g>

  <!-- 话筒 -->
  <g transform="translate(245, 116)">
    <rect x="-1.5" y="0" width="3" height="12" rx="1.5" fill="#64748B" filter="url(#drop-shadow)"/>
    <circle cx="0" cy="-2" r="5" fill="#64748B"/>
    <circle cx="0" cy="-2" r="3.5" fill="#94A3B8"/>
  </g>

  <text x="150" y="214" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#64748B">👇 我是阿扬，往下翻看深度解读 | 🎧 音频已就绪</text>
</svg>
