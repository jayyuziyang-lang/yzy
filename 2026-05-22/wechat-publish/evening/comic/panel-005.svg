<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Mountain/peak for 道指新高 -->
  <polyline points="20,190 80,150 120,165 160,60 200,90 240,70 280,110" fill="none" stroke="#1A56DB" stroke-width="2.5"/>
  <!-- Peak mark -->
  <circle cx="160" cy="60" r="4" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <text x="160" y="48" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#DC2626">新高</text>
  <text x="160" y="40" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="10" font-weight="800" fill="#1E293B">50,285</text>
  <!-- Quantum computing atom -->
  <circle cx="230" cy="140" r="18" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="230" cy="140" r="4" fill="#7C3AED" stroke="none"/>
  <ellipse cx="230" cy="140" rx="32" ry="8" fill="none" stroke="#1E293B" stroke-width="1" transform="rotate(-30,230,140)"/>
  <ellipse cx="230" cy="140" rx="32" ry="8" fill="none" stroke="#1E293B" stroke-width="1" transform="rotate(30,230,140)"/>
  <ellipse cx="230" cy="140" rx="32" ry="8" fill="none" stroke="#1E293B" stroke-width="1"/>
  <!-- Electrons -->
  <circle cx="202" cy="130" r="3" fill="none" stroke="#DC2626" stroke-width="1.2"/>
  <circle cx="256" cy="146" r="3" fill="none" stroke="#DC2626" stroke-width="1.2"/>
  <circle cx="218" cy="115" r="3" fill="none" stroke="#DC2626" stroke-width="1.2"/>
  <!-- Dollar signs -->
  <text x="230" y="165" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="14" font-weight="900" fill="#D4A017">$20亿</text>
  <!-- Labels -->
  <text x="80" y="175" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">IBM +12%</text>
  <text x="80" y="188" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">D-Wave +33%</text>
  <text x="230" y="182" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">白宫入股9家量子企业</text>
</svg>