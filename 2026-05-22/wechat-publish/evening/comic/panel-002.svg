<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Circuit board / PCB motif -->
  <line x1="60" y1="180" x2="60" y2="60" stroke="#1E293B" stroke-width="1.8"/>
  <line x1="60" y1="60" x2="200" y2="60" stroke="#1E293B" stroke-width="1.8"/>
  <line x1="200" y1="60" x2="200" y2="40" stroke="#DC2626" stroke-width="2.5"/>
  <line x1="200" y1="40" x2="240" y2="40" stroke="#DC2626" stroke-width="2.5"/>
  <!-- Arrow up -->
  <polygon points="235,32 245,40 235,48" fill="#DC2626" stroke="none"/>
  <!-- Branch traces -->
  <line x1="60" y1="100" x2="130" y2="100" stroke="#E2E8F0" stroke-width="1.2"/>
  <line x1="130" y1="100" x2="130" y2="75" stroke="#E2E8F0" stroke-width="1.2"/>
  <line x1="130" y1="75" x2="200" y2="75" stroke="#E2E8F0" stroke-width="1.2"/>
  <line x1="60" y1="140" x2="100" y2="140" stroke="#E2E8F0" stroke-width="1.2"/>
  <line x1="100" y1="140" x2="100" y2="85" stroke="#E2E8F0" stroke-width="1.2"/>
  <line x1="100" y1="85" x2="200" y2="85" stroke="#E2E8F0" stroke-width="1.2"/>
  <!-- Chip nodes -->
  <rect x="52" y="55" width="16" height="10" rx="2" fill="none" stroke="#D4A017" stroke-width="1.5"/>
  <rect x="192" y="55" width="16" height="10" rx="2" fill="none" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="60" y="200" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#DC2626">板块+7.85%</text>
  <text x="250" y="36" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#DC2626">VR200</text>
  <!-- Value increase -->
  <text x="250" y="52" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#64748B">$3.5万→$11.7万</text>
  <text x="250" y="64" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#DC2626">+233%</text>
  <!-- Detail -->
  <text x="150" y="216" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">英伟达VR200机架PCB价值量跃升 涨停潮</text>
  <!-- Small PCB dot pattern -->
  <circle cx="85" cy="100" r="2" fill="#1E293B"/>
  <circle cx="85" cy="112" r="2" fill="#1E293B"/>
  <circle cx="145" cy="100" r="2" fill="#1E293B"/>
  <circle cx="145" cy="112" r="2" fill="#1E293B"/>
  <circle cx="55" cy="120" r="2" fill="#1E293B"/>
</svg>