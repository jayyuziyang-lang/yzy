<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- K-line recovery bounce -->
  <!-- Falling then recovering line -->
  <polyline points="30,170 60,160 90,165 120,140 150,150 160,120 170,65 190,75 210,60 230,65 250,50 270,55" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <!-- Support/resistance lines -->
  <line x1="160" y1="120" x2="160" y2="62" stroke="#E2E8F0" stroke-width="0.8" stroke-dasharray="4,3"/>
  <polygon points="157,62 160,52 163,62" fill="#DC2626" stroke="none"/>
  <!-- Labels -->
  <text x="160" y="48" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#DC2626">反弹确认</text>
  <!-- Volume bars underneath -->
  <rect x="40" y="178" width="12" height="12" fill="#E2E8F0" stroke="none"/>
  <rect x="60" y="182" width="12" height="8" fill="#E2E8F0" stroke="none"/>
  <rect x="80" y="180" width="12" height="10" fill="#E2E8F0" stroke="none"/>
  <rect x="100" y="176" width="12" height="14" fill="#E2E8F0" stroke="none"/>
  <rect x="120" y="184" width="12" height="6" fill="#E2E8F0" stroke="none"/>
  <rect x="140" y="185" width="12" height="5" fill="#DC2626" stroke="none"/>
  <rect x="160" y="184" width="12" height="6" fill="#DC2626" stroke="none"/>
  <rect x="180" y="182" width="12" height="8" fill="#DC2626" stroke="none"/>
  <rect x="200" y="183" width="12" height="7" fill="#DC2626" stroke="none"/>
  <!-- Shrinking volume -->
  <text x="270" y="192" text-anchor="end" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#64748B">2.9万亿 缩量</text>
  <!-- Key price -->
  <text x="210" y="42" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="800" fill="#1E293B">4,112.90</text>
  <text x="210" y="56" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#DC2626">+0.87%</text>
  <!-- Annotation -->
  <text x="150" y="216" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">缩量反弹 追涨意愿不足 等待放量确认</text>
</svg>