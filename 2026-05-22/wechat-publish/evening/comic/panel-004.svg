<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Building/pillar representing legal framework -->
  <rect x="130" y="40" width="40" height="150" fill="none" stroke="#1E293B" stroke-width="2.5"/>
  <line x1="130" y1="60" x2="170" y2="60" stroke="#1E293B" stroke-width="1.5"/>
  <line x1="130" y1="80" x2="170" y2="80" stroke="#E2E8F0" stroke-width="0.8"/>
  <line x1="130" y1="100" x2="170" y2="100" stroke="#E2E8F0" stroke-width="0.8"/>
  <line x1="130" y1="120" x2="170" y2="120" stroke="#E2E8F0" stroke-width="0.8"/>
  <line x1="130" y1="140" x2="170" y2="140" stroke="#E2E8F0" stroke-width="0.8"/>
  <line x1="130" y1="160" x2="170" y2="160" stroke="#E2E8F0" stroke-width="0.8"/>
  <line x1="130" y1="180" x2="170" y2="180" stroke="#E2E8F0" stroke-width="0.8"/>
  <!-- Base -->
  <rect x="115" y="185" width="70" height="8" rx="2" fill="none" stroke="#1E293B" stroke-width="2"/>
  <!-- Cap -->
  <rect x="120" y="35" width="60" height="8" rx="2" fill="none" stroke="#1E293B" stroke-width="2"/>
  <!-- Star on top -->
  <polygon points="150,18 153,26 162,26 155,31 158,40 150,35 142,40 145,31 138,26 147,26" fill="none" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Label -->
  <text x="150" y="212" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="10" font-weight="700" fill="#1A56DB">央行法修订草案通过</text>
  <!-- Side notes -->
  <text x="60" y="80" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">LPR不变</text>
  <text x="60" y="93" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#64748B">1年期3.00%</text>
  <text x="60" y="106" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#64748B">5年期3.50%</text>

  <text x="240" y="80" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">逆回购</text>
  <text x="240" y="93" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#64748B">1530亿</text>
  <text x="240" y="106" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#64748B">净投放1525亿</text>
  <!-- Connecting lines -->
  <line x1="95" y1="70" x2="130" y2="70" stroke="#E2E8F0" stroke-width="0.8"/>
  <line x1="170" y1="70" x2="205" y2="70" stroke="#E2E8F0" stroke-width="0.8"/>
</svg>