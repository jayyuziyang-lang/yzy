<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Funnel/concentrating to one point -->
  <!-- Funnel outline -->
  <polygon points="30,30 270,30 180,110 120,110" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>
  <polygon points="120,110 180,110 155,160 145,160" fill="none" stroke="#1E293B" stroke-width="2"/>
  <!-- Concentrated area at bottom -->
  <circle cx="150" cy="175" r="20" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <circle cx="150" cy="175" r="8" fill="#DC2626" stroke="none"/>
  <!-- Falling elements outside -->
  <line x1="50" y1="120" x2="50" y2="140" stroke="#16A34A" stroke-width="1.5"/>
  <polygon points="47,140 50,148 53,140" fill="#16A34A"/>
  <line x1="250" y1="120" x2="250" y2="140" stroke="#16A34A" stroke-width="1.5"/>
  <polygon points="247,140 250,148 253,140" fill="#16A34A"/>
  <line x1="80" y1="90" x2="80" y2="110" stroke="#16A34A" stroke-width="1.5"/>
  <polygon points="77,110 80,118 83,110" fill="#16A34A"/>
  <line x1="220" y1="90" x2="220" y2="110" stroke="#16A34A" stroke-width="1.5"/>
  <polygon points="217,110 220,118 223,110" fill="#16A34A"/>
  <!-- Labels -->
  <text x="50" y="158" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#16A34A">白酒-9%</text>
  <text x="250" y="158" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#16A34A">券商-2%</text>
  <text x="150" y="204" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="10" font-weight="800" fill="#DC2626">科技 143亿净流入</text>
  <text x="150" y="216" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">缩量环境下的极致抱团</text>
  <!-- Annotation -->
  <text x="150" y="18" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" fill="#64748B">资金从各处向科技集中</text>
</svg>