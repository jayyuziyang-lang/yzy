<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#faf8f5"/>
  <style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif;}</style>

  <!-- Title -->
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="900" fill="#1a1a1a">沃什缩表路线图</text>
  <line x1="40" y1="28" x2="260" y2="28" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- 天平 -->
  <line x1="150" y1="45" x2="150" y2="160" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="150" cy="45" r="5" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="150" cy="45" r="1.5" fill="#1a1a1a"/>

  <!-- 倾斜横梁 -->
  <line x1="60" y1="110" x2="240" y2="55" stroke="#1a1a1a" stroke-width="3"/>

  <!-- 左侧（重）：6.8万亿 -->
  <g transform="translate(30, 105)">
    <line x1="30" y1="0" x2="30" y2="15" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="25" y1="15" x2="35" y2="15" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M5,15 Q30,40 55,15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <!-- 重物 -->
    <rect x="12" y="12" width="36" height="15" rx="2" fill="none" stroke="#c62828" stroke-width="2.5"/>
    <text x="30" y="23" text-anchor="middle" font-size="8" font-weight="700" fill="#c62828">6.8万亿</text>
    <text x="30" y="38" text-anchor="middle" font-size="7" fill="#555">当前规模</text>
  </g>

  <!-- 右侧（轻）：8000亿 -->
  <g transform="translate(240, 50)">
    <line x1="-30" y1="0" x2="-30" y2="15" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="-35" y1="15" x2="-25" y2="15" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M-55,15 Q-30,40 -5,15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <!-- 轻物 -->
    <rect x="-48" y="12" width="36" height="15" rx="2" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
    <text x="-30" y="23" text-anchor="middle" font-size="8" font-weight="700" fill="#2e7d32">8,000亿</text>
    <text x="-30" y="38" text-anchor="middle" font-size="7" fill="#555">缩表目标</text>
  </g>

  <!-- 剪刀靠近 -->
  <g transform="translate(60, 68)">
    <path d="M0,0 L15,18" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M-3,3 L15,18" stroke="#1a1a1a" stroke-width="2.5"/>
    <circle cx="15" cy="18" r="3" fill="#faf8f5" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- 影响 -->
  <g transform="translate(30, 172)">
    <text x="0" y="0" font-size="8" fill="#c9a96e">▼ 流动性回收</text>
    <text x="100" y="0" font-size="8" fill="#c9a96e">▼ 30年美债5.064%</text>
    <text x="0" y="18" font-size="8" fill="#c9a96e">▼ 加息概率58~60%</text>
    <text x="100" y="18" font-size="8" fill="#c9a96e">▼ 08年来最大规模</text>
  </g>
</svg>
