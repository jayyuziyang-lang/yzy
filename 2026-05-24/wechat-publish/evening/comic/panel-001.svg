<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#faf8f5"/>
  <style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif;}</style>

  <!-- 标题 -->
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="900" fill="#1a1a1a">K型分化</text>
  <line x1="40" y1="28" x2="260" y2="28" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- K中央 -->
  <line x1="150" y1="32" x2="150" y2="180" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- 上分支 -->
  <line x1="150" y1="32" x2="280" y2="65" stroke="#2e7d32" stroke-width="3.5"/>
  <polygon points="280,65 272,72 288,72" fill="#2e7d32"/>

  <!-- 下分支 -->
  <line x1="150" y1="35" x2="30" y2="170" stroke="#c62828" stroke-width="3.5"/>

  <!-- 左上：AI富豪 -->
  <g transform="translate(210, 38)">
    <text x="0" y="0" font-size="10" font-weight="700" fill="#2e7d32">AI富豪</text>
    <text x="0" y="16" font-size="8" fill="#555">持有股票/房产</text>
    <text x="0" y="28" font-size="8" fill="#555">受益AI叙事</text>
    <text x="0" y="44" font-size="10" font-weight="700" fill="#2e7d32">道指 50,830</text>
    <text x="0" y="56" font-size="8" fill="#555">+0.86% 新高</text>
  </g>

  <!-- 右下：油价难民 -->
  <g transform="translate(40, 132)">
    <text x="0" y="0" font-size="10" font-weight="700" fill="#c62828">油价难民</text>
    <text x="0" y="16" font-size="8" fill="#555">工资通勤族</text>
    <text x="0" y="28" font-size="8" fill="#555">汽油$4.5+/加仑</text>
  </g>

  <!-- 底部传导 -->
  <g transform="translate(30, 188)">
    <text x="0" y="0" font-size="7" fill="#c62828">高油价</text>
    <line x1="35" y1="-2" x2="55" y2="-2" stroke="#c9a96e" stroke-width="1"/>
    <polygon points="55,-2 52,-4 52,0" fill="#c9a96e"/>
    <text x="58" y="0" font-size="7" fill="#c62828">通胀4.8%</text>
    <line x1="95" y1="-2" x2="115" y2="-2" stroke="#c9a96e" stroke-width="1"/>
    <polygon points="115,-2 112,-4 112,0" fill="#c9a96e"/>
    <text x="118" y="0" font-size="7" fill="#c62828">购买力萎缩</text>
  </g>
</svg>
