<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#faf8f5"/>
  <style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif;}</style>

  <!-- $3万亿标题 -->
  <text x="150" y="28" text-anchor="middle" font-size="18" font-weight="900" fill="#1a1a1a">$3万亿+</text>
  <text x="150" y="42" text-anchor="middle" font-size="8" fill="#555">人类史上最大IPO浪潮</text>
  <line x1="60" y1="50" x2="240" y2="50" stroke="#1a1a1a" stroke-width="1"/>

  <!-- 三列 -->
  <!-- SpaceX -->
  <g transform="translate(15, 60)">
    <rect x="0" y="0" width="82" height="110" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <!-- 火箭 -->
    <path d="M41,10 L35,30 L41,18 L47,30Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="41" y1="10" x2="41" y2="2" stroke="#1a1a1a" stroke-width="2"/>
    <text x="41" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#1a1a1a">SpaceX</text>
    <text x="41" y="60" text-anchor="middle" font-size="7" fill="#c62828">SPCX</text>
    <text x="41" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#c9a96e">$1.25T</text>
    <text x="41" y="92" text-anchor="middle" font-size="7" fill="#555">6/12 IPO</text>
  </g>

  <!-- OpenAI -->
  <g transform="translate(109, 60)">
    <rect x="0" y="0" width="82" height="110" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="0" y="0" width="82" height="5" fill="#1a1a1a"/>
    <path d="M41,10 L35,32 L41,16 L47,32Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="41" y1="10" x2="41" y2="2" stroke="#1a1a1a" stroke-width="2"/>
    <text x="41" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#1a1a1a">OpenAI</text>
    <text x="41" y="60" text-anchor="middle" font-size="7" fill="#c62828">IPO</text>
    <text x="41" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#c9a96e">$8,520亿</text>
    <text x="41" y="92" text-anchor="middle" font-size="7" fill="#555">秘密提交</text>
  </g>

  <!-- Anthropic -->
  <g transform="translate(203, 60)">
    <rect x="0" y="0" width="82" height="110" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M41,10 L35,30 L41,18 L47,30Z" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="41" y1="10" x2="41" y2="2" stroke="#1a1a1a" stroke-width="2"/>
    <text x="41" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#1a1a1a">Anthropic</text>
    <text x="41" y="60" text-anchor="middle" font-size="7" fill="#c62828">融资</text>
    <text x="41" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#c9a96e">$9,000亿</text>
    <text x="41" y="92" text-anchor="middle" font-size="7" fill="#555">新一轮</text>
  </g>

  <!-- 底部 -->
  <text x="150" y="200" text-anchor="middle" font-size="8" fill="#555">三座万亿级AI巨舰即将驶入公开市场</text>
</svg>
