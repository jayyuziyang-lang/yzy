<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#faf8f5"/>
  <style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif;}</style>

  <!-- Title -->
  <text x="150" y="22" text-anchor="middle" font-size="13" font-weight="900" fill="#1a1a1a">本周全景</text>
  <line x1="40" y1="30" x2="260" y2="30" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- K-shape central -->
  <line x1="150" y1="38" x2="150" y2="160" stroke="#1a1a1a" stroke-width="2"/>
  <text x="150" y="180" text-anchor="middle" font-size="22" font-weight="900" fill="#c9a96e" opacity="0.5">K</text>

  <!-- Up branch -->
  <line x1="150" y1="38" x2="270" y2="70" stroke="#c9a96e" stroke-width="2.5"/>
  <!-- Down branch -->
  <line x1="150" y1="38" x2="40" y2="150" stroke="#c62828" stroke-width="2.5"/>

  <!-- 左侧：涨 -->
  <text x="240" y="62" text-anchor="end" font-size="10" font-weight="700" fill="#2e7d32">道指 50,714</text>
  <text x="240" y="76" text-anchor="end" font-size="8" fill="#555">8连涨 · +2.3%</text>

  <!-- 右侧：跌 -->
  <text x="70" y="142" text-anchor="start" font-size="10" font-weight="700" fill="#c62828">消费信心44.8</text>
  <text x="70" y="156" text-anchor="start" font-size="8" fill="#555">74年冰点</text>

  <!-- 中间列表 -->
  <g transform="translate(20, 188)">
    <circle cx="4" cy="-2" r="2.5" fill="#c9a96e"/>
    <text x="14" y="3" font-size="8" fill="#555">AI三巨头IPO $3万亿+</text>
    <circle cx="4" cy="16" r="2.5" fill="#c9a96e"/>
    <text x="14" y="21" font-size="8" fill="#555">Warsh就任 · 6.8万亿缩表</text>
    <circle cx="4" cy="34" r="2.5" fill="#c9a96e"/>
    <text x="14" y="39" font-size="8" fill="#555">布油$102 · 美伊谈判中</text>
  </g>
</svg>
