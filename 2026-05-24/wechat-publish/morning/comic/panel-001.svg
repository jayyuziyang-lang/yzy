<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#faf8f5"/>
  <style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif;}</style>

  <!-- K-line climbing then cliff drop -->
  <polyline points="20,170 50,155 70,160 90,130 105,135 120,110 135,115 150,85 165,92 180,65" fill="none" stroke="#1a1a1a" stroke-width="2.8"/>
  <!-- Cliff drop -->
  <line x1="180" y1="65" x2="230" y2="170" stroke="#c62828" stroke-width="4"/>
  <polygon points="230,170 222,158 238,158" fill="#c62828"/>
  <polygon points="233,165 222,174 240,176" fill="#c62828"/>
  <!-- Speed lines for drop -->
  <line x1="190" y1="85" x2="195" y2="76" stroke="#888" stroke-width="0.7"/>
  <line x1="198" y1="105" x2="204" y2="98" stroke="#888" stroke-width="0.7"/>
  <line x1="208" y1="130" x2="215" y2="126" stroke="#888" stroke-width="0.7"/>
  <line x1="218" y1="150" x2="225" y2="148" stroke="#888" stroke-width="0.7"/>

  <!-- Peak annotation -->
  <text x="170" y="42" text-anchor="middle" font-size="9" fill="#1a1a1a" font-weight="700">4199</text>
  <line x1="155" y1="55" x2="155" y2="72" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- Bottom annotation -->
  <text x="240" y="172" text-anchor="middle" font-size="11" font-weight="900" fill="#c62828">-2.04%</text>
  <text x="240" y="186" text-anchor="middle" font-size="8" fill="#555">4077.28</text>

  <!-- Bank building rising -->
  <g transform="translate(20, 108)">
    <rect x="0" y="30" width="28" height="50" fill="none" stroke="#1a1a1a" stroke-width="2.2"/>
    <rect x="5" y="35" width="6" height="8" fill="none" stroke="#555" stroke-width="1"/>
    <rect x="14" y="35" width="6" height="8" fill="none" stroke="#555" stroke-width="1"/>
    <rect x="5" y="46" width="6" height="8" fill="none" stroke="#555" stroke-width="1"/>
    <rect x="14" y="46" width="6" height="8" fill="none" stroke="#555" stroke-width="1"/>
    <rect x="5" y="57" width="16" height="6" fill="none" stroke="#555" stroke-width="1"/>
    <!-- Rising arrow -->
    <line x1="14" y1="18" x2="14" y2="30" stroke="#c9a96e" stroke-width="1.5" stroke-dasharray="2,1"/>
    <polygon points="10,22 14,14 18,22" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
    <text x="14" y="12" text-anchor="middle" font-size="7" fill="#c9a96e">新高</text>
  </g>

  <!-- Volume -->
  <rect x="260" y="145" width="20" height="45" fill="none" stroke="#c62828" stroke-width="1.5"/>
  <text x="270" y="200" text-anchor="middle" font-size="7" fill="#888">3.5万亿</text>
</svg>
