<svg class="ys-artword-svg" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ysTitle ysDesc">
  <title id="ysTitle">扬说·财经</title>
  <desc id="ysDesc">扬说·财经艺术字标，突出上扬流线、金色行情点和财经模块字形。</desc>

  <defs>
    <linearGradient id="yangFill" x1="40" y1="20" x2="190" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#EAF8FF"/>
      <stop offset="56%" stop-color="#98D8FF"/>
      <stop offset="84%" stop-color="#2F7DFF"/>
      <stop offset="115%" stop-color="#34D5D8"/>
    </linearGradient>

    <linearGradient id="blueFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58B9FF"/>
      <stop offset="52%" stop-color="#2F7DFF"/>
      <stop offset="108%" stop-color="#35D2D6"/>
    </linearGradient>

    <radialGradient id="goldPoint" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="26%" stop-color="#FFF1B8"/>
      <stop offset="62%" stop-color="#D9B15F"/>
      <stop offset="100%" stop-color="#B98B38"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2F7DFF" flood-opacity=".18"/>
    </filter>
  </defs>

  <!-- 轻线框背景 -->
  <path d="M42 38 C74 12 140 16 166 56 C190 92 162 150 102 150 C48 150 18 114 28 76 C31 62 36 48 42 38Z"
        fill="none" stroke="#2F7DFF" stroke-opacity=".18" stroke-width="2"/>
  <path d="M58 46 C84 26 132 30 150 60 C168 90 148 132 104 134 C66 136 44 112 50 80 C52 66 54 56 58 46Z"
        fill="none" stroke="#34D5D8" stroke-opacity=".18" stroke-width="1.4"/>

  <!-- 扬 -->
  <text x="28" y="126"
        font-family="'Noto Serif SC','Source Han Serif SC','Songti SC',serif"
        font-size="118"
        font-weight="900"
        fill="url(#yangFill)"
        stroke="rgba(35,98,180,.36)"
        stroke-width="1.5"
        filter="url(#softShadow)">扬</text>

  <!-- 上扬流线 -->
  <path d="M122 56 C162 34 204 28 250 34 C226 42 198 60 176 78 C158 92 140 96 116 94 C132 82 144 68 122 56Z"
        fill="url(#blueFill)" opacity=".94"/>
  <circle cx="252" cy="34" r="8" fill="url(#goldPoint)"/>

  <!-- 说 -->
  <text x="238" y="117"
        font-family="'Noto Serif SC','Source Han Serif SC','Songti SC',serif"
        font-size="82"
        font-weight="900"
        fill="url(#blueFill)"
        stroke="rgba(46,110,190,.22)"
        stroke-width="1">说</text>

  <!-- 说的开放对话框 -->
  <path d="M252 70 H282 V100 H254"
        fill="none"
        stroke="#34D5D8"
        stroke-opacity=".45"
        stroke-width="2.4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- 中间点 -->
  <circle cx="368" cy="82" r="8.2" fill="url(#goldPoint)"/>
  <circle cx="368" cy="82" r="15" fill="none" stroke="#D9B15F" stroke-opacity=".2" stroke-width="2"/>

  <!-- 财经 -->
  <text x="405" y="116"
        font-family="'Noto Serif SC','Source Han Serif SC','Songti SC',serif"
        font-size="78"
        font-weight="900"
        letter-spacing="4"
        fill="url(#blueFill)"
        stroke="rgba(35,98,180,.22)"
        stroke-width=".8">财经</text>

  <!-- 财经底部秩序线 -->
  <path d="M412 134 C468 128 550 128 620 134"
        fill="none"
        stroke="#34D5D8"
        stroke-opacity=".26"
        stroke-width="2"
        stroke-linecap="round"/>
</svg>
