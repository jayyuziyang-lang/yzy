  <text x="166" y="153" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">是所有人都在被迫卖</text>

  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 流动性挤兑和趋势有本质区别——挤兑时不要割肉，等流动性回来再说。关键看</text>
  <text x="20" y="206" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   未来2-3天：若金价快速反弹到4200以上说明是挤兑；若继续阴跌说明趋势未结束。</text>
