<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <rect x="0" y="0" width="300" height="30" fill="#EA580C"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">🥇 黄金闪崩至4070 · 流动性挤兑</text>

  <text x="12" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">黄金暴跌路径</text>

  <rect x="12" y="58" width="136" height="14" rx="3" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="18" y="69" font-size="6" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">2月高点 5,477</text>

  <rect x="12" y="76" width="136" height="6" rx="3" fill="#FEF2F2"/>
  <text x="60" y="84" font-size="6" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">▼ -25.7% 熊市</text>

  <rect x="12" y="90" width="136" height="14" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="101" font-size="6" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">周二收盘 4,182</text>

  <rect x="12" y="108" width="136" height="14" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="119" font-size="6" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">周三闪崩 4,070（-4.4%）</text>

  <rect x="12" y="126" width="136" height="14" rx="3" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="18" y="137" font-size="6" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif">单日暴跌近200美元</text>

  <line x1="153" y1="38" x2="153" y2="172" stroke="#E2E8F0" stroke-width="1"/>

  <text x="160" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">流动性挤兑三大信号</text>

