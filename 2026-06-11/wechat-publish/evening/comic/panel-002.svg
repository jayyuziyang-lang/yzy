<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <rect x="0" y="0" width="300" height="30" fill="#DC2626"/>
  <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="PingFang SC, Microsoft YaHei, sans-serif">📉 A股缩量微跌 · 科创50逆势涨1%</text>

  <text x="12" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">今日A股收盘</text>

  <rect x="12" y="58" width="136" height="18" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="71" font-size="7" font-weight="700" fill="#DC2626" font-family="PingFang SC, Microsoft YaHei, sans-serif">上证 3,987.01（-0.16%）</text>

  <rect x="12" y="80" width="136" height="18" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="93" font-size="7" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">深证 14,851.98（-0.68%）</text>

  <rect x="12" y="102" width="136" height="18" rx="3" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="18" y="115" font-size="7" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif">创业板 3,811.25（-1.13%）</text>

  <rect x="12" y="124" width="136" height="18" rx="3" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="18" y="137" font-size="7" font-weight="700" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif">科创综指 2,034（+1.00%）</text>

  <rect x="12" y="146" width="136" height="18" rx="3" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.5"/>
  <text x="18" y="159" font-size="7" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">成交2.58万亿（缩量692亿）</text>

  <line x1="153" y1="38" x2="153" y2="172" stroke="#E2E8F0" stroke-width="1"/>

  <text x="160" y="52" font-size="8" fill="#64748B" font-family="PingFang SC, Microsoft YaHei, sans-serif">美股暴跌vs A股仅微跌</text>

  <rect x="160" y="58" width="133" height="50" rx="4" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="166" y="73" font-size="7" font-weight="700" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">困惑</text>
  <text x="166" y="88" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">道指-1.87% → 沪指-0.16%</text>
  <text x="166" y="100" font-size="6" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif">SOX-3.57% → 科创50+1.00%</text>

  <rect x="160" y="114" width="133" height="34" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="166" y="129" font-size="7" font-weight="700" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">Why?</text>
  <text x="166" y="143" font-size="6" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">不是A股强，是A股本来就没涨</text>
  <text x="166" y="152" font-size="6" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">定价逻辑已脱钩</text>

  <rect x="10" y="178" width="280" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="20" y="194" font-size="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 A股在美股暴跌-1.87%时仅跌-0.16%，不是因为A股有多强，而是A股和美股处于</text>
  <text x="20" y="206" fontSize="7" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">   不同周期。4000以下按兵不动，等美股情绪稳定再判断方向。</text>
