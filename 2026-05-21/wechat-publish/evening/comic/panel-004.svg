<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <!-- 主投影滤镜 -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <!-- 柔和投影 -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <!-- 品牌蓝色渐变 -->
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <!-- 品牌金色渐变 -->
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- 对话框渐变 -->
    <linearGradient id="bubble-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(26,86,219,0.15)"/>
      <stop offset="100%" stop-color="rgba(26,86,219,0.02)"/>
    </linearGradient>
    <!-- 背景网格图案 -->
    <pattern id="dot-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#E2E8F0" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>
  <text x="150" y="20" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="11" font-weight="bold" fill="#1E293B">📰 去美元化运动</text>
  <line x1="15" y1="26" x2="285" y2="26" stroke="#E2E8F0" stroke-width="1"/>
  <!-- 新闻剪报 -->
  <rect x="20" y="35" width="260" height="95" rx="4" fill="#F8F9FA" stroke="#E2E8F0" stroke-width="1" filter="url(#drop-shadow)"/>
  <text x="30" y="52" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="bold" fill="#1E293B">2022年 俄乌冲突爆发</text>
  <text x="30" y="68" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#64748B">美国冻结俄罗斯外汇储备 — $3,000亿</text>
  <text x="30" y="88" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="bold" fill="#EF4444">→ 全球央行集体惊醒：</text>
  <text x="30" y="108" font-family="'Noto Sans SC',sans-serif" font-size="9" font-weight="bold" fill="#EF4444">"美元资产真的安全吗？"</text>
  <!-- 阿扬 -->
<g transform="translate(55, 190)">
  <!-- ===== 真实人物肖像 ===== -->
  <defs>
    <clipPath id="char-clip-55-190">
      <ellipse cx="0" cy="-6.3" rx="14.4" ry="19.8"/>
    </clipPath>
  </defs>
  <image href="data:image/jpeg;base64," x="-14.4" y="-27.0" width="28.8" height="43.2"
         preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip-55-190)"
         filter="url(#drop-shadow)"/>
  <!-- ===== 下半身简约处理 ===== -->
  <rect x="-17.1" y="10.8" width="34.2" height="30.6" rx="9.9" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
  <polygon points="-6.3,10.8 0,-1.8 6.3,10.8" fill="#FFFFFF" opacity="0.9"/>
  <polygon points="-2.25,7.2 0,0.0 2.25,7.2" fill="#D4A017"/>
  <rect x="-1.8" y="8.1" width="3.6" height="7.2" rx="0.9" fill="#D4A017"/>
</g>
  <!-- 气泡 -->
  <g transform="translate(120, 132)">
    <path d="M0,0 Q-8,-10 8,-10 L60,-10 Q72,-10 72,0 L72,18 Q72,28 62,28 L22,28 L15,36 L16,28 L8,28 Q0,28 0,18 Z" fill="white" stroke="#1A56DB" stroke-width="1"/>
    <text x="36" y="7" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="6.5" fill="#1E293B">黄金→唯一的答案</text>
    <text x="36" y="18" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="6.5" fill="#64748B">系统性资产重配</text>
  </g>
</svg>
