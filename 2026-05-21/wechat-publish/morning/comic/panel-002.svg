<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<defs>
    <!-- 主投影滤镜 -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <!-- 柔和投影 -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <!-- 品牌蓝色渐变 -->
    <linearGradient id="brand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <!-- 品牌金色渐变 -->
    <linearGradient id="brand-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- 对话框渐变 -->
    <linearGradient id="bubble-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(26,86,219,0.15)"/>
      <stop offset="100%" stop-color="rgba(26,86,219,0.02)"/>
    </linearGradient>
    <!-- 背景网格图案 -->
    <pattern id="dot-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#E2E8F0" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="300" height="220" fill="#F5F7FA" rx="8"/>
  <text x="150" y="20" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="11" font-weight="bold" fill="#1A56DB">📊 Q1 财报核心数据</text>
  <line x1="15" y1="26" x2="285" y2="26" stroke="#E2E8F0" stroke-width="1"/>
  <!-- 柱状图 -->
  <rect x="45" y="95" width="28" height="55" fill="#1A56DB" opacity="0.3" rx="3"/>
  <rect x="90" y="75" width="28" height="75" fill="#1A56DB" opacity="0.5" rx="3"/>
  <rect x="135" y="55" width="28" height="95" fill="#1A56DB" opacity="0.7" rx="3"/>
  <rect x="180" y="35" width="28" height="115" fill="#D4A017" rx="3"/>
  <text x="194" y="30" font-family="'Noto Sans SC',sans-serif" font-size="7" fill="#EF4444">+85%</text>
  <text x="150" y="190" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" font-weight="bold" fill="#1A56DB">$816亿</text>
  <!-- 阿扬在左侧讲解 -->
<g transform="translate(255, 185)">
  <!-- ===== 真实人物肖像 ===== -->
  <defs>
    <clipPath id="char-clip-255-185">
      <ellipse cx="0" cy="-4.55" rx="10.4" ry="14.3"/>
    </clipPath>
  </defs>
  <image href="data:image/jpeg;base64," x="-10.4" y="-19.5" width="20.8" height="31.200000000000003"
         preserveAspectRatio="xMidYMin slice" clip-path="url(#char-clip-255-185)"
         filter="url(#drop-shadow)"/>
  <!-- ===== 下半身简约处理 ===== -->
  <rect x="-12.35" y="7.800000000000001" width="24.7" height="22.1" rx="7.15" fill="#1A56DB" opacity="0.85" filter="url(#drop-shadow)"/>
  <polygon points="-4.55,7.800000000000001 0,-1.3 4.55,7.800000000000001" fill="#FFFFFF" opacity="0.9"/>
  <polygon points="-1.625,5.2 0,0.0 1.625,5.2" fill="#D4A017"/>
  <rect x="-1.3" y="5.8500000000000005" width="2.6" height="5.2" rx="0.65" fill="#D4A017"/>
</g>
  <!-- 气泡 -->
  <g transform="translate(160, 130)">
    <path d="M0,0 Q-8,-12 8,-12 L55,-12 Q68,-12 68,0 L68,18 Q68,28 58,28 L20,28 L12,36 L14,28 L8,28 Q0,28 0,18 Z" fill="white" stroke="#D4A017" stroke-width="1"/>
    <text x="34" y="7" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="6.5" fill="#1E293B">连续8季度</text>
    <text x="34" y="17" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="6.5" fill="#1E293B">增速超60%!</text>
  </g>
</svg>
