<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#EBF2FA"/>
    </linearGradient>
    <linearGradient id="timeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="4" fill="#3B82F6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1E3A5F" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A5F">⏰ 接下来：三个时间节点的推演</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">虹吸效应不是一次性事件——它的真正影响将在未来12-18个月展开</text>

  <!-- Timeline -->
  <rect x="40" y="80" width="720" height="4" rx="2" fill="url(#timeline)"/>

  <!-- Node 1: Jun 2026 -->
  <circle cx="130" cy="82" r="12" fill="#1E3A5F" filter="url(#shadow)"/>
  <text x="130" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="130" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A5F">6月12日</text>
  <text x="130" y="114" text-anchor="middle" font-size="11" fill="#64748B">SpaceX上市</text>

  <rect x="24" y="128" width="212" height="140" rx="8" fill="#fff" stroke="#DBEAFE" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A5F">✅ 已完成</text>
  <text x="36" y="174" font-size="11" fill="#475569">• 首日+19%，市值$2.1T</text>
  <text x="36" y="192" font-size="11" fill="#475569">• 虹吸正式开始</text>
  <text x="36" y="210" font-size="11" fill="#475569">• 空间概念股暴跌</text>
  <text x="36" y="228" font-size="11" fill="#475569">• MSCI T+1纳入</text>
  <text x="36" y="248" font-size="11" fill="#64748B">影响: 已确认</text>

  <!-- Arrow -->
  <line x1="236" y1="82" x2="310" y2="82" stroke="#3B82F6" stroke-width="2" marker-end="url(#dot)"/>

  <!-- Node 2: Sep 2026 -->
  <circle cx="360" cy="82" r="12" fill="#D97706" filter="url(#shadow)"/>
  <text x="360" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="360" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#D97706">9月</text>
  <text x="360" y="114" text-anchor="middle" font-size="11" fill="#64748B">纳斯达克100纳入</text>

  <rect x="254" y="128" width="212" height="200" rx="8" fill="#fff" stroke="#FDE68A" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309">🟡 即将发生</text>
  <text x="266" y="174" font-size="11" fill="#475569">• 另一波被动买入潮</text>
  <text x="266" y="192" font-size="11" fill="#475569">• 基金卖出现有成分股</text>
  <text x="266" y="210" font-size="11" fill="#475569">• 高估值科技承压加大</text>
  <text x="266" y="228" font-size="11" fill="#475569">• 成长→价值轮动加速</text>
  <text x="266" y="248" font-size="11" fill="#64748B">影响: 加剧虹吸</text>

  <!-- Arrow -->
  <line x1="466" y1="82" x2="540" y2="82" stroke="#3B82F6" stroke-width="2" marker-end="url(#dot)"/>

  <!-- Node 3: Late 2026 -->
  <circle cx="590" cy="82" r="12" fill="#DC2626" filter="url(#shadow)"/>
  <text x="590" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="590" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">2026下半年</text>
  <text x="590" y="114" text-anchor="middle" font-size="11" fill="#64748B">OpenAI + Anthropic IPO</text>

  <rect x="484" y="128" width="212" height="200" rx="8" fill="#fff" stroke="#FECACA" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">🔴 最大冲击</text>
  <text x="496" y="174" font-size="11" fill="#475569">• 合计融资$2000-3000亿</text>
  <text x="496" y="192" font-size="11" fill="#475569">• $3.6万亿新增市值</text>
  <text x="496" y="210" font-size="11" fill="#475569">• 新兴市场资金外流</text>
  <text x="496" y="228" font-size="11" fill="#475569">• 中小盘科技承压</text>
  <text x="496" y="248" font-size="11" fill="#475569">• 比特币等流动性敏感资产</text>
  <text x="496" y="268" font-size="11" fill="#64748B">影响: 系统性</text>

  <!-- Node 4: Dec 2026 -->
  <circle cx="720" cy="82" r="12" fill="#991B1B" filter="url(#shadow)"/>
  <text x="720" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <text x="720" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">12月</text>
  <text x="720" y="114" text-anchor="middle" font-size="11" fill="#64748B">锁定期到期</text>

  <rect x="714" y="128" width="62" height="30" rx="6" fill="#FEF2F2"/>
  <text x="745" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">见下方</text>

  <!-- Bottom section: Lockup detail -->
  <rect x="24" y="345" width="752" height="108" rx="10" fill="#fff" stroke="#FECACA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">⚠️ 关键是：2026年12月——内部人锁定期（180天）到期</text>
  <text x="400" y="394" text-anchor="middle" font-size="12" fill="#475569">目前90%+的股份由内部人持有 → 即使10%套现 = <tspan font-weight="700" fill="#DC2626">$2000亿+的潜在卖压</tspan></text>
  <text x="400" y="414" text-anchor="middle" font-size="12" fill="#475569">在一个只有4.2%流通量的市场里，任何一笔大额卖出都能造成剧震</text>
  <text x="400" y="438" text-anchor="middle" font-size="12" font-weight="600" fill="#1E3A5F">📌 投资视角：锁定期到期前，SpaceX股价可能持续受"卖压预期"的压制</text>

  <!-- Source -->
  <text x="24" y="480" font-size="10" fill="#94A3B8">来源: Bloomberg / Nasdaq / SEC Filing / Benzinga — 2026年6月</text>
</svg>