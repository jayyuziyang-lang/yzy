<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#EBF2FA"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1E3A5F" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A5F">📊 三个层面的市场结构之变</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">不是"一家公司上市了"——而是市场规则被改写了</text>

  <!-- Change 1: Free float scarcity -->
  <rect x="24" y="72" width="752" height="110" rx="10" fill="#fff" stroke="#FECACA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="72" width="10" height="110" rx="5" fill="#DC2626"/>
  <text x="48" y="98" font-size="15" font-weight="700" fill="#DC2626">问题一 · 自由流通量的"稀缺悖论"</text>
  <text x="48" y="122" font-size="12" fill="#475569">• SpaceX仅4.2%的股份可供交易，但MSCI在第一天就纳入指数</text>
  <text x="48" y="142" font-size="12" fill="#475569">• 指数基金被迫买入的份额远超市场上可交易的股份</text>
  <text x="48" y="162" font-size="12" fill="#475569">• 纳斯达克被迫修改规则：用3倍权重（$2250亿）计算指数占比</text>

  <!-- Morningstar valuation gap -->
  <rect x="580" y="82" width="182" height="88" rx="8" fill="#FFF5F5"/>
  <text x="671" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">估值差距</text>
  <text x="671" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">$2.1T vs $0.78T</text>
  <text x="671" y="144" text-anchor="middle" font-size="10" fill="#64748B">市场价 vs Morningstar DCF</text>
  <text x="671" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">差$1.3万亿</text>

  <!-- Change 2: Lockup risk -->
  <rect x="24" y="196" width="752" height="110" rx="10" fill="#fff" stroke="#FDE68A" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="196" width="10" height="110" rx="5" fill="#D97706"/>
  <text x="48" y="222" font-size="15" font-weight="700" fill="#B45309">问题二 · 锁定期到期的"定时炸弹"</text>
  <text x="48" y="246" font-size="12" fill="#475569">• 马斯克和早期投资者：366天锁定期（~2027年6月）</text>
  <text x="48" y="266" font-size="12" fill="#475569">• 其他内部人：180天锁定期（~2026年12月到期）</text>
  <text x="48" y="286" font-size="12" fill="#475569">• 超过90%的股份由内部人持有——即使10%套现 = $2000亿+卖压</text>

  <rect x="580" y="206" width="182" height="88" rx="8" fill="#FFFBEB"/>
  <text x="671" y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">潜在卖压</text>
  <text x="671" y="252" text-anchor="middle" font-size="16" font-weight="700" fill="#D97706">$2000亿+</text>
  <text x="671" y="272" text-anchor="middle" font-size="10" fill="#64748B">2026年12月起</text>

  <!-- Change 3: Bubble or revolution -->
  <rect x="24" y="320" width="752" height="128" rx="10" fill="#fff" stroke="#BFDBFE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="320" width="10" height="128" rx="5" fill="#1E3A5F"/>
  <text x="48" y="346" font-size="15" font-weight="700" fill="#1E3A5F">问题三 · 泡沫还是变革？两种叙事在激烈对撞</text>

  <!-- Bull vs Bear -->
  <rect x="48" y="360" width="346" height="76" rx="6" fill="#F0FDF4"/>
  <text x="221" y="380" text-anchor="middle" font-size="12" font-weight="700" fill="#16A34A">🟢 乐观派：三重万亿市场</text>
  <text x="58" y="400" font-size="11" fill="#475569">星链$120亿收入+盈利 · 发射$40亿+NASA合同</text>
  <text x="58" y="418" font-size="11" fill="#475569">AI部门$xAI+X+特斯拉 — 三条万亿赛道</text>

  <rect x="406" y="360" width="356" height="76" rx="6" fill="#FEF2F2"/>
  <text x="584" y="380" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">🔴 悲观派：AI热潮顶峰</text>
  <text x="416" y="400" font-size="11" fill="#475569">Chris Wood (Jefferies): "IPO标志AI热潮顶峰"</text>
  <text x="416" y="418" font-size="11" fill="#475569">Michael Burry: 做空Palantir/英伟达对冲</text>

  <!-- Bottom line -->
  <rect x="150" y="460" width="500" height="28" rx="6" fill="#1E293B"/>
  <text x="400" y="479" text-anchor="middle" font-size="12" font-weight="600" fill="#FCD34D">💡 $2.1万亿的市值里，有多少是真实的？市场正在用投票给出答案</text>
</svg>