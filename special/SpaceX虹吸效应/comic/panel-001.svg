<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#EBF2FA"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1E3A5F" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A5F">🚀 史上最大IPO：SpaceX $750亿 vs 所有对手</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">首发规模接近沙特阿美的3倍 · 超所有IPO之和一半</text>

  <!-- Bar chart: IPO size comparison -->
  <!-- SpaceX bar -->
  <text x="24" y="90" font-size="13" font-weight="700" fill="#1E3A5F">SpaceX (2026)</text>
  <text x="24" y="106" font-size="10" fill="#64748B">$750亿</text>
  <rect x="180" y="78" width="500" height="28" rx="6" fill="url(#bar1)" filter="url(#shadow)"/>
  <text x="690" y="97" font-size="13" font-weight="700" fill="#1E3A5F">$75B</text>

  <!-- Saudi Aramco bar -->
  <text x="24" y="148" font-size="13" fill="#475569">沙特阿美 (2019)</text>
  <text x="24" y="164" font-size="10" fill="#64748B">$256亿</text>
  <rect x="180" y="136" width="171" height="28" rx="6" fill="url(#bar2)" filter="url(#shadow)"/>
  <text x="360" y="155" font-size="13" font-weight="700" fill="#D97706">$25.6B</text>

  <!-- Alibaba bar -->
  <text x="24" y="206" font-size="13" fill="#475569">阿里巴巴 (2014)</text>
  <text x="24" y="222" font-size="10" fill="#64748B">$250亿</text>
  <rect x="180" y="194" width="167" height="28" rx="6" fill="url(#bar3)" filter="url(#shadow)"/>
  <text x="356" y="213" font-size="13" font-weight="700" fill="#16A34A">$25B</text>

  <!-- NTT Mobile bar -->
  <text x="24" y="264" font-size="13" fill="#475569">NTT Mobile (1998)</text>
  <text x="24" y="280" font-size="10" fill="#64748B">$184亿</text>
  <rect x="180" y="252" width="123" height="28" rx="6" fill="url(#bar4)" filter="url(#shadow)"/>
  <text x="312" y="271" font-size="13" font-weight="700" fill="#DC2626">$18.4B</text>

  <!-- Divider -->
  <line x1="24" y1="300" x2="776" y2="300" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Key stats cards -->
  <text x="400" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#1E3A5F">首日交易关键数据</text>

  <rect x="24" y="344" width="172" height="66" rx="8" fill="#fff" stroke="#DBEAFE" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="368" text-anchor="middle" font-size="20" font-weight="700" fill="#16A34A">+19%</text>
  <text x="110" y="388" text-anchor="middle" font-size="11" fill="#64748B">首日涨幅</text>
  <text x="110" y="402" text-anchor="middle" font-size="10" fill="#94A3B8">$135 → $161</text>

  <rect x="214" y="344" width="172" height="66" rx="8" fill="#fff" stroke="#DBEAFE" stroke-width="1" filter="url(#shadow)"/>
  <text x="300" y="368" text-anchor="middle" font-size="20" font-weight="700" fill="#1E3A5F">$2.1T</text>
  <text x="300" y="388" text-anchor="middle" font-size="11" fill="#64748B">首日市值</text>
  <text x="300" y="402" text-anchor="middle" font-size="10" fill="#94A3B8">全球第6大上市公司</text>

  <rect x="404" y="344" width="172" height="66" rx="8" fill="#fff" stroke="#DBEAFE" stroke-width="1" filter="url(#shadow)"/>
  <text x="490" y="368" text-anchor="middle" font-size="20" font-weight="700" fill="#D97706">4.2%</text>
  <text x="490" y="388" text-anchor="middle" font-size="11" fill="#64748B">自由流通量</text>
  <text x="490" y="402" text-anchor="middle" font-size="10" fill="#94A3B8">极低 = 价格易操控</text>

  <rect x="594" y="344" width="182" height="66" rx="8" fill="#fff" stroke="#DBEAFE" stroke-width="1" filter="url(#shadow)"/>
  <text x="685" y="368" text-anchor="middle" font-size="20" font-weight="700" fill="#DC2626">4x</text>
  <text x="685" y="388" text-anchor="middle" font-size="11" fill="#64748B">超额认购</text>
  <text x="685" y="402" text-anchor="middle" font-size="10" fill="#94A3B8">机构订单>$3000亿</text>

  <!-- Bottom insight -->
  <rect x="24" y="424" width="752" height="30" rx="6" fill="#EFF6FF"/>
  <text x="400" y="444" text-anchor="middle" font-size="12" fill="#475569">💡 核心矛盾：$2.1万亿市值 vs 仅4.2%的流通量——价格的"真实度"有多少？</text>

  <!-- Source -->
  <text x="24" y="482" font-size="10" fill="#94A3B8">来源: Bloomberg / Nasdaq / SEC S-1 Filing / Benzinga — 2026年6月</text>
</svg>