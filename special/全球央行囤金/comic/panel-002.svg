<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#F5F5F4"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#B45309"/>
    </marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#DC2626"/>
    </marker>
  </defs>

  <rect width="600" height="420" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#92400E">三根引信：央行从"买美债"到"买黄金"的传导链</text>

  <!-- ============ 引信 1 ============ -->
  <rect x="30" y="48" width="540" height="64" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="45" y="66" font-size="13" font-weight="700" fill="#991B1B">🔥 引信一 · 2022年2月</text>
  <text x="45" y="84" font-size="12" fill="#7F1D1D">俄罗斯 3,000亿美元外储被集体冻结</text>
  <text x="45" y="101" font-size="11" fill="#DC2626">→ 关键信号："你的美债不一定永远是你的"</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="112" x2="300" y2="130" stroke="#B45309" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ 间隔框：信任侵蚀 ============ -->
  <rect x="180" y="134" width="240" height="32" rx="16" fill="#FEF3C7" stroke="#D4A017" stroke-width="1.5"/>
  <text x="300" y="154" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">信任的自我强化螺旋</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="166" x2="300" y2="184" stroke="#B45309" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ 引信 2 ============ -->
  <rect x="30" y="188" width="540" height="64" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="45" y="206" font-size="13" font-weight="700" fill="#92400E">🔥 引信二 · 2022-2025</text>
  <text x="45" y="224" font-size="12" fill="#78350F">美债上限危机反复博弈 + 35万亿国债 + $2万亿/年赤字</text>
  <text x="45" y="241" font-size="11" fill="#B45309">→ 安全资产属性打了第二个洞</text>

  <!-- Arrow 3 -->
  <line x1="300" y1="252" x2="300" y2="270" stroke="#B45309" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ 引信 3 ============ -->
  <rect x="30" y="274" width="540" height="64" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="45" y="292" font-size="13" font-weight="700" fill="#9A3412">🔥 引信三 · 2024-2026</text>
  <text x="45" y="310" font-size="12" fill="#7C2D12">黄金与美债利率"脱钩"——旧模型彻底失效</text>
  <text x="45" y="327" font-size="11" fill="#C2410C">→ 利率4.6%，按旧模型金价应$2,000，实际$4,500+</text>

  <!-- Arrow 4 -->
  <line x1="300" y1="338" x2="300" y2="356" stroke="#DC2626" stroke-width="2" marker-end="url(#arrow-warn)"/>

  <!-- ============ 结果 ============ -->
  <rect x="70" y="360" width="460" height="48" rx="10" fill="url(#bg)" stroke="#B45309" stroke-width="2"/>
  <text x="300" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">结论：黄金正式超越美债 → 全球货币体系的一根支柱正在松动</text>
  <text x="300" y="398" text-anchor="middle" font-size="11" fill="#B45309">2026年2月 · 1996年以来第一次</text>
</svg>