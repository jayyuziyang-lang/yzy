<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#EBF2FA"/>
    </linearGradient>
    <linearGradient id="pathA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="pathB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <linearGradient id="pathC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1E3A5F" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A5F">接下来怎么走？三条路径推演</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">决定走向哪条路的关键，是未来两个月的三个催化剂</text>

  <!-- Path A -->
  <rect x="20" y="68" width="245" height="230" rx="10" fill="#fff" stroke="#86EFAC" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="68" width="245" height="38" rx="10" fill="url(#pathA)"/>
  <rect x="20" y="96" width="245" height="10" fill="url(#pathA)"/>
  <text x="142" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🟢 路径A · 有序适应</text>

  <text x="36" y="128" font-size="13" font-weight="700" fill="#15803D">概率 ~55%</text>

  <text x="36" y="152" font-size="11" fill="#475569">市场逐步适应无点阵图环境</text>
  <text x="36" y="170" font-size="11" fill="#475569">修剪均值通胀框架逐渐被接受</text>
  <text x="36" y="188" font-size="11" fill="#475569">VIX从24逐步回到18以下</text>
  <text x="36" y="206" font-size="11" fill="#475569">10Y在4.5%-4.7%区间震荡</text>
  <text x="36" y="224" font-size="11" fill="#475569">成长→价值轮动后企稳</text>

  <line x1="36" y1="238" x2="248" y2="238" stroke="#E2E8F0" stroke-width="1"/>

  <text x="36" y="258" font-size="10" font-weight="600" fill="#64748B">推动力:</text>
  <text x="36" y="274" font-size="10" fill="#64748B">沃什持续发声 + CPI温和</text>
  <text x="36" y="290" font-size="10" fill="#64748B">+ Q2财报季业绩强劲</text>

  <!-- Path B -->
  <rect x="278" y="68" width="245" height="230" rx="10" fill="#fff" stroke="#FECACA" stroke-width="2" filter="url(#shadow)"/>
  <rect x="278" y="68" width="245" height="38" rx="10" fill="url(#pathB)"/>
  <rect x="278" y="96" width="245" height="10" fill="url(#pathB)"/>
  <text x="400" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🔴 路径B · 波动升级</text>

  <text x="294" y="128" font-size="13" font-weight="700" fill="#DC2626">概率 ~30%</text>

  <text x="294" y="152" font-size="11" fill="#475569">7月CPI回升至4%以上</text>
  <text x="294" y="170" font-size="11" fill="#475569">失去"通胀锚"，恐慌加剧</text>
  <text x="294" y="188" font-size="11" fill="#475569">10Y美债收益率突破5%</text>
  <text x="294" y="206" font-size="11" fill="#475569">纳指可能回调15%-20%</text>
  <text x="294" y="224" font-size="11" fill="#475569">VIX持续在25以上</text>

  <line x1="294" y1="238" x2="506" y2="238" stroke="#E2E8F0" stroke-width="1"/>

  <text x="294" y="258" font-size="10" font-weight="600" fill="#64748B">推动力:</text>
  <text x="294" y="274" font-size="10" fill="#64748B">油价地缘风险跳涨</text>
  <text x="294" y="290" font-size="10" fill="#64748B">+ 服务业通胀反弹</text>

  <!-- Path C -->
  <rect x="536" y="68" width="245" height="230" rx="10" fill="#fff" stroke="#FDE68A" stroke-width="2" filter="url(#shadow)"/>
  <rect x="536" y="68" width="245" height="38" rx="10" fill="url(#pathC)"/>
  <rect x="536" y="96" width="245" height="10" fill="url(#pathC)"/>
  <text x="658" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🟡 路径C · 政策倒退</text>

  <text x="552" y="128" font-size="13" font-weight="700" fill="#B45309">概率 ~15%</text>

  <text x="552" y="152" font-size="11" fill="#475569">市场反应过激，标普破5000</text>
  <text x="552" y="170" font-size="11" fill="#475569">沃什被迫"找补"</text>
  <text x="552" y="188" font-size="11" fill="#475569">恢复部分前瞻指引</text>
  <text x="552" y="206" font-size="11" fill="#475569">损害Fed信誉</text>
  <text x="552" y="224" font-size="11" fill="#475569">短期反弹，长期受损</text>

  <line x1="552" y1="238" x2="764" y2="238" stroke="#E2E8F0" stroke-width="1"/>

  <text x="552" y="258" font-size="10" font-weight="600" fill="#64748B">推动力:</text>
  <text x="552" y="274" font-size="10" fill="#64748B">流动性危机</text>
  <text x="552" y="290" font-size="10" fill="#64748B">+ 政治压力升级</text>

  <!-- Three catalysts section -->
  <rect x="20" y="312" width="760" height="140" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#1E3A5F">🔑 决定走向的关键：三个催化剂</text>

  <!-- Catalyst 1 -->
  <rect x="36" y="356" width="230" height="80" rx="8" fill="#EFF6FF"/>
  <text x="40" y="378" font-size="12" font-weight="700" fill="#1E3A5F">① 7月中旬 · 6月CPI</text>
  <text x="40" y="398" font-size="11" fill="#475569">温和 → 路径A概率上升</text>
  <text x="40" y="416" font-size="11" fill="#475569">爆表 → 路径B主导</text>
  <text x="40" y="434" font-size="11" font-weight="600" fill="#1E3A5F">最重要的单一数据点</text>

  <!-- Catalyst 2 -->
  <rect x="282" y="356" width="230" height="80" rx="8" fill="#EFF6FF"/>
  <text x="286" y="378" font-size="12" font-weight="700" fill="#1E3A5F">② 7月下旬 · Q2财报季</text>
  <text x="286" y="398" font-size="11" fill="#475569">英伟达/谷歌业绩超预期</text>
  <text x="286" y="416" font-size="11" fill="#475569">→ 盈利增长对冲折现率</text>
  <text x="286" y="434" font-size="11" font-weight="600" fill="#1E3A5F">决定路径A能否稳定</text>

  <!-- Catalyst 3 -->
  <rect x="528" y="356" width="236" height="80" rx="8" fill="#EFF6FF"/>
  <text x="532" y="378" font-size="12" font-weight="700" fill="#1E3A5F">③ 9月FOMC</text>
  <text x="532" y="398" font-size="11" fill="#475569">沃什的"真正大考"</text>
  <text x="532" y="416" font-size="11" fill="#475569">需看到通胀回落+波动正常</text>
  <text x="532" y="434" font-size="11" font-weight="600" fill="#1E3A5F">任何一条不达标→路径B↑</text>

  <!-- Bottom quote -->
  <text x="400" y="478" text-anchor="middle" font-size="12" fill="#64748B" font-style="italic">"不害怕的人，不是因为胆子大——是因为他看得懂。"</text>
</svg>
