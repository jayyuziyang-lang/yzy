<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#EBF2FA"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1E3A5F" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A5F">传导链：从Fed会议室到你的投资组合</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">取消点阵图相当于一次没有加息的"隐性紧缩"</text>

  <!-- Chain: 8 links in a flow -->
  <!-- Link 1: FOMC -->
  <rect x="24" y="74" width="160" height="56" rx="8" fill="#1E3A5F" filter="url(#shadow)"/>
  <text x="104" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">📄 取消点阵图</text>
  <text x="104" y="118" text-anchor="middle" font-size="10" fill="#94A3B8">Fed沟通减少</text>

  <!-- Arrow 1→2 -->
  <line x1="184" y1="102" x2="220" y2="102" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Link 2 -->
  <rect x="226" y="74" width="160" height="56" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="306" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🤷 信心下降</text>
  <text x="306" y="114" text-anchor="middle" font-size="10" fill="#BFDBFE">不知Fed下一步方向</text>

  <!-- Arrow 2→3 -->
  <line x1="386" y1="102" x2="422" y2="102" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Link 3 -->
  <rect x="428" y="74" width="160" height="56" rx="8" fill="#2563EB" filter="url(#shadow)"/>
  <text x="508" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">📈 期限溢价↑</text>
  <text x="508" y="114" text-anchor="middle" font-size="10" fill="#BFDBFE">不确定性→补偿上升</text>

  <!-- Arrow 3→4 -->
  <line x1="588" y1="102" x2="624" y2="102" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Link 4 -->
  <rect x="630" y="74" width="150" height="56" rx="8" fill="#DC2626" filter="url(#shadow)"/>
  <text x="705" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🔺 长期利率↑</text>
  <text x="705" y="114" text-anchor="middle" font-size="10" fill="#FECACA">10Y面临上行压力</text>

  <!-- Downward flow from link 4 -->
  <line x1="705" y1="130" x2="705" y2="160" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Link 5: The big one -->
  <rect x="200" y="166" width="400" height="48" rx="24" fill="#DC2626" filter="url(#shadow)"/>
  <text x="400" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">⚡ 全球资产定价之锚上移 → 所有折现率提高</text>

  <!-- Split into 3 asset classes -->
  <line x1="400" y1="214" x2="400" y2="238" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="400" y1="238" x2="140" y2="238" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="400" y1="238" x2="400" y2="238" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="400" y1="238" x2="660" y2="238" stroke="#DC2626" stroke-width="1.5"/>

  <!-- Arrow down 1 -->
  <line x1="140" y1="238" x2="140" y2="260" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow down 2 -->
  <line x1="400" y1="238" x2="400" y2="260" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow down 3 -->
  <line x1="660" y1="238" x2="660" y2="260" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Asset card 1: US Stocks -->
  <rect x="24" y="268" width="232" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">🇺🇸 美股</text>
  <text x="38" y="316" font-size="11" fill="#475569">• 高估值科技承压最重</text>
  <text x="38" y="334" font-size="11" fill="#475569">• 银行/保险受益陡峭曲线</text>
  <text x="38" y="352" font-size="11" fill="#475569">• 成长→价值轮动开启</text>
  <text x="38" y="372" font-size="11" fill="#64748B">半导体、AI概念折现率冲击</text>

  <!-- Asset card 2: Gold -->
  <rect x="284" y="268" width="232" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">🥇 黄金</text>
  <text x="298" y="316" font-size="11" fill="#475569">• 短期：强势美元承压</text>
  <text x="298" y="334" font-size="11" fill="#475569">• 中期：央行购金（800-1000吨/年）</text>
  <text x="298" y="352" font-size="11" fill="#475569">• 4,200-4,300有结构性买盘</text>
  <text x="298" y="372" font-size="11" fill="#64748B">短期压力 ≠ 长期逻辑改变</text>

  <!-- Asset card 3: A股 -->
  <rect x="544" y="268" width="232" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <text x="660" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">🇨🇳 A股</text>
  <text x="558" y="316" font-size="11" fill="#475569">• 北向资金阶段性流出</text>
  <text x="558" y="334" font-size="11" fill="#475569">• 大市值股票承压</text>
  <text x="558" y="352" font-size="11" fill="#475569">• 核心驱动力在国内</text>
  <text x="558" y="372" font-size="11" fill="#64748B">机器人/物理AI方向不变</text>

  <!-- Bottom insight: The flip side -->
  <rect x="24" y="400" width="752" height="48" rx="10" fill="#F0FDF4"/>
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#475569">🔄 但硬币有另一面：修剪均值PCE仅2.3%</text>
  <text x="400" y="438" text-anchor="middle" font-size="12" font-weight="700" fill="#16A34A">如果市场接受这个叙事 → 长端利率上行压力反而是有限的</text>

  <!-- Source -->
  <text x="24" y="480" font-size="10" fill="#94A3B8">来源: T.Rowe Price / Pimco / Goldman Sachs / 华福证券 研究 — 2026年6月</text>
</svg>
