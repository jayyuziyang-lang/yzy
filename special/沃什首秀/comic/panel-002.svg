<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#EBF2FA"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FFF5F5"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FFF8E7"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <linearGradient id="profile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F2440"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1E3A5F" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A5F">沃什为什么要拆掉点阵图？</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">一个哲学家式主席的三个理由</text>

  <!-- Warsh Profile Card -->
  <rect x="24" y="68" width="240" height="420" rx="10" fill="url(#profile)" filter="url(#shadow)"/>
  <text x="144" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">凯文·沃什</text>
  <text x="144" y="122" text-anchor="middle" font-size="11" fill="#94A3B8">Kevin Warsh</text>
  <text x="144" y="146" text-anchor="middle" font-size="11" fill="#CBD5E1">第17任美联储主席</text>

  <line x1="50" y1="160" x2="238" y2="160" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="44" y="184" font-size="11" font-weight="600" fill="#94A3B8">📍 出生</text>
  <text x="44" y="200" font-size="12" fill="#CBD5E1">1970年 · 纽约</text>

  <text x="44" y="228" font-size="11" font-weight="600" fill="#94A3B8">🎓 教育</text>
  <text x="44" y="244" font-size="12" fill="#CBD5E1">斯坦福法学院 (JD)</text>

  <text x="44" y="272" font-size="11" font-weight="600" fill="#94A3B8">🏛️ Fed履历</text>
  <text x="44" y="288" font-size="12" fill="#CBD5E1">2006-2011 理事</text>
  <text x="44" y="304" font-size="12" fill="#CBD5E1">史上最年轻（36岁）</text>
  <text x="44" y="320" font-size="12" fill="#CBD5E1">参与贝尔斯登/AIG救助</text>

  <text x="44" y="348" font-size="11" font-weight="600" fill="#94A3B8">📖 离开Fed后</text>
  <text x="44" y="364" font-size="12" fill="#CBD5E1">斯坦福商学院教授</text>
  <text x="44" y="380" font-size="12" fill="#CBD5E1">Fed沟通最犀利批评者</text>

  <text x="44" y="408" font-size="11" font-weight="600" fill="#FCD34D">💬 名言</text>
  <text x="44" y="424" font-size="11" fill="#FDE68A" font-style="italic">"我不相信前瞻指引"</text>
  <text x="44" y="442" font-size="11" fill="#FDE68A" font-style="italic">— 2026年4月参院听证会</text>

  <!-- Reason 1 -->
  <rect x="280" y="68" width="496" height="120" rx="10" fill="url(#card1)" stroke="#FECACA" stroke-width="1" filter="url(#shadow)"/>
  <rect x="280" y="68" width="4" height="120" rx="2" fill="#DC2626"/>
  <text x="300" y="94" font-size="14" font-weight="700" fill="#DC2626">理由一：点阵图"绑架"了委员</text>
  <text x="300" y="116" font-size="12" fill="#475569">3月点了一年的"降息两次"，</text>
  <text x="300" y="134" font-size="12" fill="#475569">6月数据变了，但不好意思改——</text>
  <text x="300" y="152" font-size="12" fill="#475569">因为改了会被解读为"这个人变来变去"。</text>
  <text x="300" y="174" font-size="12" font-weight="700" fill="#991B1B">→ 失去的是按数据做决策的灵活性</text>

  <!-- Reason 2 -->
  <rect x="280" y="200" width="496" height="120" rx="10" fill="url(#card2)" stroke="#FDE68A" stroke-width="1" filter="url(#shadow)"/>
  <rect x="280" y="200" width="4" height="120" rx="2" fill="#D97706"/>
  <text x="300" y="226" font-size="14" font-weight="700" fill="#B45309">理由二：前瞻制造"政策依赖"</text>
  <text x="300" y="248" font-size="12" fill="#475569">市场像婴儿一样等Fed喂奶——</text>
  <text x="300" y="266" font-size="12" fill="#475569">"你说要降我就买，你说不降我就卖"。</text>
  <text x="300" y="284" font-size="12" fill="#475569">沃什认为健康的市场应该自己定价。</text>
  <text x="300" y="306" font-size="12" font-weight="700" fill="#92400E">→ 拆掉"拐杖"，让市场自己走路</text>

  <!-- Reason 3 -->
  <rect x="280" y="332" width="496" height="120" rx="10" fill="url(#card3)" stroke="#BFDBFE" stroke-width="1" filter="url(#shadow)"/>
  <rect x="280" y="332" width="4" height="120" rx="2" fill="#1E3A5F"/>
  <text x="300" y="358" font-size="14" font-weight="700" fill="#1E3A5F">理由三：不确定性太大，指引只会误导</text>
  <text x="300" y="380" font-size="12" fill="#475569">2024-2025，市场高喊"降息"喊了两年，</text>
  <text x="300" y="398" font-size="12" fill="#475569">但事实证明完全错了——</text>
  <text x="300" y="416" font-size="12" fill="#475569">通胀粘稠、就业强劲、经济加速增长。</text>
  <text x="300" y="438" font-size="12" font-weight="700" fill="#0F2440">→ 如果Fed的指引一直是错的，那就别指引</text>

  <!-- Bottom insight -->
  <rect x="280" y="464" width="496" height="24" rx="6" fill="#EFF6FF"/>
  <text x="528" y="481" text-anchor="middle" font-size="11" font-weight="600" fill="#1E3A5F">💡 但沃什同时做了加法：引入修剪均值通胀（2.3%）——暗示真正的通胀已接近目标</text>
</svg>
