<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="10"/>
  <rect x="16" y="14" width="568" height="32" rx="6" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1"/>
  <text x="300" y="35" text-anchor="middle" fill="#1A56DB" font-size="14" font-weight="700" font-family="system-ui,sans-serif">你该怎么办：不同投资者的应对框架</text>

  <!-- Defensive -->
  <g transform="translate(8, 58)">
    <rect width="190" height="268" rx="8" fill="rgba(26,86,219,0.03)" stroke="#1A56DB" stroke-width="1.2"/>
    <rect width="190" height="30" rx="8" fill="#1A56DB"/>
    <rect y="12" width="190" height="18" fill="#1A56DB"/>
    <text x="95" y="23" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🛡️ 防御型</text>
    <text x="95" y="48" text-anchor="middle" fill="#64748B" font-size="9">低风险 · 债/现金为主</text>

    <text x="10" y="68" fill="#1A56DB" font-size="10" font-weight="600">当前建议仓位：</text>
    <text x="10" y="86" fill="#475569" font-size="9">• 美债/中短债 50%</text>
    <text x="10" y="102" fill="#475569" font-size="9">• 现金 20%</text>
    <text x="10" y="118" fill="#475569" font-size="9">• 黄金 15%</text>
    <text x="10" y="134" fill="#475569" font-size="9">• 权益 15%</text>

    <line x1="10" y1="142" x2="180" y2="142" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="158" fill="#1A56DB" font-size="10" font-weight="600">行动：</text>
    <text x="10" y="176" fill="#475569" font-size="9">✅ CPI前不操作</text>
    <text x="10" y="192" fill="#475569" font-size="9">✅ 若CPI偏高→加短债</text>
    <text x="10" y="208" fill="#475569" font-size="9">✅ 若CPI回落→再平衡</text>

    <line x1="10" y1="216" x2="180" y2="216" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="234" fill="#1A56DB" font-size="10" font-weight="600">核心纪律：</text>
    <text x="10" y="252" fill="#475569" font-size="9">不满仓是最好的风控</text>
    <text x="10" y="266" fill="#94A3B8" font-size="8.5">不确定性上升时，慢就是快</text>
  </g>
  <!-- Balanced -->
  <g transform="translate(205, 58)">
    <rect width="190" height="268" rx="8" fill="rgba(212,160,23,0.03)" stroke="#D4A017" stroke-width="1.2"/>
    <rect width="190" height="30" rx="8" fill="#D4A017"/>
    <rect y="12" width="190" height="18" fill="#D4A017"/>
    <text x="95" y="23" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">⚖️ 平衡型</text>
    <text x="95" y="48" text-anchor="middle" fill="#64748B" font-size="9">中等风险 · 50/50分配</text>

    <text x="10" y="68" fill="#B8860B" font-size="10" font-weight="600">当前建议仓位：</text>
    <text x="10" y="86" fill="#475569" font-size="9">• A股蓝筹 25%</text>
    <text x="10" y="102" fill="#475569" font-size="9">• 美债/中债 25%</text>
    <text x="10" y="118" fill="#475569" font-size="9">• 黄金 15%</text>
    <text x="10" y="134" fill="#475569" font-size="9">• 现金 20%</text>
    <text x="10" y="150" fill="#475569" font-size="9">• 科技股 15%</text>

    <line x1="10" y1="158" x2="180" y2="158" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="174" fill="#B8860B" font-size="10" font-weight="600">行动：</text>
    <text x="10" y="192" fill="#475569" font-size="9">✅ 小幅减科技→增现金</text>
    <text x="10" y="208" fill="#475569" font-size="9">✅ 黄金急跌中分批接</text>
    <text x="10" y="224" fill="#475569" font-size="9">✅ 关注A股低位方向</text>

    <line x1="10" y1="232" x2="180" y2="232" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="250" fill="#B8860B" font-size="10" font-weight="600">核心纪律：</text>
    <text x="10" y="266" fill="#475569" font-size="9">关键催化剂前后留缓冲</text>
  </g>
  <!-- Aggressive -->
  <g transform="translate(402, 58)">
    <rect width="190" height="268" rx="8" fill="rgba(220,38,38,0.03)" stroke="#DC2626" stroke-width="1.2"/>
    <rect width="190" height="30" rx="8" fill="#DC2626"/>
    <rect y="12" width="190" height="18" fill="#DC2626"/>
    <text x="95" y="23" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🔥 进取型</text>
    <text x="95" y="48" text-anchor="middle" fill="#64748B" font-size="9">高风险 · 权益为主</text>

    <text x="10" y="68" fill="#DC2626" font-size="10" font-weight="600">当前建议仓位：</text>
    <text x="10" y="86" fill="#475569" font-size="9">• 科技股 40%</text>
    <text x="10" y="102" fill="#475569" font-size="9">• A股蓝筹 20%</text>
    <text x="10" y="118" fill="#475569" font-size="9">• 黄金 15%</text>
    <text x="10" y="134" fill="#475569" font-size="9">• 现金 25%</text>

    <line x1="10" y1="142" x2="180" y2="142" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="158" fill="#DC2626" font-size="10" font-weight="600">行动：</text>
    <text x="10" y="176" fill="#475569" font-size="9">⚠️ 急跌不抄底</text>
    <text x="10" y="192" fill="#475569" font-size="9">⚠️ CPI+FOMC落地后加仓</text>
    <text x="10" y="208" fill="#475569" font-size="9">⚠️ 关注机器人/物理AI</text>

    <line x1="10" y1="216" x2="180" y2="216" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="234" fill="#DC2626" font-size="10" font-weight="600">核心纪律：</text>
    <text x="10" y="252" fill="#475569" font-size="9">现金是option</text>
    <text x="10" y="266" fill="#94A3B8" font-size="8.5">SOX -10% ≠ 见底</text>
  </g>
</svg>