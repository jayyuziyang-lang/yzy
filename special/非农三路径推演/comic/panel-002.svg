    <text x="10" y="154" fill="#475569" font-size="9.5">降息叙事间接复活</text>
    <line x1="10" y1="162" x2="184" y2="162" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="178" fill="#B8860B" font-size="10" font-weight="600">关键判断：</text>
    <text x="10" y="196" fill="#475569" font-size="9.5">非对称——协议的正面影响</text>
    <text x="10" y="210" fill="#475569" font-size="9.5">大于冲突升级的负面影响</text>
