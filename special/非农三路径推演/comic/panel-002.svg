    <line x1="10" y1="88" x2="184" y2="88" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="104" fill="#B8860B" font-size="10" font-weight="600">如果协议落签（中期利好）：</text>
    <text x="10" y="122" fill="#475569" font-size="9.5">426艘油轮集中放货</text>
