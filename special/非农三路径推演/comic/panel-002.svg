      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="10"/>
  <!-- Title -->
  <rect x="16" y="14" width="568" height="32" rx="6" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1"/>
  <text x="300" y="35" text-anchor="middle" fill="#1A56DB" font-size="14" font-weight="700" font-family="system-ui,sans-serif">三路径推演：站在十字路口的全球资产</text>

  <!-- Center circle -->
  <circle cx="300" cy="84" r="24" fill="rgba(220,38,38,0.1)" stroke="#DC2626" stroke-width="2"/>
  <text x="300" y="89" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="700">非农</text>
  <!-- Lines -->
  <line x1="300" y1="108" x2="300" y2="130" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="300" y1="130" x2="100" y2="170" stroke="#DC2626" stroke-width="2"/>
  <line x1="300" y1="130" x2="300" y2="170" stroke="#1A56DB" stroke-width="2"/>
  <line x1="300" y1="130" x2="500" y2="170" stroke="#D4A017" stroke-width="2"/>
  <!-- Probability tags -->
  <rect x="138" y="138" width="36" height="18" rx="9" fill="rgba(220,38,38,0.1)" stroke="#DC2626" stroke-width="0.5"/>
  <text x="156" y="151" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="700">60%</text>
  <rect x="282" y="148" width="36" height="18" rx="9" fill="rgba(26,86,219,0.1)" stroke="#1A56DB" stroke-width="0.5"/>
  <text x="300" y="161" text-anchor="middle" fill="#1A56DB" font-size="10" font-weight="700">30%</text>
  <rect x="426" y="138" width="36" height="18" rx="9" fill="rgba(212,160,23,0.1)" stroke="#D4A017" stroke-width="0.5"/>
  <text x="444" y="151" text-anchor="middle" fill="#D4A017" font-size="10" font-weight="700">10%</text>

  <!-- Path A -->
  <g transform="translate(6, 178)">
    <rect width="193" height="210" rx="8" fill="rgba(220,38,38,0.03)" stroke="#DC2626" stroke-width="1.2"/>
    <rect width="193" height="28" rx="8" fill="#DC2626"/>
    <rect y="10" width="193" height="18" fill="#DC2626"/>
    <text x="96" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">路径A · AI估值修正</text>
