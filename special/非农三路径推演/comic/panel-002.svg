    <text x="10" y="62" fill="#475569" font-size="9.5">· 博通AI指引低于预期</text>
    <text x="10" y="78" fill="#475569" font-size="9.5">· 非农→高利率长期化</text>
    <text x="10" y="94" fill="#475569" font-size="9.5">· 谷歌分散采购暗示</text>
    <line x1="10" y1="100" x2="183" y2="100" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="116" fill="#DC2626" font-size="10" font-weight="600">资产影响：</text>
    <text x="10" y="134" fill="#475569" font-size="9.5">SOX 12,000-12,500震荡</text>
    <text x="10" y="150" fill="#475569" font-size="9.5">英伟达/博通持续承压</text>
    <text x="10" y="166" fill="#475569" font-size="9.5">科技QDII继续亏损</text>
    <line x1="10" y1="172" x2="183" y2="172" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="188" fill="#DC2626" font-size="10" font-weight="600">反转条件：</text>
    <text x="10" y="204" fill="#475569" font-size="9.5">CPI回落 + FOMC不加息</text>
  </g>
  <!-- Path B -->
  <g transform="translate(203, 178)">
    <rect width="193" height="210" rx="8" fill="rgba(26,86,219,0.03)" stroke="#1A56DB" stroke-width="1.2"/>
    <rect width="193" height="28" rx="8" fill="#1A56DB"/>
    <rect y="10" width="193" height="18" fill="#1A56DB"/>
    <text x="96" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">路径B · 降息推后重定价</text>
    <text x="10" y="46" fill="#1A56DB" font-size="10" font-weight="600">触发条件：</text>
    <text x="10" y="62" fill="#475569" font-size="9.5">· 非农持续强劲</text>
    <text x="10" y="78" fill="#475569" font-size="9.5">· CPI维持高位</text>
    <text x="10" y="94" fill="#475569" font-size="9.5">· 工资螺旋风险延续</text>
