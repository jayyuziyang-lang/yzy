    <text x="10" y="166" fill="#475569" font-size="9.5">新兴市场承压</text>
    <line x1="10" y1="172" x2="183" y2="172" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="10" y="188" fill="#1A56DB" font-size="10" font-weight="600">市场结构：</text>
    <text x="10" y="204" fill="#475569" font-size="9.5">价值 > 成长 · 防御 > 进攻</text>
  </g>
  <!-- Path C -->
  <g transform="translate(400, 178)">
    <rect width="194" height="210" rx="8" fill="rgba(212,160,23,0.03)" stroke="#D4A017" stroke-width="1.2"/>
    <rect width="194" height="28" rx="8" fill="#D4A017"/>
    <rect y="10" width="194" height="18" fill="#D4A017"/>
    <text x="97" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">独立主线 · 美伊地缘</text>
