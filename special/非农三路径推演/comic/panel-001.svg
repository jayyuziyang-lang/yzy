<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg)" rx="10"/>
  <!-- Title bar -->
  <rect x="16" y="14" width="568" height="32" rx="6" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1"/>
  <text x="300" y="35" text-anchor="middle" fill="#1A56DB" font-size="14" font-weight="700" font-family="system-ui,sans-serif">非农17.2万 · 全球市场72小时全景</text>

  <!-- Data -->
  <g transform="translate(16, 58)">
    <rect width="172" height="90" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
    <text x="86" y="26" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="600">非农就业（5月）</text>
    <text x="86" y="54" text-anchor="middle" fill="#DC2626" font-size="28" font-weight="800">17.2万</text>
    <text x="86" y="72" text-anchor="middle" fill="#64748B" font-size="11">预期 8.5万</text>
    <text x="86" y="86" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="700">≈ 预期的2倍</text>
  </g>
  <g transform="translate(200, 58)">
    <rect width="192" height="90" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
    <text x="96" y="26" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="600">前值上修</text>
    <text x="96" y="54" text-anchor="middle" fill="#16A34A" font-size="28" font-weight="800">+9.3万</text>
    <text x="96" y="72" text-anchor="middle" fill="#64748B" font-size="11">3月+2.9万 + 4月+6.4万</text>
    <text x="96" y="86" text-anchor="middle" fill="#16A34A" font-size="10">整个上半年更强</text>
  </g>
  <g transform="translate(404, 58)">
    <rect width="180" height="90" rx="8" fill="#FFFBEB" stroke="#D4A017" stroke-width="1.2"/>
    <text x="90" y="26" text-anchor="middle" fill="#D4A017" font-size="10" font-weight="600">时薪同比</text>
    <text x="90" y="54" text-anchor="middle" fill="#D4A017" font-size="28" font-weight="800">+4.1%</text>
    <text x="90" y="72" text-anchor="middle" fill="#64748B" font-size="11">预期 +3.9%</text>
    <text x="90" y="86" text-anchor="middle" fill="#D4A017" font-size="10">工资螺旋风险未消</text>
  </g>
  <!-- Consequence -->
  <rect x="16" y="158" width="568" height="32" rx="6" fill="rgba(220,38,38,0.06)" stroke="#DC2626" stroke-width="1"/>
  <text x="300" y="178" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">降息预期正式关闭 → 美债4.536% → 美元指数突破100 → 高估值芯片遭无差别抛售</text>

  <!-- Market reaction -->
  <g transform="translate(16, 200)">
    <rect width="134" height="78" rx="8" fill="rgba(220,38,38,0.06)" stroke="#DC2626" stroke-width="1"/>
    <text x="67" y="26" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="600">费城半导体</text>
    <text x="67" y="50" text-anchor="middle" fill="#DC2626" font-size="22" font-weight="800">-10.25%</text>
    <text x="67" y="68" text-anchor="middle" fill="#DC2626" font-size="10">板块蒸发$1万亿</text>
  </g>
  <g transform="translate(162, 200)">
    <rect width="134" height="78" rx="8" fill="rgba(220,38,38,0.06)" stroke="#DC2626" stroke-width="1"/>
    <text x="67" y="26" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="600">纳斯达克</text>
    <text x="67" y="50" text-anchor="middle" fill="#DC2626" font-size="22" font-weight="800">-4.18%</text>
    <text x="67" y="68" text-anchor="middle" fill="#DC2626" font-size="10">年内最大单日跌幅</text>
  </g>
  <g transform="translate(308, 200)">
    <rect width="134" height="78" rx="8" fill="rgba(16,185,129,0.06)" stroke="#10B981" stroke-width="1"/>
    <text x="67" y="26" text-anchor="middle" fill="#10B981" font-size="10" font-weight="600">现货黄金</text>
    <text x="67" y="50" text-anchor="middle" fill="#10B981" font-size="22" font-weight="800">-$4,354</text>
    <text x="67" y="68" text-anchor="middle" fill="#10B981" font-size="10">-2.72% 双重压制</text>
  </g>
  <g transform="translate(454, 200)">
    <rect width="130" height="82" rx="8" fill="rgba(220,38,38,0.08)" stroke="#DC2626" stroke-width="1.5"/>
    <rect x="0" y="0" width="130" height="20" rx="8" fill="#DC2626"/>
    <rect y="10" width="130" height="10" fill="#DC2626"/>
    <text x="65" y="14" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">⚠️ VIX恐慌指数</text>
    <text x="65" y="46" text-anchor="middle" fill="#DC2626" font-size="22" font-weight="800">21.51</text>
    <text x="65" y="62" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="700">+39.7% 恐慌区!</text>
    <text x="65" y="76" text-anchor="middle" fill="#DC2626" font-size="8">平静←15→焦虑←20→恐慌</text>
  </g>
  <!-- Key insight -->
  <rect x="16" y="288" width="568" height="42" rx="8" fill="rgba(26,86,219,0.04)" stroke="#1A56DB" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="306" text-anchor="middle" fill="#1E3A7A" font-size="11" font-weight="600">核心矛盾：非农不是"坏"，是"市场之前太乐观了"。降息预期已被充分定价——超预期意味着要重新定价整个利率路径</text>

  <!-- Bottom -->
  <rect x="16" y="340" width="568" height="28" rx="6" fill="#1A56DB" opacity="0.05"/>
  <text x="300" y="358" text-anchor="middle" fill="#1A56DB" font-size="11" font-weight="600">传导链：非农17.2万 → 降息预期关闭 → 美债↑美元↑ → 高PE芯片股抱团瓦解</text>
</svg>