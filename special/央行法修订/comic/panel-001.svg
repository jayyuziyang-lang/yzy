<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" fill="none">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Title -->
  <text x="150" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B" font-family="sans-serif">法律基石：央行法处在哪个位置</text>
  <!-- Ground -->
  <line x1="20" y1="195" x2="280" y2="195" stroke="#D4A017" stroke-width="2"/>
  <!-- "1+N+X" labels beneath ground -->
  <text x="90" y="210" text-anchor="middle" font-size="7" fill="#94A3B8" font-family="sans-serif">金融法(统领)</text>
  <text x="155" y="210" text-anchor="middle" font-size="7" fill="#94A3B8" font-family="sans-serif">金融稳定法(风险)</text>
  <text x="220" y="210" text-anchor="middle" font-size="7" fill="#94A3B8" font-family="sans-serif">商业银行法(经营)</text>
  <!-- Pedestal / pillar -->
  <rect x="100" y="95" width="100" height="100" rx="4" fill="#8B7355" stroke="#6B5B3E" stroke-width="1.5"/>
  <rect x="85" y="90" width="130" height="12" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <!-- Pillar engraving -->
  <text x="150" y="132" text-anchor="middle" font-size="14" font-weight="900" fill="#FFFBEB" font-family="serif">央行法</text>
  <text x="150" y="150" text-anchor="middle" font-size="8" fill="#C4B99A" font-family="sans-serif">—— 职能法定 ——</text>
  <!-- Gear icon on pillar -->
  <circle cx="150" cy="168" r="8" stroke="#D4A017" stroke-width="1.5" fill="none"/>
  <circle cx="150" cy="168" r="3" fill="#D4A017"/>
  <line x1="150" y1="160" x2="150" y2="176" stroke="#D4A017" stroke-width="1"/>
  <line x1="142" y1="168" x2="158" y2="168" stroke="#D4A017" stroke-width="1"/>
  <!-- Capital / city on top -->
  <rect x="115" y="42" width="70" height="48" rx="2" fill="#1E3A5F" stroke="#1A56DB" stroke-width="1" opacity="0.9"/>
  <!-- Building details -->
  <rect x="122" y="50" width="10" height="14" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="136" y="50" width="10" height="14" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="150" y="50" width="10" height="14" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="164" y="50" width="10" height="14" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="128" y="67" width="10" height="14" rx="1" fill="#60A5FA" opacity="0.5"/>
  <rect x="142" y="67" width="10" height="14" rx="1" fill="#60A5FA" opacity="0.5"/>
  <rect x="156" y="67" width="10" height="14" rx="1" fill="#60A5FA" opacity="0.5"/>
  <!-- Money symbols around city -->
  <text x="100" y="68" font-size="10" fill="#D4A017" opacity="0.7">¥</text>
  <text x="195" y="62" font-size="9" fill="#D4A017" opacity="0.7">$</text>
  <text x="200" y="80" font-size="8" fill="#D4A017" opacity="0.5">€</text>
  <!-- Arrows connecting pillar to city -->
  <line x1="150" y1="90" x2="150" y2="95" stroke="#D4A017" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- Central position indicator -->
  <circle cx="150" cy="140" r="55" stroke="#D4A017" stroke-width="0.5" stroke-dasharray="3,3" fill="none" opacity="0.3"/>
</svg>
