<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" fill="none">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Title -->
  <text x="150" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B" font-family="sans-serif">时光对比：2003年 vs 2026年</text>
  <!-- Time arrow -->
  <line x1="148" y1="30" x2="148" y2="210" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="148,210 144,202 152,202" fill="#94A3B8"/>
  <!-- Year labels -->
  <rect x="130" y="32" width="36" height="18" rx="9" fill="#9CA3AF"/>
  <text x="148" y="44" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="sans-serif">2003</text>
  <rect x="130" y="172" width="36" height="18" rx="9" fill="#3B82F6"/>
  <text x="148" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="sans-serif">2026</text>

  <!-- LEFT: 2003 scene -->
  <!-- Flip phone -->
  <rect x="30" y="58" width="28" height="48" rx="4" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  <rect x="30" y="58" width="28" height="15" rx="4" fill="#9CA3AF"/>
  <rect x="36" y="61" width="16" height="10" rx="1" fill="#E5E7EB"/>
  <!-- Keypad dots -->
  <circle cx="39" cy="82" r="1.5" fill="#9CA3AF"/>
  <circle cx="49" cy="82" r="1.5" fill="#9CA3AF"/>
  <circle cx="39" cy="90" r="1.5" fill="#9CA3AF"/>
  <circle cx="49" cy="90" r="1.5" fill="#9CA3AF"/>
  <circle cx="44" cy="98" r="2" fill="#D4A017"/>

  <!-- Cash stack -->
  <rect x="75" y="80" width="35" height="42" rx="2" fill="#FCD34D" stroke="#D4A017" stroke-width="1"/>
  <rect x="78" y="83" width="29" height="36" rx="1" fill="#FEF3C7"/>
  <text x="92" y="103" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E" font-family="serif">¥</text>
  <!-- Paper ticket stub -->
  <rect x="64" y="60" width="18" height="24" rx="1" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.8"/>
  <rect x="66" y="63" width="14" height="5" rx="1" fill="#D1D5DB"/>
  <text x="73" y="76" text-anchor="middle" font-size="5" fill="#6B7280" font-family="sans-serif">股票</text>

  <!-- Label -->
  <text x="60" y="140" text-anchor="middle" font-size="7" fill="#6B7280" font-family="sans-serif">现金·翻盖·柜台排队</text>
  <text x="60" y="150" text-anchor="middle" font-size="6" fill="#9CA3AF" font-family="sans-serif">M2 ≈ 22万亿</text>

  <!-- RIGHT: 2026 scene -->
  <!-- Smartphone -->
  <rect x="175" y="60" width="24" height="46" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="179" y="65" width="16" height="28" rx="2" fill="#3B82F6" opacity="0.3"/>
  <text x="187" y="83" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif">数币</text>
  <circle cx="187" cy="98" r="3" fill="#3B82F6"/>
  <rect x="187" y="108" width="3" height="3" rx="0.5" fill="#3B82F6"/>

  <!-- Digital RMB icon -->
  <circle cx="215" cy="75" r="12" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="215" y="78" text-anchor="middle" font-size="9" fill="#1E3A5F" font-family="sans-serif">eCNY</text>

  <!-- Electronic transaction visualization -->
  <line x1="175" y1="105" x2="240" y2="105" stroke="#93C5FD" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="240" cy="105" r="4" fill="#3B82F6" opacity="0.5"/>
  <text x="240" y="103" text-anchor="middle" font-size="5" fill="#3B82F6" font-family="sans-serif">块</text>

  <!-- Label -->
  <text x="215" y="140" text-anchor="middle" font-size="7" fill="#3B82F6" font-family="sans-serif">数币·智能·秒级转账</text>
  <text x="215" y="150" text-anchor="middle" font-size="6" fill="#64748B" font-family="sans-serif">M2 ≈ 300万亿</text>

  <!-- GAP indicators -->
  <!-- Penalty gap -->
  <text x="30" y="175" font-size="7" fill="#92400E" font-family="sans-serif">处罚上限 30万</text>
  <text x="180" y="175" font-size="7" fill="#1E3A5F" font-family="sans-serif">处罚上限 → 数百万</text>
  <line x1="85" y1="173" x2="175" y2="173" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Payment gap -->
  <text x="30" y="190" font-size="7" fill="#92400E" font-family="sans-serif">无数字人民币法律地位</text>
  <text x="180" y="190" font-size="7" fill="#1E3A5F" font-family="sans-serif">数字人民币法定货币</text>

  <!-- Regulation gap -->
  <text x="30" y="205" font-size="7" fill="#92400E" font-family="sans-serif">无宏观审慎框架</text>
  <text x="180" y="205" font-size="7" fill="#1E3A5F" font-family="sans-serif">双支柱框架入法</text>
</svg>
