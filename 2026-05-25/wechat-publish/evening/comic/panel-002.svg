<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#1E293B"/>
  <!-- Title -->
  <text x="150" y="24" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">华为"韬定律"</text>
  <!-- Chip/PCB visual -->
  <rect x="60" y="50" width="180" height="100" rx="6" fill="none" stroke="#EA580C" stroke-width="2"/>
  <!-- Die inside chip -->
  <rect x="90" y="68" width="120" height="64" rx="3" fill="#EA580C" opacity="0.15"/>
  <rect x="90" y="68" width="120" height="64" rx="3" fill="none" stroke="#FCD34D" stroke-width="1.5"/>
  <!-- Stacked layers (logic folding) -->
  <rect x="100" y="76" width="100" height="6" rx="1" fill="#EA580C" opacity="0.9"/>
  <rect x="100" y="86" width="100" height="6" rx="1" fill="#EA580C" opacity="0.7"/>
  <rect x="100" y="96" width="100" height="6" rx="1" fill="#EA580C" opacity="0.5"/>
  <rect x="100" y="106" width="100" height="6" rx="1" fill="#EA580C" opacity="0.3"/>
  <rect x="100" y="116" width="100" height="6" rx="1" fill="#EA580C" opacity="0.15"/>
  <!-- Arrow up -->
  <polygon points="240,80 255,90 240,100" fill="#DC2626"/>
  <!-- Pins -->
  <rect x="45" y="65" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="45" y="80" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="45" y="95" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="45" y="110" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="45" y="125" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="240" y="65" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="240" y="80" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="240" y="95" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="240" y="110" width="15" height="6" rx="1" fill="#FCD34D"/>
  <rect x="240" y="125" width="15" height="6" rx="1" fill="#FCD34D"/>
  <!-- Key stat 1 -->
  <text x="150" y="180" text-anchor="middle" fill="#FCD34D" font-size="16" font-weight="800" font-family="PingFang SC,sans-serif">2.38亿/mm²</text>
  <text x="150" y="196" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="PingFang SC,sans-serif">晶体管密度 ↑55% · 中芯国际 +18.78%</text>
</svg>
