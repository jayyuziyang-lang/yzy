<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Title -->
  <rect x="0" y="0" width="300" height="26" fill="#7C3AED"/>
  <text x="150" y="18" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">DeepSeek 永久降价</text>
  <!-- Big price pill (before) -->
  <rect x="20" y="55" width="260" height="50" rx="25" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="150" y="78" text-anchor="middle" fill="#6D28D9" font-size="12" font-weight="700" font-family="PingFang SC,sans-serif">行业均价</text>
  <text x="150" y="95" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="PingFang SC,sans-serif">（HBM内存半年涨超500%）</text>
  <!-- Arrow down -->
  <polygon points="150,115 140,128 160,128" fill="#16A34A"/>
  <line x1="150" y1="105" x2="150" y2="115" stroke="#16A34A" stroke-width="2"/>
  <!-- Small price pill (after) -->
  <rect x="75" y="135" width="150" height="40" rx="20" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="150" y="160" text-anchor="middle" fill="#16A34A" font-size="22" font-weight="900" font-family="PingFang SC,sans-serif">-75%</text>
  <!-- Bottom stats -->
  <text x="150" y="200" text-anchor="middle" fill="#64748B" font-size="8" font-family="PingFang SC,sans-serif">输出仅6元/百万Tokens · 比GPT-5.5便宜30倍</text>
</svg>
