<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <rect x="0" y="0" width="300" height="26" fill="#F59E0B"/>
  <text x="150" y="18" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">DeepSeek 降价75%</text>
  <!-- Before bar (tall) -->
  <rect x="40" y="50" width="80" height="110" rx="4" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="80" y="140" text-anchor="middle" fill="#92400E" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">行业均价</text>
  <text x="80" y="155" text-anchor="middle" fill="#DC2626" font-size="8" font-family="PingFang SC,sans-serif">（HBM涨超500%）</text>
  <!-- Down arrow -->
  <polygon points="150,110 140,122 160,122" fill="#16A34A"/>
  <line x1="150" y1="50" x2="150" y2="110" stroke="#16A34A" stroke-width="2"/>
  <!-- After bar (short) -->
  <rect x="180" y="130" width="80" height="30" rx="4" fill="#DCFCE7" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="220" y="148" text-anchor="middle" fill="#16A34A" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">-75%</text>
  <!-- Strikethrough price label -->
  <text x="220" y="118" text-anchor="middle" fill="#94A3B8" font-size="8" text-decoration="line-through" font-family="PingFang SC,sans-serif">原价</text>
  <text x="220" y="178" text-anchor="middle" fill="#16A34A" font-size="8" font-family="PingFang SC,sans-serif">输出6元/百万Tokens</text>
  <text x="220" y="192" text-anchor="middle" fill="#64748B" font-size="7" font-family="PingFang SC,sans-serif">比GPT-5.5便宜30倍</text>
</svg>
