<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Title -->
  <rect x="0" y="0" width="300" height="26" fill="#D4A017"/>
  <text x="150" y="18" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">商品过山车</text>
  <!-- LEFT: Oil -->
  <rect x="10" y="38" width="135" height="145" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <!-- Oil can icon -->
  <rect x="52" y="48" width="50" height="35" rx="6" fill="#FED7AA"/>
  <rect x="65" y="42" width="24" height="10" rx="3" fill="#FED7AA"/>
  <rect x="72" y="38" width="10" height="6" rx="2" fill="#FED7AA"/>
  <!-- Big drop number -->
  <text x="82" y="110" text-anchor="middle" fill="#DC2626" font-size="28" font-weight="900" font-family="PingFang SC,sans-serif">-6%</text>
  <text x="82" y="130" text-anchor="middle" fill="#991B1B" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">WTI 90.87</text>
  <text x="82" y="146" text-anchor="middle" fill="#991B1B" font-size="8" font-weight="700" font-family="PingFang SC,sans-serif">布伦特 94.76</text>
  <text x="82" y="170" text-anchor="middle" fill="#92400E" font-size="7" font-family="PingFang SC,sans-serif">霍尔木兹30天恢复</text>
  <!-- RIGHT: Gold -->
  <rect x="155" y="38" width="135" height="145" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <!-- Gold V-recovery curve -->
  <polyline points="175,175 195,160 210,165 225,130 240,70 260,55" fill="none" stroke="#D4A017" stroke-width="3"/>
  <!-- V label -->
  <text x="230" y="62" text-anchor="middle" fill="#D4A017" font-size="11" font-weight="800" font-family="PingFang SC,sans-serif">V</text>
  <!-- Gold number -->
  <text x="222" y="105" text-anchor="middle" fill="#D4A017" font-size="22" font-weight="900" font-family="PingFang SC,sans-serif">4580</text>
  <text x="222" y="125" text-anchor="middle" fill="#92400E" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">4509 → 4580</text>
  <text x="222" y="146" text-anchor="middle" fill="#92400E" font-size="7" font-family="PingFang SC,sans-serif">4500关口支撑</text>
  <text x="222" y="170" text-anchor="middle" fill="#64748B" font-size="7" font-family="PingFang SC,sans-serif">花旗看空至4300</text>
</svg>
