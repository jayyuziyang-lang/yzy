<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="300" height="220">
  <rect width="300" height="220" fill="#FAFAFA"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="26" fill="#EA580C"/>
  <text x="150" y="18" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">美伊协议预期下的商品过山车</text>

  <!-- Left panel: Oil -->
  <rect x="12" y="36" width="135" height="170" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>

  <!-- Oil icon -->
  <text x="79" y="62" text-anchor="middle" font-size="18">🛢️</text>
  <text x="79" y="80" text-anchor="middle" fill="#1E293B" font-size="10" font-weight="700" font-family="PingFang SC,sans-serif">原油暴跌</text>

  <!-- Price display -->
  <text x="79" y="100" text-anchor="middle" fill="#DC2626" font-size="16" font-weight="800" font-family="PingFang SC,sans-serif">-6%</text>

  <!-- WTI -->
  <rect x="22" y="108" width="115" height="28" rx="4" fill="#FEF2F2"/>
  <text x="79" y="122" text-anchor="middle" fill="#991B1B" font-size="10" font-weight="700" font-family="PingFang SC,sans-serif">WTI 90.87美元</text>
  <text x="79" y="134" text-anchor="middle" fill="#DC2626" font-size="8" font-family="PingFang SC,sans-serif">周跌幅超8%</text>

  <!-- Brent -->
  <rect x="22" y="140" width="115" height="28" rx="4" fill="#FEF2F2"/>
  <text x="79" y="154" text-anchor="middle" fill="#991B1B" font-size="10" font-weight="700" font-family="PingFang SC,sans-serif">布伦特 94.76美元</text>
  <text x="79" y="166" text-anchor="middle" fill="#DC2626" font-size="8" font-family="PingFang SC,sans-serif">跌破100美元关口</text>

  <!-- Text -->
  <text x="79" y="190" text-anchor="middle" fill="#92400E" font-size="8" font-family="PingFang SC,sans-serif">霍尔木兹海峡30天内恢复通航</text>

  <!-- Right panel: Gold -->
  <rect x="153" y="36" width="135" height="170" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>

  <!-- Gold icon -->
  <text x="220" y="62" text-anchor="middle" font-size="18">🥇</text>
  <text x="220" y="80" text-anchor="middle" fill="#1E293B" font-size="10" font-weight="700" font-family="PingFang SC,sans-serif">黄金V型反弹</text>

  <!-- Price display -->
  <text x="220" y="100" text-anchor="middle" fill="#D4A017" font-size="16" font-weight="800" font-family="PingFang SC,sans-serif">+1%</text>

  <!-- Price levels -->
  <rect x="163" y="108" width="115" height="28" rx="4" fill="#FFFBEB"/>
  <text x="220" y="122" text-anchor="middle" fill="#92400E" font-size="10" font-weight="700" font-family="PingFang SC,sans-serif">4509→4580美元</text>
  <text x="220" y="134" text-anchor="middle" fill="#D4A017" font-size="8" font-family="PingFang SC,sans-serif">4500关口支撑强硬</text>

  <!-- Drivers -->
  <rect x="163" y="140" width="115" height="42" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="220" y="155" text-anchor="middle" fill="#64748B" font-size="8" font-family="PingFang SC,sans-serif">美元走弱 + 通胀预期降温</text>
  <text x="220" y="170" text-anchor="middle" fill="#64748B" font-size="8" font-family="PingFang SC,sans-serif">vs 美联储鹰派压制</text>

  <!-- Briefing -->
  <text x="220" y="190" text-anchor="middle" fill="#92400E" font-size="8" font-family="PingFang SC,sans-serif">花旗短期看空至4300美元</text>

  <!-- Bottom bar legend -->
  <rect x="12" y="210" width="276" height="8" rx="2" fill="#F1F5F9"/>
  <text x="150" y="217" text-anchor="middle" fill="#94A3B8" font-size="7" font-family="PingFang SC,sans-serif">美伊协议框架落定90% ｜ 核问题推迟至下一阶段</text>
</svg>
