<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <rect x="0" y="0" width="300" height="26" fill="#EF4444"/>
  <text x="150" y="18" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">A股极致分化</text>
  <!-- K-line spike -->
  <polyline points="20,180 60,170 100,175 140,160 180,100 220,80 260,85 280,82" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <!-- Peak marker -->
  <circle cx="220" cy="80" r="4" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <text x="220" y="68" text-anchor="middle" fill="#DC2626" font-size="8" font-weight="700" font-family="PingFang SC,sans-serif">科创50</text>
  <!-- Key number -->
  <text x="220" y="56" text-anchor="middle" fill="#1E293B" font-size="14" font-weight="800" font-family="PingFang SC,sans-serif">1,896.04</text>
  <text x="220" y="44" text-anchor="middle" fill="#DC2626" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">+5.88% 新高</text>
  <!-- Volume bars -->
  <rect x="25" y="188" width="15" height="10" fill="#E2E8F0"/>
  <rect x="50" y="192" width="15" height="6" fill="#E2E8F0"/>
  <rect x="75" y="190" width="15" height="8" fill="#E2E8F0"/>
  <rect x="100" y="186" width="15" height="12" fill="#E2E8F0"/>
  <rect x="125" y="193" width="15" height="5" fill="#DC2626"/>
  <rect x="150" y="190" width="15" height="8" fill="#DC2626"/>
  <rect x="175" y="182" width="15" height="16" fill="#DC2626"/>
  <rect x="200" y="175" width="15" height="23" fill="#DC2626"/>
  <rect x="225" y="180" width="15" height="18" fill="#DC2626"/>
  <rect x="250" y="185" width="15" height="13" fill="#DC2626"/>
  <text x="260" y="210" text-anchor="end" fill="#64748B" font-size="7" font-family="PingFang SC,sans-serif">3.21万亿 放量</text>
  <!-- Divergence annotation -->
  <text x="60" y="136" text-anchor="middle" fill="#DC2626" font-size="7" font-weight="700" font-family="PingFang SC,sans-serif">2181涨</text>
  <text x="60" y="146" text-anchor="middle" fill="#16A34A" font-size="7" font-weight="700" font-family="PingFang SC,sans-serif">3225跌</text>
  <text x="60" y="156" text-anchor="middle" fill="#64748B" font-size="7" font-family="PingFang SC,sans-serif">个股大面积下跌</text>
