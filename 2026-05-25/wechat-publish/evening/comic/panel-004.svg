  <text x="244" y="110" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="800" font-family="PingFang SC,sans-serif">核问题</text>
  <text x="244" y="126" text-anchor="middle" fill="#92400E" font-size="7" font-family="PingFang SC,sans-serif">推迟至下一阶段</text>
