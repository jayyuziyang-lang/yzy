  <rect x="20" y="38" width="260" height="24" rx="12" fill="#E2E8F0"/>
  <rect x="20" y="38" width="234" height="24" rx="12" fill="#1A56DB"/>
  <text x="150" y="55" text-anchor="middle" fill="#fff" font-size="11" font-weight="800" font-family="PingFang SC,sans-serif">框架已定 90%</text>
  <rect x="10" y="74" width="180" height="68" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="100" y="92" text-anchor="middle" fill="#1E40AF" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">✅ 已达成共识</text>
  <text x="20" y="108" fill="#1E293B" font-size="8" font-family="PingFang SC,sans-serif">● 60天停火延长 超90%内容达成</text>
  <text x="20" y="122" fill="#1E293B" font-size="8" font-family="PingFang SC,sans-serif">● 霍尔木兹海峡30天内恢复航运</text>
  <text x="20" y="136" fill="#1E293B" font-size="8" font-family="PingFang SC,sans-serif">● 美国解冻120亿美元伊朗资产</text>
  <rect x="198" y="74" width="92" height="68" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
