<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <rect x="0" y="0" width="300" height="26" fill="#10B981"/>
  <text x="150" y="18" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">宏观分化</text>
  <!-- Left: China -->
  <rect x="20" y="40" width="120" height="120" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="80" y="65" text-anchor="middle" fill="#166534" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">中国债市</text>
  <text x="80" y="98" text-anchor="middle" fill="#16A34A" font-size="22" font-weight="900" font-family="PingFang SC,sans-serif">1.75%</text>
  <text x="80" y="118" text-anchor="middle" fill="#166534" font-size="8" font-family="PingFang SC,sans-serif">10年期国债</text>
  <text x="80" y="140" text-anchor="middle" fill="#64748B" font-size="7" font-family="PingFang SC,sans-serif">逆回购2580亿</text>
  <!-- Center: vs -->
  <text x="155" y="100" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif">vs</text>
  <!-- Right: Fed -->
  <rect x="170" y="40" width="120" height="120" rx="8" fill="#FFF5F5" stroke="#FECACA" stroke-width="1.5"/>
  <text x="230" y="65" text-anchor="middle" fill="#991B1B" font-size="9" font-weight="700" font-family="PingFang SC,sans-serif">美联储</text>
  <text x="230" y="98" text-anchor="middle" fill="#DC2626" font-size="22" font-weight="900" font-family="PingFang SC,sans-serif">67%</text>
  <text x="230" y="118" text-anchor="middle" fill="#991B1B" font-size="8" font-family="PingFang SC,sans-serif">年内加息定价</text>
  <text x="230" y="140" text-anchor="middle" fill="#64748B" font-size="7" font-family="PingFang SC,sans-serif">沃勒鹰派 · 野村撤降息</text>
  <!-- Events at bottom -->
  <rect x="30" y="182" width="250" height="30" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="100" y="200" text-anchor="middle" fill="#1E40AF" font-size="8" font-weight="700" font-family="PingFang SC,sans-serif">周三 Warsh听证</text>
  <line x1="150" y1="185" x2="150" y2="210" stroke="#E2E8F0" stroke-width="1"/>
  <text x="210" y="200" text-anchor="middle" fill="#1E40AF" font-size="8" font-weight="700" font-family="PingFang SC,sans-serif">周四 核心PCE</text>
</svg>
