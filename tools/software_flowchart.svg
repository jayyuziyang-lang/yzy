<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 950" width="650" font-family="Microsoft YaHei, SimHei, sans-serif">
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
  </marker>
</defs>
<rect width="650" height="950" fill="#FAFBFC"/>
<text x="325.0" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A56DB">快递包裹运输控制系统 — 软件流程图</text>
<text x="325.0" y="46" text-anchor="middle" font-size="10" fill="#666">主程序循环扫描工作方式 | 变频器多段速 | 正反转互锁</text>
<rect x="255" y="8" width="140" height="45" rx="20" ry="20" fill="#1A56DB" stroke="#1A56DB" stroke-width="1.5"/>
<text x="325" y="28" text-anchor="middle" font-size="10" fill="white" font-weight="bold">开始</text>
<text x="325" y="42" text-anchor="middle" font-size="10" fill="white" font-weight="bold">(系统上电初始化)</text>
<rect x="245" y="73" width="160" height="55" rx="4" fill="#E8F0FE" stroke="#1A56DB" stroke-width="1.2"/>
<text x="325" y="91" text-anchor="middle" font-size="9.5" fill="#1a1a1a">参数初始化</text>
<text x="325" y="105" text-anchor="middle" font-size="9.5" fill="#1a1a1a">D0=1(默认低速)</text>
<text x="325" y="119" text-anchor="middle" font-size="9.5" fill="#1a1a1a">M0=0, M1=0</text>
<polygon points="325,160 390,185 325,210 260,185" fill="#FFF3CD" stroke="#856404" stroke-width="1.5"/>
<text x="325" y="183" text-anchor="middle" font-size="9.5" fill="#856404">急停按钮</text>
<text x="325" y="197" text-anchor="middle" font-size="9.5" fill="#856404">是否释放?</text>
