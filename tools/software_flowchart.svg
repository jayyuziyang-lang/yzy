<text x="500" y="687" text-anchor="middle" font-size="9.5" fill="#1a1a1a">(上限3)</text>
<polygon points="325,725 380,750 325,775 270,750" fill="#FFF3CD" stroke="#856404" stroke-width="1.5"/>
