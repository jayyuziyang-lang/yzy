<text x="325" y="282" text-anchor="middle" font-size="9.5" fill="#1a1a1a">+ 确认按钮</text>
<polygon points="325,325 390,350 325,375 260,350" fill="#FFF3CD" stroke="#856404" stroke-width="1.5"/>
