<text x="325" y="762" text-anchor="middle" font-size="9.5" fill="#856404">按下?</text>
<rect x="450" y="735" width="100" height="40" rx="4" fill="#FCE4D6" stroke="#1A56DB" stroke-width="1.2"/>
<text x="500" y="753" text-anchor="middle" font-size="9.5" fill="#1a1a1a">D0-1</text>
<text x="500" y="767" text-anchor="middle" font-size="9.5" fill="#1a1a1a">(下限0)</text>
<polygon points="325,805 380,830 325,855 270,830" fill="#FFF3CD" stroke="#856404" stroke-width="1.5"/>
<text x="325" y="828" text-anchor="middle" font-size="9.5" fill="#856404">停止按钮</text>
<text x="325" y="842" text-anchor="middle" font-size="9.5" fill="#856404">或急停?</text>
<rect x="80" y="813" width="140" height="45" rx="4" fill="#F8D7DA" stroke="#1A56DB" stroke-width="1.2"/>
