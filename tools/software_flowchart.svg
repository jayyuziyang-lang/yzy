<text x="325" y="449" text-anchor="middle" font-size="9.5" fill="#1a1a1a">运行灯Y002 1s闪烁</text>
<rect x="255" y="493" width="140" height="45" rx="4" fill="#E8F0FE" stroke="#1A56DB" stroke-width="1.2"/>
