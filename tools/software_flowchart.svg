<text x="150" y="847" text-anchor="middle" font-size="9.5" fill="#1a1a1a">所有输出复位</text>
<rect x="100" y="893" width="100" height="35" rx="20" ry="20" fill="#6C757D" stroke="#6C757D" stroke-width="1.5"/>
