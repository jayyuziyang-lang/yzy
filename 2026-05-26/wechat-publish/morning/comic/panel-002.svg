<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<rect width="300" height="220" fill="#FAFAFA"/>
<!-- Title -->
<text x="150" y="22" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="13" font-weight="900" fill="#1E293B">01 A股 · 长安内幕交易 罚没1669万</text>
<line x1="55" y1="30" x2="245" y2="30" stroke="#DC2626" stroke-width="1.5"/>

<!-- Left: Insider trading scene -->
<rect x="15" y="40" width="130" height="55" rx="5" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.8"/>
<text x="80" y="54" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#DC2626">内幕交易链条</text>
<!-- Person 1 -->
<circle cx="38" cy="72" r="7" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
<text x="38" y="74" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#DC2626">员工</text>
<!-- Arrow -->
<line x1="48" y1="72" x2="62" y2="72" stroke="#DC2626" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Person 2 -->
<circle cx="72" cy="72" r="7" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
<text x="72" y="74" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#DC2626">员工</text>
<line x1="82" y1="72" x2="96" y2="72" stroke="#DC2626" stroke-width="1.2"/>
<!-- Person 3 -->
<circle cx="108" cy="72" r="7" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
<text x="108" y="74" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#DC2626">员工</text>
<text x="80" y="89" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#991B1B">公告前突击买入→</text>

<!-- Arrow connector -->
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
</marker>
</defs>

<!-- Divider -->
<line x1="155" y1="40" x2="155" y2="100" stroke="#CBD5E1" stroke-width="0.8" stroke-dasharray="4,3"/>

<!-- Right: Penalty -->
<rect x="162" y="40" width="125" height="55" rx="5" fill="#FEF3C7" stroke="#D4A017" stroke-width="1.8"/>
<text x="225" y="56" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#D4A017">没一罚三</text>
<text x="225" y="70" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#92400E">罚没合计1669万</text>
<text x="225" y="84" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#92400E">涉嫌犯罪 → 移送公安机关</text>

<!-- Separator -->
<line x1="15" y1="115" x2="285" y2="115" stroke="#1E293B" stroke-width="1"/>
<text x="150" y="135" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="900" fill="#1E293B">6100万 · 5人 · 内幕交易铁案</text>

<!-- Bottom: Key facts -->
<rect x="15" y="146" width="270" height="22" rx="4" fill="#EFF6FF" stroke="#1A56DB" stroke-width="1"/>
<text x="150" y="160" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="8" font-weight="600" fill="#1A56DB">5名员工动用6100万买入 获利超400万</text>

<!-- Consequences -->
<rect x="15" y="172" width="126" height="24" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.2"/>
<text x="78" y="184" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" font-weight="700" fill="#DC2626">刑事追责</text>
<text x="78" y="192" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#991B1B">线索移送公安机关</text>

<rect x="158" y="172" width="127" height="24" rx="4" fill="#FEF3C7" stroke="#D4A017" stroke-width="1.2"/>
<text x="222" y="184" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" font-weight="700" fill="#D4A017">市场警示</text>
<text x="222" y="192" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#92400E">证监会重拳出击</text>

<!-- Bottom note -->
<line x1="20" y1="204" x2="280" y2="204" stroke="#E2E8F0" stroke-width="0.5"/>
<text x="150" y="215" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#94A3B8">涉及华为合作备忘录 · 五人合计罚没1669万 · 震慑效应显著</text>
</svg>
