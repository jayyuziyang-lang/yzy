<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="24" fill="#1A56DB"/>
  <text x="150" y="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">04 前沿/国际 · 美军打击伊朗 打谈结合</text>
  <line x1="0" y1="24" x2="300" y2="24" stroke="#D4A017" stroke-width="1.5"/>

  <!-- Missile icon -->
  <ellipse cx="55" cy="68" rx="12" ry="30" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <polygon points="55,32 48,42 62,42" fill="#DC2626"/>
  <rect x="50" y="75" width="10" height="20" rx="1" fill="#DC2626" opacity="0.3"/>
  <text x="55" y="110" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#DC2626">自卫打击</text>

  <!-- VS symbol -->
  <text x="95" y="70" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="900" fill="#64748B">⚡</text>

  <!-- Negotiation table -->
  <rect x="120" y="45" width="50" height="35" rx="4" fill="none" stroke="#16A34A" stroke-width="2"/>
  <line x1="120" y1="55" x2="170" y2="55" stroke="#16A34A" stroke-width="1"/>
  <text x="145" y="70" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#16A34A">谈判</text>
  <text x="145" y="90" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#64748B">进展顺利</text>

  <!-- Bottom section: dual-track -->
  <line x1="20" y1="120" x2="280" y2="120" stroke="#E2E8F0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="150" y="137" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="11" font-weight="900" fill="#1E293B">"打谈结合"双轨并行</text>

  <!-- Track 1: Military -->
  <rect x="35" y="148" width="100" height="42" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.2"/>
  <text x="85" y="163" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#DC2626">军事轨道</text>
  <text x="85" y="178" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#991B1B">有限打击导弹阵地+水雷船</text>

  <!-- Track 2: Diplomatic -->
  <rect x="165" y="148" width="100" height="42" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.2"/>
  <text x="215" y="163" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#16A34A">外交轨道</text>
  <text x="215" y="178" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#166534">霍尔木兹分阶段开放</text>

  <!-- Bottom note -->
  <line x1="20" y1="198" x2="280" y2="198" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="150" y="212" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#64748B">油价90附近震荡 — 每一次军事打击都可能触发短期反弹</text>
</svg>
