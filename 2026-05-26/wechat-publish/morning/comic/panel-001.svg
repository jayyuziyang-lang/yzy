<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <rect width="300" height="220" fill="#FAFAFA"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="24" fill="#1A56DB"/>
  <text x="150" y="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">04 前沿/国际 · 美军打击伊朗 打谈结合</text>

  <!-- Iran map silhouette -->
  <path d="M40,80 Q50,40 70,45 Q85,48 80,60 Q85,70 75,85 Q65,95 55,90 Z" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" opacity="0.7"/>
  <text x="58" y="72" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="8" font-weight="700" fill="#DC2626">伊朗</text>

  <!-- Missile arc -->
  <path d="M100,45 Q120,15 135,55" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="135,57 130,49 139,51" fill="#DC2626"/>
  <circle cx="102" cy="43" r="6" fill="#DC2626" opacity="0.3"/>
  <text x="120" y="30" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="6" fill="#DC2626">美军打击</text>

  <!-- Divider -->
  <line x1="150" y1="35" x2="150" y2="108" stroke="#CBD5E1" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Right: Negotiation -->
  <rect x="165" y="40" width="105" height="40" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="218" y="58" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#16A34A">谈判同步推进</text>
  <text x="218" y="72" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#166534">框架90%落定 · 特朗普称顺利</text>

  <!-- Bottom section -->
  <line x1="15" y1="115" x2="285" y2="115" stroke="#E2E8F0" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="150" y="133" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="12" font-weight="900" fill="#1E293B">打谈结合 · 双轨并行</text>

  <!-- Military track -->
  <rect x="20" y="142" width="125" height="50" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.2"/>
  <text x="83" y="155" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#DC2626">军事轨道</text>
  <text x="83" y="170" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#991B1B">有限打击导弹阵地+水雷船只</text>
  <text x="83" y="183" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#991B1B">保障霍尔木兹海峡通航</text>

  <!-- Diplomatic track -->
  <rect x="155" y="142" width="125" height="50" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.2"/>
  <text x="218" y="155" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#16A34A">外交轨道</text>
  <text x="218" y="170" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#166534">停火60天延长</text>
  <text x="218" y="183" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#166534">霍尔木兹分阶段开放</text>

  <!-- Bottom note -->
  <line x1="20" y1="200" x2="280" y2="200" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="150" y="213" text-anchor="middle" font-family="'PingFang SC',sans-serif" font-size="7" fill="#64748B">油价90附近震荡 — 每次军事打击都可能触发短期反弹</text>
</svg>
