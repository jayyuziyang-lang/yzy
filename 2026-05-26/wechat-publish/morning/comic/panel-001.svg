<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
<rect width="300" height="220" fill="#FAFAFA"/>
<!-- Title -->
<text x="150" y="22" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="13" font-weight="900" fill="#1E293B">04 前沿/国际 · 美军打击伊朗 打谈结合</text>
<line x1="60" y1="30" x2="240" y2="30" stroke="#D4A017" stroke-width="1.5"/>

<!-- Iran shape -->
<path d="M12,72 Q15,38 32,40 L46,42 Q50,46 48,56 Q51,63 46,76 L38,88 Q28,90 20,83 Z" fill="none" stroke="#DC2626" stroke-width="2.2"/>
<text x="30" y="68" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" font-weight="700" fill="#DC2626">伊朗</text>

<!-- Missile arc -->
<path d="M65,36 Q90,10 115,38" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="5,3"/>
<polygon points="115,40 109,32 119,34" fill="#DC2626"/>
<line x1="86" y1="18" x2="69" y2="32" stroke="#DC2626" stroke-width="1" stroke-dasharray="2,2"/>
<text x="90" y="16" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#DC2626">美军打击</text>

<!-- Divider -->
<line x1="148" y1="40" x2="148" y2="105" stroke="#CBD5E1" stroke-width="0.8" stroke-dasharray="4,3"/>

<!-- Right: Negotiation -->
<rect x="160" y="35" width="125" height="38" rx="5" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
<text x="223" y="52" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#16A34A">谈判同步推进</text>
<text x="223" y="66" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#166534">框架90%完成 · 特朗普称顺利</text>

<!-- Separator -->
<line x1="15" y1="115" x2="285" y2="115" stroke="#1E293B" stroke-width="1"/>
<text x="150" y="135" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="12" font-weight="900" fill="#1E293B">双轨并行 · 打谈结合</text>

<!-- Military track -->
<rect x="18" y="146" width="126" height="48" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
<text x="81" y="158" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#DC2626">军事轨道</text>
<text x="81" y="171" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#991B1B">有限打击导弹阵地+水雷船只</text>
<text x="81" y="184" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#991B1B">保障霍尔木兹海峡通航</text>

<!-- Diplomatic track -->
<rect x="156" y="146" width="126" height="48" rx="5" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="219" y="158" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="9" font-weight="700" fill="#16A34A">外交轨道</text>
<text x="219" y="171" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#166534">延长停火60天</text>
<text x="219" y="184" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="7" fill="#166534">霍尔木兹分阶段开放</text>

<!-- Bottom note -->
<line x1="20" y1="202" x2="280" y2="202" stroke="#E2E8F0" stroke-width="0.5"/>
<text x="150" y="214" text-anchor="middle" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="6" fill="#94A3B8">油价90附近震荡 · 每次军事打击都可能触发短期反弹</text>
</svg>
